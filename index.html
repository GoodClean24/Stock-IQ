// SECTION 4 — THE ANALYSIS ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
// Redesigns the Analysis tab to read like an analyst's reasoning, not a
// dashboard: Executive Summary -> Build the Case -> Contradictory Evidence ->
// Missing Evidence -> Invalidation -> Strategy-Specific Action -> Evidence
// Table -> "60 Seconds" -> "Watching Next". Every category reuses the SAME
// functions the rest of the app already trusts (computeMarketState,
// analyzeSetup, computeVolumeOnUpDays, computeKeyLevels, computeWatchOuts) —
// this tab is a narrative layer on top of existing math, not a second engine.
//
// The numeric 0-100 "Setup Score" is retired everywhere in the app (detail
// header, watchlist cards, Overview, the AI research prompt) in favor of
// Conviction: High / Moderate / Low / Insufficient Evidence, always paired
// with a plain-English reason. computeSetupScore() itself is left in place,
// unused, rather than deleted, since nothing else in the codebase depends on
// deleting it and removing a function is a needless place to introduce risk.

const CONVICTION_META = {
  'High':                 {color:C.green,  bg:C.greenDim,  dots:'●●●'},
  'Moderate':             {color:C.yellow, bg:C.yellowDim, dots:'●●○'},
  'Low':                  {color:C.red,    bg:C.redDim,    dots:'●○○'},
  'Insufficient Evidence':{color:C.textMuted, bg:C.card,   dots:'○○○'},
};

// Compact badge that replaces every numeric score ring in the app.
// Deliberately NOT a partial-fill ring — a ring implies a spectrum/percentage,
// which is exactly the fake precision Conviction is meant to remove.
function renderConvictionBadge(level, size) {
  const m = CONVICTION_META[level] || CONVICTION_META['Insufficient Evidence'];
  const dims = size==='sm' ? {w:46,h:46,fs:8,fs2:9} : size==='md' ? {w:52,h:52,fs:8,fs2:9} : {w:66,h:66,fs:9,fs2:11};
  const shortLabel = level==='Insufficient Evidence' ? 'N/A' : level.toUpperCase();
  return `<div style="width:${dims.w}px;height:${dims.h}px;border-radius:14px;background:${m.bg};border:1.5px solid ${m.color}88;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
    <span style="color:${m.color};font-size:${dims.fs}px;letter-spacing:1px;margin-bottom:2px;">${m.dots}</span>
    <span style="color:${m.color};font-size:${dims.fs2}px;font-weight:900;text-align:center;line-height:1.1;">${shortLabel}</span>
  </div>`;
}

// ── EVIDENCE CATEGORIES ─────────────────────────────────────────────────────
// Each returns {verdict, teach} — verdict is Strong/Moderate/Weak (or
// Healthy/Elevated for Volatility, since ATR isn't a strength spectrum),
// teach is interpretation-first prose with the indicator named once,
// parenthetically, never leading with the acronym.

function computeTrendEvidence(s) {
  const slope = computeMASlope(s);
  const above200 = s.ma200!=null && s.price>s.ma200;
  const stackBullish = s.ma50!=null && s.ma200!=null && s.ma50>s.ma200;
  const rising50 = slope ? slope.rising50 : null;
  let verdict = 'Weak';
  if(above200 && stackBullish && rising50!==false) verdict = 'Strong';
  else if(above200 || stackBullish) verdict = 'Moderate';
  let teach;
  if(above200) {
    teach = `Price remains above its 200-day average${stackBullish?', while the 50-day continues to act as intermediate support':''}. `;
    teach += rising50===true ? 'Long-term buyers remain in control.' : rising50===false ? 'That said, the 50-day has started to flatten or roll over — the trend is holding, but losing some of its push.' : 'Not enough saved history yet to confirm whether the 50-day is still rising.';
  } else {
    teach = 'Price has slipped below its 200-day moving average — the long-term trend is no longer confirmed, and this should be treated as a trend under repair, not a discount.';
  }
  return {verdict, teach};
}

function computeMomentumEvidence(s) {
  const rz = rsiZone(s.rsi);
  if(!rz) return {verdict:'Weak', teach:'RSI hasn\'t been logged yet, so momentum can\'t be read.'};
  const macdKnown = s.macdLine!=null && s.signalLine!=null;
  const macdBull = macdKnown && s.macdLine>s.signalLine;
  let verdict = (rz.zone==='healthy') ? 'Strong' : (rz.zone==='hot') ? 'Weak' : 'Moderate';
  let teach = rz.zone==='hot' ? `Momentum is stretched further than most healthy trends go (RSI ${s.rsi}) — chasing here is risky.` :
    rz.zone==='panic' ? `Momentum has been beaten down into oversold territory (RSI ${s.rsi}), which is often where reversals begin.` :
    rz.zone==='healthy' ? `Momentum sits in a healthy, sustainable range (RSI ${s.rsi}) — not stretched, not broken down.` :
    `Momentum is neither strong nor weak right now (RSI ${s.rsi}) — no real edge here on its own.`;
  if(macdKnown) teach += macdBull ? ' Momentum confirmation agrees, with a bullish MACD reading.' : ' MACD hasn\'t confirmed with a bullish crossover yet.';
  return {verdict, teach};
}

function computeVolumeEvidence(s) {
  const setup = analyzeSetup(s);
  const upDayVol = computeVolumeOnUpDays(s);
  let verdict, teach;
  if(upDayVol) {
    verdict = upDayVol.ratio>1.15 ? 'Strong' : upDayVol.ratio<0.85 ? 'Weak' : 'Moderate';
    teach = upDayVol.text;
  } else {
    verdict = setup.volConfirmed ? 'Moderate' : 'Moderate';
    teach = setup.volConfirmed ? 'Volume is running above average today, which adds some real conviction to the move (not yet enough saved history to compare up-day vs. down-day volume).' : 'Volume is unremarkable right now — no strong conviction behind the current move either way.';
  }
  return {verdict, teach};
}

function computeVolatilityEvidence(s) {
  if(!s.atr || !s.price) return {verdict:'Unknown', teach:'ATR hasn\'t been logged yet, so typical daily movement isn\'t known.'};
  const atrPct = (s.atr/s.price)*100;
  const verdict = atrPct>6 ? 'Elevated' : 'Healthy';
  const teach = verdict==='Healthy'
    ? `Today's movement is within normal daily volatility (about ${atrPct.toFixed(1)}% of price per day, or ATR) and doesn't indicate unusual market behavior.`
    : `This stock is moving more than usual right now (about ${atrPct.toFixed(1)}% of price per day, or ATR) — size any position accordingly.`;
  return {verdict, teach};
}

function mapStateToStrength(state) {
  if(state==='Healthy Uptrend') return 'Strong';
  if(['Normal Pullback','Consolidation','Recovery Attempt'].includes(state)) return 'Moderate';
  if(['Trend Weakening','Confirmed Breakdown'].includes(state)) return 'Weak';
  return 'Unknown';
}

// ── CONVICTION ──────────────────────────────────────────────────────────────
// Explicit ordered gates, not a blend — same discipline as Evidence Strength
// in Section 2. Insufficient Evidence and outright contradiction both
// override an otherwise-decent-looking picture.
function computeConviction(s) {
  const tier = computeMentorHistoryTier(s);
  const ms = computeMarketState(s);
  if(ms.state==='Insufficient Data' || tier==='limited') {
    return {level:'Insufficient Evidence', reason:'StockIQ doesn\'t have enough fresh history on this stock yet to responsibly back a conclusion — current-condition data only.', ms};
  }
  const trendEv = computeTrendEvidence(s);
  const momentumEv = computeMomentumEvidence(s);
  const volumeEv = computeVolumeEvidence(s);
  const structureStrength = mapStateToStrength(ms.state);

  const culprits = [];
  if(trendEv.verdict==='Weak') culprits.push('the long-term trend');
  if(structureStrength==='Weak') culprits.push('current structure');
  if(volumeEv.verdict==='Weak') culprits.push('volume behavior');
  if(culprits.length) {
    return {level:'Low', reason:`${culprits.join(' and ')} materially contradict${culprits.length===1?'s':''} the bullish case right now.`, ms, trendEv, momentumEv, volumeEv, structureStrength};
  }

  const strongCore = trendEv.verdict==='Strong' && structureStrength==='Strong';
  const broadSupport = momentumEv.verdict!=='Weak' && volumeEv.verdict!=='Weak';
  if(strongCore && broadSupport) {
    return {level:'High', reason:'Trend and structure are both healthy, and momentum and volume aren\'t working against the case.', ms, trendEv, momentumEv, volumeEv, structureStrength};
  }
  return {level:'Moderate', reason:'The trend is intact, but the current setup is incomplete or mixed — not a clean case yet, not a broken one either.', ms, trendEv, momentumEv, volumeEv, structureStrength};
}

// ── CONTRADICTORY & MISSING EVIDENCE ────────────────────────────────────────
// Contradictory Evidence = computeWatchOuts(), reused directly — it already
// does exactly this job, no reason to build a second version.
// Missing Evidence turns the market state engine's unmet/non-evaluable
// conditions into forward-looking "I want to see X" statements.
const MISSING_EVIDENCE_PHRASING = {
  ma50Slope: 'I want to see the 50-day average clearly turn up before trusting this as a real trend, not just a bounce.',
  ma200Slope: 'I want to see the 200-day average confirm direction before calling the long-term trend fully healthy.',
  accumDistribution: 'I want to see buyers return with stronger-than-average volume before treating this as real accumulation.',
  structureProxy: 'I want to see the next pullback hold above the prior low before trusting the structure here.',
  atrTrend: 'I want to see volatility settle down before treating this as a calm, tradeable range.',
  reclaim20ema: 'I want to see price reclaim the 20-day average before this looks like real strength again.',
  defendSupport: 'I want to see buyers actually defend the 50-day average, not just approach it.',
  generic: 'I want more saved history here before drawing a firm conclusion.',
};
function missingEvidenceFor(label) {
  const l = label.toLowerCase();
  if(l.includes('50 sma') && l.includes('within')) return MISSING_EVIDENCE_PHRASING.defendSupport;
  if(l.includes('50 sma') && (l.includes('rising')||l.includes('declining')||l.includes('flat'))) return MISSING_EVIDENCE_PHRASING.ma50Slope;
  if(l.includes('200 sma') && (l.includes('rising')||l.includes('flat'))) return MISSING_EVIDENCE_PHRASING.ma200Slope;
  if(l.includes('volume') && (l.includes('down-day')||l.includes('up day')||l.includes('up-day'))) return MISSING_EVIDENCE_PHRASING.accumDistribution;
  if(l.includes('structure proxy')||l.includes('lower-low')||l.includes('higher-low')) return MISSING_EVIDENCE_PHRASING.structureProxy;
  if(l.includes('atr')) return MISSING_EVIDENCE_PHRASING.atrTrend;
  if(l.includes('20 ema')) return MISSING_EVIDENCE_PHRASING.reclaim20ema;
  return MISSING_EVIDENCE_PHRASING.generic;
}
function computeMissingEvidence(ms) {
  const unmet = ms.conditions.filter(c=>c.evaluable && !c.met);
  const needsHistory = ms.conditions.filter(c=>!c.evaluable);
  const items = [];
  unmet.forEach(c=>items.push(missingEvidenceFor(c.label)));
  needsHistory.forEach(c=>items.push(missingEvidenceFor(c.label)));
  const deduped = [...new Set(items)];
  return deduped.length ? deduped.slice(0,4) : ['Nothing glaring is missing right now — the existing evidence is reasonably complete.'];
}

// ── INVALIDATION ─────────────────────────────────────────────────────────────
// Varies by strategy on purpose: Swing/Position get a real technical trigger.
// Long-Term Hold gets a thesis-review trigger, never an automatic-sale line —
// technical deterioration alone isn't a reason to sell a long-term thesis,
// per the same caution suggestHoldTypeLive already applies elsewhere.
function computeInvalidation(s, type) {
  const levels = computeKeyLevels(s);
  const supportPrice = levels.support ? levels.support.price : (s.ma50||null);
  if(!supportPrice) return {isThesisReview:false, text:'Not enough data yet to define an invalidation level.', price:null};
  if(type==='Long-Term Hold') {
    return {isThesisReview:true, price:supportPrice,
      text:`A close below ${fmtP(supportPrice)} on above-average volume wouldn't automatically mean sell. For a long-term hold, it means it's time to review whether the original thesis for owning this stock still holds — not to react to the price alone.`};
  }
  return {isThesisReview:false, price:supportPrice,
    text:`This analysis becomes incorrect if price closes below ${fmtP(supportPrice)} on above-average volume (1.2× the 20-day average or higher).`};
}

// ── BUY READINESS GATE ───────────────────────────────────────────────────────
// "BUY NOW" is never shown unless every one of these is true. Otherwise the
// action reads "Ready for Entry Review" — close, not confirmed. Two honest
// gaps, called out rather than faked:
//  - Position sizing uses the same rough ATR-vs-budget heuristic
//    computeWatchOuts already uses, not the real risk-first sizing engine
//    (still on the backlog — Section 2 future scope, item 3).
//  - Earnings risk has no data field anywhere in this app yet. Until
//    s.earningsDate exists on a stock, this check fails safe — it never
//    silently assumes "clear". That means BUY NOW won't fire for ANY stock
//    today, which is the correct, honest consequence of requiring an
//    earnings check the app can't yet perform, not a bug.
function isEarningsSoon(dateStr) {
  const d = new Date(dateStr);
  if(isNaN(d)) return null;
  const diffDays = Math.round((d - new Date())/(1000*60*60*24));
  return diffDays>=-1 && diffDays<=10;
}
function computeBuyReadiness(s, type) {
  const gp = computeGamePlan(s);
  const checks = [];

  const hasEntryZone = !gp.entryPending && gp.buyZone && gp.buyZone!=='Waiting on more data';
  checks.push({label:'Entry zone defined', pass:!!hasEntryZone, required:true});

  const inval = computeInvalidation(s, type);
  checks.push({label:'Invalidation level defined', pass: !inval.isThesisReview && inval.price!=null, required:true});

  const rr = computeRewardRiskRatio(s);
  checks.push({label:'Reward outweighs risk (1.5:1 or better)', pass: rr.ratio!=null && rr.ratio>=1.5, required:true});

  let sizingPass = false, sizingUnknown = true;
  if(s.atr && s.price) {
    const budget = s.invested||150;
    const riskPct = budget>0 ? ((budget/s.price)*(s.atr*1.5)/budget)*100 : null;
    if(riskPct!=null) { sizingUnknown=false; sizingPass = riskPct<15; }
  }
  checks.push({label:'Position sizing reasonable for normal daily movement', pass:sizingPass, unknown:sizingUnknown, required:false});

  const earningsKnown = s.earningsDate!=null && String(s.earningsDate).trim()!=='';
  checks.push({label:'No earnings event imminent', pass: earningsKnown ? !isEarningsSoon(s.earningsDate) : false, unknown:!earningsKnown, required:false});

  const ms = computeMarketState(s);
  let strategyOk = false;
  if(type==='Swing Trade') strategyOk = ['Healthy Uptrend','Normal Pullback'].includes(ms.state) && ms.evidence!=='Weak';
  else if(type==='Position Trade') strategyOk = ['Healthy Uptrend','Normal Pullback'].includes(ms.state);
  else if(type==='Long-Term Hold') strategyOk = !['Confirmed Breakdown','Trend Weakening'].includes(ms.state);
  checks.push({label:'Strategy-specific structure check', pass:strategyOk, required:true});

  return {ready: checks.every(c=>c.pass), checks};
}

// ── STRATEGY-SPECIFIC ACTION ────────────────────────────────────────────────
// Never auto-BUYs on Healthy Uptrend — always routes through the readiness
// gate above. Same stock, same state, three different actions depending on
// Position Type, per the strategy rules established in Section 1.
function computeAction(s) {
  const type = s.type;
  const ms = computeMarketState(s);
  const holding = (s.tranche||[]).some(t=>t.status==='filled');
  const readiness = computeBuyReadiness(s, type);
  const exitSignal = holding ? checkExitSignal(s) : null;
  const entryLabel = () => readiness.ready ? 'Ready for Entry Review' : 'WAIT';

  const TABLE = {
    'Swing Trade': {
      'Healthy Uptrend': holding?'HOLD':entryLabel(), 'Normal Pullback': holding?'HOLD':'WAIT',
      'Consolidation': holding?'HOLD':'WAIT',
      'Trend Weakening': holding?((exitSignal&&exitSignal.confirmed)?'EXIT':'REDUCE RISK'):'AVOID',
      'Confirmed Breakdown': holding?'EXIT':'AVOID', 'Recovery Attempt': holding?'HOLD':'WAIT',
      'Insufficient Data': 'INSUFFICIENT DATA',
    },
    'Position Trade': {
      'Healthy Uptrend': holding?'HOLD':entryLabel(), 'Normal Pullback': 'HOLD',
      'Consolidation': holding?'HOLD':'WAIT',
      'Trend Weakening': holding?'REDUCE RISK — DON\'T ADD':'AVOID',
      'Confirmed Breakdown': holding?'EXIT OR REDUCE':'AVOID', 'Recovery Attempt': 'WAIT',
      'Insufficient Data': 'INSUFFICIENT DATA',
    },
    'Long-Term Hold': {
      'Healthy Uptrend': 'CONTINUE HOLDING', 'Normal Pullback': 'CONTINUE HOLDING',
      'Consolidation': 'CONTINUE HOLDING', 'Trend Weakening': 'REVIEW THESIS',
      'Confirmed Breakdown': 'REVIEW THESIS', 'Recovery Attempt': 'CONTINUE HOLDING',
      'Insufficient Data': 'INSUFFICIENT DATA',
    },
  };
  const action = (TABLE[type]||TABLE['Swing Trade'])[ms.state] || 'INSUFFICIENT DATA';
  return {action, readiness, holding, ms};
}

// ── EXECUTIVE SUMMARY, 60 SECONDS, WATCHING NEXT ────────────────────────────
function computeExecutiveSummary(s, conviction) {
  const stateText = {
    'Healthy Uptrend': `${s.ticker} remains in a healthy long-term uptrend`,
    'Normal Pullback': `${s.ticker} remains in a healthy long-term uptrend but is currently experiencing a normal pullback toward intermediate support`,
    'Consolidation': `${s.ticker} is consolidating, with neither buyers nor sellers currently in clear control`,
    'Trend Weakening': `${s.ticker}'s trend is showing real signs of weakening`,
    'Confirmed Breakdown': `${s.ticker}'s long-term trend has broken down`,
    'Recovery Attempt': `${s.ticker} is attempting to recover from a recent breakdown, though that recovery isn't confirmed yet`,
    'Insufficient Data': `StockIQ doesn't have enough data on ${s.ticker} yet to characterize its trend`,
  }[conviction.ms.state] || `${s.ticker}'s current condition is unclear from the data available`;

  let volLine = '';
  if(conviction.volumeEv) {
    volLine = conviction.volumeEv.verdict==='Weak' ? ' Selling volume is outpacing buying volume, which is worth taking seriously.'
      : conviction.volumeEv.verdict==='Strong' ? ' Institutions do not appear to be distributing shares aggressively, suggesting patience rather than panic.' : '';
  }
  return `${stateText}.${volLine} Overall conviction here is ${conviction.level.toLowerCase()}: ${conviction.reason}`;
}

function compute60Second(conviction) {
  if(!conviction.trendEv) return 'Ignore everything else — StockIQ doesn\'t have enough history yet to point you at one thing with confidence. Focus on logging more daily updates.';
  const strengthRank = v => v==='Weak'?0:v==='Moderate'?1:2;
  const ranked = [
    {name:'the 200-day trend line', rank: strengthRank(conviction.trendEv.verdict)},
    {name:'the current market state on your Setup and Structure chart', rank: strengthRank(conviction.structureStrength)},
    {name:'volume behavior', rank: strengthRank(conviction.volumeEv.verdict)},
    {name:'momentum (RSI and MACD)', rank: strengthRank(conviction.momentumEv.verdict)},
  ].sort((a,b)=>a.rank-b.rank);
  return `Ignore the rest for now. Watch ${ranked[0].name} — that's the single most important thing driving this stock's read right now.`;
}

// ── EVIDENCE TABLE ROW RENDERER ──────────────────────────────────────────────
const EVIDENCE_VERDICT_COLOR = {Strong:C.green, Healthy:C.green, Moderate:C.yellow, Elevated:C.orange, Weak:C.red, Unknown:C.textMuted};
function renderEvidenceTableRow(category, verdict, why) {
  const color = EVIDENCE_VERDICT_COLOR[verdict] || C.textMuted;
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid ${C.border};gap:10px;">
      <div style="min-width:70px;"><span style="color:${C.text};font-size:12.5px;font-weight:700;">${category}</span></div>
      <div style="min-width:64px;"><span style="color:${color};font-size:11.5px;font-weight:800;">${verdict}</span></div>
      <div style="flex:1;"><span style="color:${C.textSub};font-size:11.5px;line-height:1.5;">${why}</span></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION 5 — THE GAME PLAN ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
// Turns the Game Plan tab from "here's what's happening" into "here's your
// next move." Reuses Section 4's Action/Conviction engine and Section 2's
// Market State engine throughout — this is a presentation and checklist
// layer, not a third parallel decision system. The existing editable
// tranche/budget UI (Build Buy Plan, Fill, Sell) is untouched: the user can
// still override position size, tranche split, and risk tolerance, per
// Kim's explicit "not a notebook" rule — everything else here is computed,
// not free-text.

// ── STAGE ────────────────────────────────────────────────────────────────────
// "Completed" only fires when every filled tranche has actually been sold —
// a real closed-position detection, not a guess.
function isPositionFullyClosed(s) {
  const filled = (s.tranche||[]).filter(t=>t.status==='filled');
  return filled.length>0 && filled.every(t=>t.soldPrice!=null);
}
function computeGamePlanStage(s) {
  if(s.archived) return 'Archived';
  if(isPositionFullyClosed(s)) return 'Completed';
  const action = computeAction(s);
  if(action.holding) return /EXIT|REDUCE|REVIEW THESIS/.test(action.action) ? 'Exiting' : 'Managing';
  let stage;
  if(action.action==='Ready for Entry Review') stage = 'Ready';
  else if(action.action==='WAIT') {
    const checks = action.readiness.checks;
    const metCount = checks.filter(c=>c.pass).length;
    stage = metCount >= Math.ceil(checks.length/2) ? 'Preparing' : 'Watching';
  } else stage = 'Watching';

  // Consistency rule (Section 6): Opportunity Status must never be
  // contradicted by the Game Plan. A stock graded Pass/Archive can't
  // simultaneously claim Ready or Preparing — downgrade to Watching and
  // let the Opportunity Status badge carry the real explanation.
  if((stage==='Ready'||stage==='Preparing') && computeOpportunityStatus(s, s.type).status==='Pass / Archive') {
    stage = 'Watching';
  }
  return stage;
}
const GAME_PLAN_STAGE_META = {
  'Watching':  {color:C.textSub, icon:'👁'}, 'Preparing': {color:C.yellow, icon:'📶'},
  'Ready':     {color:C.green,   icon:'🎯'}, 'Managing':  {color:C.teal,   icon:'🛡'},
  'Exiting':   {color:C.red,     icon:'🔴'}, 'Completed': {color:C.textMuted, icon:'✅'},
  'Archived':  {color:C.textMuted, icon:'📦'},
};

// ── CURRENT MISSION & THE ONE SENTENCE ──────────────────────────────────────
function computeGamePlanMission(s, stage, action) {
  const MISSION = {
    'Watching':  'Wait patiently for the setup to develop — nothing to do yet.',
    'Preparing': 'Watch closely — several conditions are already lining up.',
    'Ready':     'The entry checklist is complete. Review the plan below before acting.',
    'Managing':  'Hold the position and follow the plan — no new decisions needed today.',
    'Exiting':   'The setup is deteriorating. Follow the exit plan below.',
    'Completed': 'This trade is closed. Nothing left to manage here.',
    'Archived':  'This stock is archived — a good company, but not an active trade right now.',
  };
  return MISSION[stage] || MISSION['Watching'];
}
function computeOneSentence(s, stage, action, conviction) {
  if(stage==='Archived') return 'Nothing wrong with the company. There\'s just no compelling trade here right now.';
  if(stage==='Completed') return 'This one\'s done — review it in Notes if you want to learn from it, then move on.';
  if(stage==='Exiting') return `Don't hope this turns around. The evidence says get out or reduce, not wait and see.`;
  if(stage==='Managing') return `You're already in — the job now is patience, not a new decision.`;
  if(stage==='Ready') return conviction.level==='High' ? 'This is one of your higher-quality setups right now, and the checklist agrees — worth a real look.' : 'The checklist is complete, but conviction is only moderate — review before sizing up.';
  if(stage==='Preparing') return 'Momentum is building toward a real entry, but patience is still the correct trade today.';
  return `Don't buy today. You're waiting for confirmation, not hoping for one.`;
}

// ── TRIGGER CHECKLIST / EXIT WATCH ──────────────────────────────────────────
// Not holding: reuses Section 4's own Buy Readiness gate as the checklist —
// same six gates, same pass/fail math, just presented as checkboxes.
// Holding: a distinct exit-watch list built from the invalidation level and
// the existing exit-confirmation logic, since "should I enter" and "should I
// exit" are different questions with different evidence.
function computeManagingChecklist(s, type) {
  const inval = computeInvalidation(s, type);
  const exitSignal = checkExitSignal(s);
  const ms = computeMarketState(s);
  const checks = [];
  checks.push({label: inval.isThesisReview ? 'Original thesis still holds' : `Price still above invalidation (${inval.price!=null?fmtP(inval.price):'—'})`, pass: !(exitSignal && exitSignal.confirmed)});
  checks.push({label:'Long-term trend still intact', pass: !['Confirmed Breakdown','Trend Weakening'].includes(ms.state)});
  checks.push({label:'No confirmed breakdown on volume', pass: !(exitSignal && exitSignal.triggered && exitSignal.confirmed)});
  return checks;
}

// ── RISK-BASED POSITION SIZING (the "risk engine") ──────────────────────────
// Genuinely risk-first: pick a max dollar loss, size shares backward from
// entry-minus-stop distance — instead of the existing budget-first flow
// (pick a dollar budget, whatever it risks is whatever it risks). This is
// ADVISORY, shown alongside the existing editable Budget/tranche system,
// not wired to replace it — changing what an already-trusted, real-money
// field does under the hood is a worse risk than adding a second number.
// Defaults maxRisk to 15% of budget when s.maxRisk isn't set, matching the
// same 15% tight-sizing threshold already used elsewhere in the app.
function computeRiskBasedSizing(s) {
  const gp = computeGamePlan(s);
  if(gp.entryRef==null || gp.stopPrice==null) return null;
  const stopDistance = gp.entryRef - gp.stopPrice;
  if(stopDistance<=0) return null;
  const budget = s.invested||150;
  const maxRisk = (s.maxRisk!=null && s.maxRisk>0) ? s.maxRisk : budget*0.15;
  const usingDefault = !(s.maxRisk!=null && s.maxRisk>0);
  const shares = Math.max(0, Math.floor(maxRisk/stopDistance));
  const totalAllocation = shares*gp.entryRef;
  const tranches = (s.tranche||[]).length || 2;
  const splits = splitBudget(totalAllocation, tranches);
  return {maxRisk, usingDefault, shares, totalAllocation, stopDistance, splits, entryRef:gp.entryRef};
}

// ── REVIEW DATE (now event-driven wherever the app has real data for it) ────
// Priority order: a fully closed/exiting position needs no future date at
// all; a known earnings date beats everything; price actually approaching
// the invalidation level is a real event worth naming; an open, waiting
// setup ties to the next weekly close (real calendar math, no new data
// needed); a stock with nothing to watch yet ties to Kim's own workflow —
// her next evening scanner pass — rather than an arbitrary day count.
// Scanner refresh and support-test are genuine events; earnings still
// depends on a field the app doesn't collect yet (same gap flagged in
// Section 4), so that branch only fires once s.earningsDate is actually set.
// Time-based REVIEW_WINDOW_DAYS is now the LAST resort, not the default.
const REVIEW_WINDOW_DAYS = {'Swing Trade':21, 'Position Trade':60, 'Long-Term Hold':180};
function computeReviewDate(s) {
  const created = s.id;
  const windowDays = REVIEW_WINDOW_DAYS[s.type] || 60;
  if(!created || typeof created !== 'number') return {text:`${windowDays} days`, overdue:false, windowDays};
  const daysElapsed = Math.floor((Date.now()-created)/(1000*60*60*24));
  const daysLeft = windowDays-daysElapsed;
  if(daysLeft<0) return {text:`Overdue by ${Math.abs(daysLeft)} day${Math.abs(daysLeft)===1?'':'s'} — reassess this thesis`, overdue:true, windowDays};
  if(daysLeft===0) return {text:'Review today — reassess this thesis', overdue:true, windowDays};
  return {text:`${daysLeft} day${daysLeft===1?'':'s'}`, overdue:false, windowDays};
}
function nextWeekdayDate(targetDow) {
  const d = new Date();
  const diff = (targetDow - d.getDay() + 7) % 7;
  d.setDate(d.getDate()+diff);
  return d;
}
function fmtDateShort(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function computeReviewTrigger(s, stage, type) {
  if(stage==='Completed') return {kind:'event', overdue:false, text:'Nothing to review — this one is closed.'};
  if(stage==='Exiting') return {kind:'event', overdue:true, text:'Review now, not on a future date — the exit plan is already active.'};

  if(s.earningsDate) {
    const d = new Date(s.earningsDate);
    if(!isNaN(d)) return {kind:'event', overdue:false, text:`Review before earnings on ${fmtDateShort(d)}.`};
  }

  const inval = computeInvalidation(s, type);
  if(inval.price!=null && s.price!=null) {
    const distPct = Math.abs((s.price-inval.price)/inval.price)*100;
    if(distPct<=3) return {kind:'event', overdue:false, text:`Review as soon as price tests ${fmtP(inval.price)} — you're within 3% of that level right now.`};
  }

  if(stage==='Watching') return {kind:'event', overdue:false, text:'Review the next time you run your evening scan — nothing time-sensitive here yet.'};
  if(['Preparing','Ready','Managing'].includes(stage)) return {kind:'event', overdue:false, text:`Review at this week's close (${fmtDateShort(nextWeekdayDate(5))}) if nothing triggers sooner.`};

  const rd = computeReviewDate(s);
  return {kind:'time', overdue:rd.overdue, text: rd.overdue ? rd.text : `No specific event to anchor to yet — defaulting to a ${rd.windowDays}-day check-in (${rd.text} left).`};
}

// ── REQUIRED vs SUPPORTING CHECKLIST DISPLAY ────────────────────────────────
// Presentation only: which checks are shown under which heading. The pass/
// fail math for "ready" (computeBuyReadiness) is untouched — still every
// one of the 6 checks, required or supporting, has to pass. Splitting the
// display just stops a nice-to-have (earnings clear) from visually
// outweighing a load-bearing one (entry zone defined).
function renderRequiredSupportingChecklist(checks) {
  const req = checks.filter(c=>c.required);
  const sup = checks.filter(c=>!c.required);
  const row = c => `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;"><span style="font-size:15px;flex-shrink:0;">${c.pass?'☑️':c.unknown?'▫️':'⬜'}</span><span style="color:${c.pass?C.text:C.textSub};font-size:12.5px;line-height:1.5;">${c.label}${c.unknown?' (not tracked yet)':''}</span></div>`;
  return `
    <div style="color:${C.textMuted};font-size:9px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Required Conditions</div>
    ${req.map(row).join('')}
    ${sup.length?`<div style="color:${C.textMuted};font-size:9px;text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px;">Supporting Evidence</div>${sup.map(row).join('')}`:''}`;
}

// ── WHAT I'M WATCHING NEXT ───────────────────────────────────────────────────
function computeWatchTomorrow(s, stage, type) {
  if(stage==='Managing') return 'Watch for a confirmed breakdown, not just a red day — a single down day inside a healthy trend is noise, not a signal.';
  if(stage==='Exiting') return 'Watch whether the exit trigger you\'re following actually completes — don\'t act early on a partial signal.';
  if(stage==='Completed') return 'Nothing to watch — this one\'s closed.';
  const readiness = computeBuyReadiness(s, type);
  const firstFail = readiness.checks.find(c=>!c.pass);
  return firstFail ? `Watch ${firstFail.label.toLowerCase()} — that's the next box to check.` : 'Every box is checked — the only thing left to watch is your own follow-through.';
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION 6 — OPPORTUNITY QUALITY & ARCHIVE LOGIC
// ═══════════════════════════════════════════════════════════════════════════════
// Separates "is this a good stock" from "is this a good trade right now."
// Entry Quality grades the trade math itself (reward:risk, distance to
// resistance, extension). Opportunity Status is the actionable verdict on
// top of it (Active / Watch Closely / Low Priority / Pass-Archive).
//
// Archiving is SUGGESTED, never automatic. The spec describes Pass/Archive
// as something that "removes the stock from the active watchlist," but this
// app has never taken a hiding/destructive action silently — the Section 1
// reclassify banner is the precedent (persistent suggestion, hard block on
// specific actions, never a silent auto-conversion). A stock the app grades
// Pass/Archive stays visible with a clear badge and an Archive button; nothing
// disappears until Kim taps it. Reactivation follows the same rule: the app
// surfaces "conditions have changed, want to reactivate?" rather than
// silently restoring a stock to the active list on its own.

// Single source of truth for the profit target used anywhere reward:risk
// math is needed — Section 4's Buy Readiness gate used to recompute this
// same 52-week-high-or-3x-ATR logic inline; now both call this.
function computeTargetPrice(s, entryRef) {
  if(entryRef==null) return null;
  if(s.hi52 && entryRef<s.hi52) return s.hi52;
  if(s.atr) return entryRef + s.atr*3;
  return null;
}
function computeRewardRiskRatio(s) {
  const gp = computeGamePlan(s);
  const result = {ratio:null, riskPerShare:null, rewardPerShare:null, entryRef:gp.entryRef, stopPrice:gp.stopPrice, targetPrice:null};
  if(gp.entryRef==null || gp.stopPrice==null) return result;
  const riskPerShare = gp.entryRef - gp.stopPrice;
  const targetPrice = computeTargetPrice(s, gp.entryRef);
  result.riskPerShare = riskPerShare;
  result.targetPrice = targetPrice;
  if(riskPerShare<=0 || targetPrice==null || targetPrice<=gp.entryRef) return result; // never fabricate a ratio from bad inputs
  result.rewardPerShare = targetPrice - gp.entryRef;
  result.ratio = result.rewardPerShare / riskPerShare;
  return result;
}
// Classifies the raw ratio into the spec's 4 named bands. Kept distinct from
// Entry Quality's own 3-tier scale (Excellent/Acceptable/Poor) since the
// spec reuses overlapping names for two different scales — Strong folds
// into Excellent for Entry Quality purposes, noted here rather than silently.
function classifyRewardRiskBand(ratio) {
  if(ratio==null) return null;
  if(ratio>=3.0) return 'Excellent';
  if(ratio>=2.0) return 'Strong';
  if(ratio>=1.5) return 'Acceptable';
  return 'Poor';
}

// ── ENTRY QUALITY ────────────────────────────────────────────────────────────
function computeEntryQuality(s, type) {
  const gp = computeGamePlan(s);
  const levels = computeKeyLevels(s);
  const rr = computeRewardRiskRatio(s);

  if(type==='Long-Term Hold') {
    // Spec: don't use short-term resistance as the sole target for LT holds —
    // grade mainly by distance from support instead. No valuation data
    // exists in this app (same gap flagged since Section 4), so this is a
    // structural proxy, not a true valuation-aware grade.
    if(s.price==null || !levels.support) return {quality:'Unavailable', reason:'Not enough data yet to judge entry quality for a long-term hold.', rr};
    const distFromSupportPct = ((s.price - levels.support.price)/levels.support.price)*100;
    let quality = distFromSupportPct<=5 ? 'Excellent' : distFromSupportPct<=12 ? 'Acceptable' : 'Poor';
    return {quality, reason:`Long-term entries are judged mainly by distance from support (currently ${distFromSupportPct.toFixed(1)}% above ${fmtP(levels.support.price)}), not short-term resistance — StockIQ doesn't have valuation data yet to grade this more precisely.`, rr, distFromSupportPct};
  }

  if(rr.ratio==null || gp.entryRef==null) return {quality:'Unavailable', reason:'Reward-to-risk unavailable — not enough data to define entry, stop, and target yet.', rr};

  const band = classifyRewardRiskBand(rr.ratio);
  let quality = (band==='Excellent'||band==='Strong') ? 'Excellent' : band==='Acceptable' ? 'Acceptable' : 'Poor';

  const upsideToResistancePct = levels.resistance ? ((levels.resistance.price - s.price)/s.price)*100 : null;
  const downsideToStopPct = gp.stopPrice!=null ? ((s.price - gp.stopPrice)/s.price)*100 : null;
  const limitedUpsideThreshold = type==='Swing Trade' ? 5 : 8; // Position Trade
  const limitedUpside = upsideToResistancePct!=null && upsideToResistancePct < limitedUpsideThreshold;
  const upsideSmallerThanDownside = upsideToResistancePct!=null && downsideToStopPct!=null && upsideToResistancePct < downsideToStopPct;
  if(limitedUpside || upsideSmallerThanDownside) quality = 'Poor';

  let reason;
  if(quality==='Poor' && upsideSmallerThanDownside) reason = `Upside to resistance (${upsideToResistancePct.toFixed(1)}%) is smaller than downside to the stop (${downsideToStopPct.toFixed(1)}%) — the math doesn't favor this entry.`;
  else if(quality==='Poor' && limitedUpside) reason = `Only ${upsideToResistancePct.toFixed(1)}% upside to resistance before this setup runs out of room.`;
  else if(quality==='Poor') reason = `Reward-to-risk is below 1.5:1 (currently ${rr.ratio.toFixed(1)}:1) — the potential gain doesn't justify the risk.`;
  else if(quality==='Acceptable') reason = `Reward-to-risk is workable (${rr.ratio.toFixed(1)}:1) but not outstanding.`;
  else reason = `Reward-to-risk is strong (${rr.ratio.toFixed(1)}:1) with real room to the target before resistance.`;

  return {quality, reason, rr, upsideToResistancePct, downsideToStopPct};
}

// ── OPPORTUNITY STATUS ───────────────────────────────────────────────────────
function computeOpportunityStatus(s, type) {
  const eq = computeEntryQuality(s, type);
  const gp = computeGamePlan(s);
  const ms = computeMarketState(s);

  if(eq.quality==='Unavailable' || ms.state==='Insufficient Data') {
    return {status:'Watch Closely', reason:'Not enough data yet to judge this opportunity — worth checking again once more data is logged.', eq, ms, gp,
      flags:{tooCloseToResistance:false, isExtended:false, poorRR:false, noTriggerNearby:false, trendDeteriorating:false, insufficientHistory:true}};
  }

  let extendedPct = null;
  if(s.ma50 && s.price) extendedPct = ((s.price - s.ma50)/s.ma50)*100;
  const extendedThreshold = type==='Swing Trade' ? 10 : type==='Position Trade' ? 15 : null;
  const isExtended = extendedThreshold!=null && extendedPct!=null && extendedPct>extendedThreshold;

  const tooCloseThreshold = type==='Swing Trade' ? 5 : type==='Position Trade' ? 8 : null;
  const tooCloseToResistance = tooCloseThreshold!=null && eq.upsideToResistancePct!=null && eq.upsideToResistancePct < tooCloseThreshold;

  const poorRR = eq.rr && eq.rr.ratio!=null && eq.rr.ratio < 1.5;
  const trendDeteriorating = ['Trend Weakening','Confirmed Breakdown'].includes(ms.state);

  let noTriggerNearby = false;
  if(gp.entryPending && gp.entryRef!=null && s.price!=null && s.atr) {
    noTriggerNearby = (Math.abs(s.price - gp.entryRef)/s.atr) > 3;
  }

  const flags = {tooCloseToResistance, isExtended, poorRR, noTriggerNearby, trendDeteriorating, insufficientHistory:false, extendedPct, tooCloseThreshold, extendedThreshold};

  if(type!=='Long-Term Hold' && (poorRR || tooCloseToResistance || isExtended || noTriggerNearby || eq.quality==='Poor')) {
    const reasons = [];
    if(poorRR) reasons.push(`reward-to-risk is below 1.5:1 (${eq.rr.ratio.toFixed(1)}:1)`);
    if(tooCloseToResistance) reasons.push(`only ${eq.upsideToResistancePct.toFixed(1)}% upside before resistance`);
    if(isExtended) reasons.push(`price is ${extendedPct.toFixed(0)}% above the 50-day average — more extended than this strategy should chase`);
    if(noTriggerNearby) reasons.push(`the preferred entry is too far from current price for a realistic trigger soon`);
    if(!reasons.length) reasons.push('the entry math doesn\'t work right now');
    return {status:'Pass / Archive', reason:`${ms.state} trend, but ${reasons.join(' and ')}. This is a good stock with a poor entry.`, eq, ms, gp, flags};
  }
  if(type==='Long-Term Hold' && eq.quality==='Poor') {
    return {status:'Pass / Archive', reason:eq.reason, eq, ms, gp, flags:{...flags, tooCloseToResistance:false, isExtended:false}};
  }

  let watchClosely = false, watchReason = '';
  if(gp.entryPending && gp.entryRef!=null && s.price!=null && s.atr && (Math.abs(s.price - gp.entryRef)/s.atr)<=1) {
    watchClosely = true; watchReason = `Within about 1 ATR of the preferred entry near ${fmtP(gp.entryRef)} — one realistic move away from actionable.`;
  }
  if(!watchClosely && ms.state==='Normal Pullback') { watchClosely = true; watchReason = 'Pulling back toward support — one confirmation away from actionable.'; }
  if(!watchClosely && ms.state==='Consolidation' && eq.upsideToResistancePct!=null && eq.upsideToResistancePct < (tooCloseThreshold||8)*2) { watchClosely = true; watchReason = 'Consolidating beneath resistance — a breakout or breakdown could make this actionable soon.'; }
  if(watchClosely) return {status:'Watch Closely', reason:watchReason, eq, ms, gp, flags};

  if(!gp.entryPending && (eq.quality==='Excellent'||eq.quality==='Acceptable') && !['Confirmed Breakdown','Trend Weakening'].includes(ms.state)) {
    return {status:'Active Opportunity', reason:'The setup is actionable or very close, with a favorable reward-to-risk.', eq, ms, gp, flags};
  }

  return {status:'Low Priority', reason:'Nothing is wrong with the stock. There is simply no compelling trade here right now.', eq, ms, gp, flags};
}
const OPPORTUNITY_STATUS_META = {
  'Active Opportunity': {color:C.green,  icon:'🟢'},
  'Watch Closely':      {color:C.yellow, icon:'🟡'},
  'Low Priority':       {color:C.textMuted, icon:'⚪'},
  'Pass / Archive':     {color:C.orange, icon:'📦'},
};
const OPPORTUNITY_STATUS_RANK = {'Pass / Archive':0, 'Low Priority':1, 'Watch Closely':2, 'Active Opportunity':3};

// ── ARCHIVE MECHANICS (suggested, never automatic) ──────────────────────────
function archiveStock(id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  const opp = computeOpportunityStatus(s, s.type);
  const ms = computeMarketState(s);
  const rr = computeRewardRiskRatio(s);
  const updated = {...s,
    archived:true,
    archiveDate: today(),
    archiveReason: opp.reason,
    archivePriceAtArchive: s.price,
    archiveMarketStateAtArchive: ms.state,
    archiveEntryQualityAtArchive: opp.eq.quality,
    archiveOpportunityStatusAtArchive: opp.status,
    archiveRewardRiskAtArchive: rr.ratio,
  };
  stocks = stocks.map(x=>String(x.id)===String(id)?updated:x);
  scheduleSave(updated);
  renderHome();
  closeAllOverlays();
}
function reactivateStock(id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  const updated = {...s, archived:false, archiveDate:null, archiveReason:null, archivePriceAtArchive:null,
    archiveMarketStateAtArchive:null, archiveEntryQualityAtArchive:null, archiveOpportunityStatusAtArchive:null, archiveRewardRiskAtArchive:null};
  stocks = stocks.map(x=>String(x.id)===String(id)?updated:x);
  scheduleSave(updated);
  renderHome();
  closeAllOverlays();
}
// Review-based, never automatic. Only surfaces when the change is MATERIAL —
// one of four specific triggers Kim approved, not "anything looks a little
// different now." Returns an array of specific reasons, or null.
function checkReactivationSuggested(s) {
  if(!s.archived) return null;
  const opp = computeOpportunityStatus(s, s.type);
  const gp = computeGamePlan(s);
  const rr = computeRewardRiskRatio(s);
  const reasons = [];

  // 1. Opportunity Status improved by a full level or more
  const archivedRank = OPPORTUNITY_STATUS_RANK[s.archiveOpportunityStatusAtArchive];
  const currentRank = OPPORTUNITY_STATUS_RANK[opp.status];
  if(archivedRank!=null && currentRank!=null && currentRank - archivedRank >= 1) {
    reasons.push(`Opportunity Status improved from ${s.archiveOpportunityStatusAtArchive} to ${opp.status}.`);
  }

  // 2. Reward-to-risk crosses above the 1.5:1 threshold
  const wasBelowThreshold = s.archiveRewardRiskAtArchive!=null ? s.archiveRewardRiskAtArchive<1.5 : true;
  if(rr.ratio!=null && rr.ratio>=1.5 && wasBelowThreshold) {
    reasons.push(`Reward-to-risk is now ${rr.ratio.toFixed(1)}:1, above the 1.5:1 threshold.`);
  }

  // 3. Entry Quality moved from Poor to Acceptable or better
  if(s.archiveEntryQualityAtArchive==='Poor' && ['Acceptable','Excellent'].includes(opp.eq.quality)) {
    reasons.push(`Entry Quality improved from Poor to ${opp.eq.quality}.`);
  }

  // 4. Price within about 1 ATR of the preferred entry zone
  if(gp.entryPending && gp.entryRef!=null && s.price!=null && s.atr && (Math.abs(s.price-gp.entryRef)/s.atr)<=1) {
    reasons.push(`Price is now within about 1 ATR of the preferred entry near ${fmtP(gp.entryRef)}.`);
  } else if(!gp.entryPending && gp.buyZone && gp.buyZone!=='Waiting on more data') {
    reasons.push('Price has reached the preferred entry zone.');
  }

  return reasons.length ? reasons : null;
}

// Price line chart from your snapshot history, with 50/200-day SMA overlays
// when that data is present. Plain SVG — no chart library, matches app style.
// ═══════════════════════════════════════════════════════════════════════════════
// DECISION EXPLANATION PILLS
// ═══════════════════════════════════════════════════════════════════════════════
// Makes the four header pills (Opportunity, Market State, Position Type,
// Entry Quality) clickable, each opening a short sheet answering "why did
// you decide that?" — reusing the existing engines (computeOpportunityStatus,
// computeMarketState, suggestHoldTypeLive, computeEntryQuality) rather than
// building a second opinion. Reward:risk always leads with real dollar
// language ("you're risking about $X to potentially make $Y"); the X:1
// ratio is demoted to secondary "trader shorthand" detail, never the lead.

// ── PASS / ARCHIVE: single main reason, up to 2 supporting ──────────────────
// Fixed priority order per spec — first true flag wins as the main reason.
const PASS_REASON_PRIORITY = [
  {key:'tooCloseToResistance', label:'Too close to resistance'},
  {key:'isExtended',           label:'Too extended above support'},
  {key:'poorRR',                label:'Weak reward compared with potential loss'},
  {key:'trendDeteriorating',   label:'Trend is deteriorating'},
  {key:'noTriggerNearby',      label:'Setup lacks confirmation'},
  {key:'insufficientHistory',  label:'Insufficient historical data'},
];
function passReasonDetail(key, s, type, opp) {
  const eq = opp.eq, gp = opp.gp, flags = opp.flags;
  const levels = computeKeyLevels(s);
  switch(key) {
    case 'tooCloseToResistance':
      return `Only ${eq.upsideToResistancePct.toFixed(1)}% upside remains before the stock reaches ${levels.resistance?levels.resistance.label.toLowerCase():'resistance'}. Your proposed stop allows roughly ${eq.downsideToStopPct!=null?eq.downsideToStopPct.toFixed(1):'—'}% downside, so the upside doesn't justify the risk.`;
    case 'isExtended':
      return `Price is ${flags.extendedPct.toFixed(0)}% above the 50-day average — more extended than a ${type||'this strategy'} should chase. Entries this far from support tend to give back the move before it's confirmed.`;
    case 'poorRR':
      return (eq.rr && eq.rr.riskPerShare!=null && eq.rr.rewardPerShare!=null)
        ? `You'd be risking about $${eq.rr.riskPerShare.toFixed(2)} to potentially make $${eq.rr.rewardPerShare.toFixed(2)} — the potential gain doesn't cover the risk.`
        : `Reward-to-risk doesn't work out favorably here.`;
    case 'trendDeteriorating':
      return `The trend itself is showing real weakness right now (${opp.ms.state}), not just a normal pullback — chasing an entry into a deteriorating trend adds risk on top of a weak setup.`;
    case 'noTriggerNearby':
      return `The preferred entry near ${gp.entryRef!=null?fmtP(gp.entryRef):'—'} is too far from today's price for a realistic trigger anytime soon.`;
    case 'insufficientHistory':
      return `StockIQ doesn't have enough logged history yet to responsibly grade this opportunity.`;
    default:
      return 'The entry math doesn\'t work right now.';
  }
}
function computePassReasons(s, type) {
  const opp = computeOpportunityStatus(s, type);
  const trueFlags = PASS_REASON_PRIORITY.filter(r => opp.flags[r.key]);
  return {main: trueFlags[0]||null, supporting: trueFlags.slice(1,3), opp};
}

// ── OPPORTUNITY STATUS PILL ──────────────────────────────────────────────────
function explainOpportunityStatus(s, type) {
  const opp = computeOpportunityStatus(s, type);
  if(opp.status!=='Pass / Archive') return {status:opp.status, isPass:false, headline:opp.reason, opp};

  const {main, supporting} = computePassReasons(s, type);
  const gp = opp.gp, eq = opp.eq, rr = eq.rr;
  const gainDollar = rr && rr.rewardPerShare!=null ? rr.rewardPerShare : null;
  const gainPct = (rr && rr.targetPrice!=null && gp.entryRef!=null) ? ((rr.targetPrice-gp.entryRef)/gp.entryRef)*100 : null;
  const lossDollar = rr && rr.riskPerShare!=null ? rr.riskPerShare : null;
  const lossPct = (gp.stopPrice!=null && gp.entryRef!=null) ? ((gp.entryRef-gp.stopPrice)/gp.entryRef)*100 : null;
  const plainDollar = (lossDollar!=null && gainDollar!=null) ? `You're risking about $${lossDollar.toFixed(2)} to potentially make $${gainDollar.toFixed(2)}.` : null;

  return {
    status:opp.status, isPass:true, opp,
    mainReasonLabel: main ? main.label : 'Weak setup',
    mainReasonText: main ? passReasonDetail(main.key, s, type, opp) : 'The entry math doesn\'t work right now.',
    supportingReasons: supporting.map(r=>({label:r.label, text:passReasonDetail(r.key, s, type, opp)})),
    plainDollar, gainDollar, gainPct, lossDollar, lossPct, ratio: rr?rr.ratio:null,
  };
}

// ── MARKET STATE PILL ────────────────────────────────────────────────────────
const MARKET_STATE_EXPLAIN = {
  'Healthy Uptrend':   'The trend is strong because price remains above its key moving averages, and the longer-term averages are rising. That describes the health of the trend — not whether today is a good entry.',
  'Normal Pullback':   'The long-term trend remains healthy, but price is cooling off toward support. That\'s normal, healthy behavior inside an uptrend — not a change in the trend itself.',
  'Consolidation':     'Neither buyers nor sellers are currently in control. The stock is resting, not confirming a new direction yet.',
  'Trend Weakening':   'Momentum and structure are both showing real cracks — this isn\'t just a normal pullback anymore.',
  'Confirmed Breakdown':'The prior trend has actually failed on the data — support broke, and volume confirmed it.',
  'Recovery Attempt':  'A previous breakdown is trying to reverse, but it isn\'t confirmed yet — early strength can still fail.',
  'Insufficient Data': 'StockIQ doesn\'t have enough saved history yet to characterize the trend.',
};
function explainMarketState(s) {
  const ms = computeMarketState(s);
  const meta = MARKET_STATE_META[ms.state] || MARKET_STATE_META['Insufficient Data'];
  const metConditions = ms.conditions.filter(c=>c.evaluable&&c.met);
  return {state:ms.state, meta, ms, explain: MARKET_STATE_EXPLAIN[ms.state]||MARKET_STATE_EXPLAIN['Insufficient Data'], metConditions};
}

// ── POSITION TYPE PILL ───────────────────────────────────────────────────────
// "Selected Strategy" (s.type) vs "Current Technical Fit" (suggestHoldTypeLive)
// stay explicitly separate — this pill recommends, it never silently changes
// the user's chosen strategy.
function explainPositionType(s) {
  const type = s.type;
  const fit = suggestHoldTypeLive(s);
  const slope = computeMASlope(s);
  const gp = computeGamePlan(s);
  const fitLabel = fit && fit.confident ? fit.label : (fit && fit.longTermCandidate ? 'Long-Term Hold (needs research)' : 'Unclear from current data');
  const agrees = !!(fit && fit.confident && fit.label===type);

  const whyFits = [];
  if(type==='Position Trade') {
    if(s.price!=null && s.ma200!=null && s.price>s.ma200) whyFits.push('Price remains above the 200-day average.');
    if(slope && slope.rising50) whyFits.push('The 50-day trend is rising.');
    if(s.atr && s.price) whyFits.push(`Daily movement (ATR ${((s.atr/s.price)*100).toFixed(1)}%) is meaningful but not extreme.`);
    whyFits.push('Setup may need several weeks to develop.');
  } else if(type==='Swing Trade') {
    if(gp.stopPrice!=null && gp.profit!=='—') whyFits.push('There\'s a defined technical setup here — a real stop and target.');
    if(s.atr && s.price && (s.atr/s.price)*100>=2) whyFits.push(`Daily movement (ATR ${((s.atr/s.price)*100).toFixed(1)}%) is enough to create a shorter-term opportunity.`);
    if(!whyFits.length) whyFits.push('Not enough data yet to confirm a clean short-term setup.');
  } else if(type==='Long-Term Hold') {
    if(s.price!=null && s.ma200!=null && s.price>s.ma200) whyFits.push('Price remains above the 200-day average.');
    whyFits.push('Technical data can confirm a long-term trend, but business quality, valuation, earnings growth, and competitive strength still require research StockIQ can\'t do from a chart.');
  }

  const whyNotOthers = {};
  ['Swing Trade','Position Trade','Long-Term Hold'].filter(t=>t!==type).forEach(t=>{
    if(t==='Swing Trade') whyNotOthers[t] = (gp.stopPrice==null||gp.profit==='—') ? 'The entry is too close to resistance, or a short-term confirmation is still missing.' : 'A swing setup exists technically, but that\'s not the strategy chosen for this stock.';
    else if(t==='Position Trade') whyNotOthers[t] = 'The steadier, several-weeks-to-months trend context a Position Trade relies on isn\'t what\'s being tracked for this stock.';
    else if(t==='Long-Term Hold') whyNotOthers[t] = 'Technical data alone can\'t confirm a long-term thesis — business quality, valuation, and competitive strength require research outside the chart.';
  });

  return {type, fit, fitLabel, agrees, whyFits, whyNotOthers};
}

// ── ENTRY QUALITY PILL ───────────────────────────────────────────────────────
function explainEntryQuality(s, type) {
  const eq = computeEntryQuality(s, type);
  const levels = computeKeyLevels(s);
  const gp = computeGamePlan(s);
  let betterEntry = null;
  if(eq.quality==='Poor' && gp.entryRef!=null && !gp.entryPending) {
    betterEntry = `Better entry: wait for price near ${fmtP(gp.entryRef)}, where the same target would offer more upside with less risk.`;
  } else if(eq.quality==='Poor' && gp.entryPending && gp.entryRef!=null) {
    betterEntry = `Better entry: this is already what StockIQ suggests — wait for the pullback to ${fmtP(gp.entryRef)}.`;
  }
  return {eq, levels, gp, betterEntry};
}

// ── SHEET RENDERERS ──────────────────────────────────────────────────────────
function pillSheetHeader(title, color) {
  return `
    <div style="width:36px;height:4px;border-radius:2px;background:${C.border};margin:0 auto 18px;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="color:${color};font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;">${title}</span>
      <button onclick="closeAllOverlays()" style="background:none;border:none;color:${C.textMuted};font-size:20px;cursor:pointer;">✕</button>
    </div>`;
}

function showOpportunitySheet(id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  const ex = explainOpportunityStatus(s, s.type);
  const meta = OPPORTUNITY_STATUS_META[ex.status];

  if(!ex.isPass) {

// ═══════════════════════════════════════════════════════════════════════════════
// BIGGEST CONCERN / NEXT TRIGGER
// ═══════════════════════════════════════════════════════════════════════════════
// Replaces the old "What Concerns Me" (Analysis tab) and "Next Catalyst"
// (Game Plan tab) — which both drew from computeWatchOuts and ended up
// saying the same thing two ways ("buyers haven't defended the 50-day" /
// "watch for buyers to defend the 50-day"). These now have distinct jobs:
// Biggest Concern explains why you're cautious (one risk, prioritized).
// Next Trigger is the one specific, numeric event that would change today's
// call — never a vague "watch volume."
function computeBiggestConcern(s, type) {
  const opp = computeOpportunityStatus(s, type);
  const eq = opp.eq;
  const levels = computeKeyLevels(s);
  const candidates = [];

  if(opp.flags.insufficientHistory) candidates.push({p:0, text:'StockIQ doesn\'t have enough logged history yet to be confident in this read.'});
  if(eq.upsideToResistancePct!=null && levels.resistance) {
    const threshold = type==='Swing Trade'?5:type==='Position Trade'?8:12;
    if(eq.upsideToResistancePct < threshold) candidates.push({p:1, text:`The stock is only ${eq.upsideToResistancePct.toFixed(1)}% below ${levels.resistance.label.toLowerCase()}, limiting upside.`});
  }
  if(s.earningsDate) {
    const days = Math.round((new Date(s.earningsDate) - new Date())/(1000*60*60*24));
    if(days>=0 && days<=14) candidates.push({p:2, text:`Earnings are in ${days} day${days===1?'':'s'} and could invalidate the current setup.`});
  }
  const upDayVol = computeVolumeOnUpDays(s);
  if(upDayVol && upDayVol.ratio<1) candidates.push({p:3, text:'Institutions are not yet buying aggressively — volume on down days still outweighs volume on up days.'});
  else { const setup = analyzeSetup(s); if(setup.volRatio!=null && !setup.volConfirmed) candidates.push({p:3, text:'Volume is quiet right now — the current move doesn\'t have strong conviction behind it yet.'}); }
  if(opp.flags.isExtended) candidates.push({p:4, text:`Price is ${opp.flags.extendedPct.toFixed(0)}% above the 50-day average — more extended than usual for this strategy.`});
  if(opp.flags.trendDeteriorating) candidates.push({p:5, text:`${opp.ms.state} — the trend itself is showing real cracks, not just a normal pullback.`});
  const rz = rsiZone(s.rsi);
  if(rz && rz.zone==='hot') candidates.push({p:6, text:'RSI is stretched — a pullback could come at any time.'});
  if(eq.rr && eq.rr.ratio!=null && eq.rr.ratio<1.5) candidates.push({p:7, text:`Reward-to-risk doesn't favor this trade right now (about ${eq.rr.ratio.toFixed(1)}:1).`});

  candidates.sort((a,b)=>a.p-b.p);
  return candidates.length ? candidates[0].text : 'Nothing significant is working against this case right now — that itself is worth noting, not just assuming.';
}
// computeNextTrigger retired in favor of computeTodaysFocus below — left
// defined, unused, same pattern as every other retired function this
// session (computeSetupScore, computeRiskBasedSizing, etc.).
function computeNextTrigger(s, type) {
  const ms = computeMarketState(s);
  const gp = computeGamePlan(s);
  const levels = computeKeyLevels(s);
  switch(ms.state) {
    case 'Normal Pullback':
      return `Close above ${fmtP(s.ma20)} on above-average volume, or a bounce off ${fmtP(s.ma50)} (the 50-day) with increasing volume.`;
    case 'Consolidation':
      return levels.resistance ? `A close above ${fmtP(levels.resistance.price)} on above-average volume would confirm a breakout.` : 'A clear break of the current range on above-average volume.';
    case 'Trend Weakening':
      return `Price reclaiming ${fmtP(s.ma20)}, with RSI rising back above 50 while price holds support.`;
    case 'Confirmed Breakdown':
      return `A close back above ${fmtP(s.ma50)} on above-average volume — anything less is just a bounce.`;
    case 'Recovery Attempt':
      return `A higher low holding above the recent bottom, confirmed by price reclaiming ${fmtP(s.ma50)}.`;
    case 'Healthy Uptrend':
      return gp.entryPending && gp.entryRef!=null ? `A pullback toward ${fmtP(gp.entryRef)} would offer a better entry than chasing here.` : 'Nothing specific to wait for — the setup is already healthy and actionable.';
    default:
      return 'Not enough data yet to define a specific trigger.';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// TODAY'S FOCUS — one thing to watch, one thing to ignore, backed by real numbers
// ═══════════════════════════════════════════════════════════════════════════════
// Replaces Next Trigger. Same "one specific numeric condition" job, plus the
// genuinely new half: what's safe to tune out today. Every level named here
// also appears in the Supporting Data Box directly below it — no coaching
// statement points at a number the user can't immediately see.
function computeTodaysFocus(s, type) {
  const ms = computeMarketState(s);
  const gp = computeGamePlan(s);
  const levels = computeKeyLevels(s);
  switch(ms.state) {
    case 'Healthy Uptrend':
      if(gp.entryPending && gp.entryRef!=null) return {watchLabel:'Pullback toward', watchValue:fmtP(gp.entryRef), ignore:['RSI — momentum is already confirmed, it won\'t tell you anything new today'], why:'The trend is healthy. The only open question is entry timing, not direction.'};
      return {watchLabel:'Trend continuation', watchValue:null, ignore:['Short-term RSI wobble — it\'s noise inside a confirmed trend'], why:'Nothing specific to wait for — the setup is already healthy and actionable.'};
    case 'Normal Pullback':
      return {watchLabel:'Reclaim of', watchValue:fmtP(s.ma20), ignore:['RSI and MACD — they lag during a normal pullback and won\'t lead the decision'], why:'Today\'s question is whether buyers defend support, not what the indicators say.'};
    case 'Consolidation':
      return {watchLabel:'Breakout above', watchValue: levels.resistance?fmtP(levels.resistance.price):null, ignore:['Day-to-day price noise inside the range'], why:'Nothing here means anything until the range actually breaks.'};
    case 'Trend Weakening':
      return {watchLabel:'Reclaim of', watchValue:fmtP(s.ma20), ignore:['Any single green day without volume behind it'], why:'Real deterioration needs a real reversal to prove it wrong — not hope.'};
    case 'Confirmed Breakdown':
      return {watchLabel:'Reclaim of', watchValue:fmtP(s.ma50), ignore:['Any bullish MACD blip — that\'s a bounce, not a reversal'], why:'The trend already broke. Only a real reclaim on volume changes that.'};
    case 'Recovery Attempt':
      return {watchLabel:'Higher low holding above', watchValue:fmtP(s.ma50), ignore:['Single green days without volume to confirm them'], why:'Early strength can still fail — confirmation is what matters, not hope.'};
    default:
      return {watchLabel:null, watchValue:null, ignore:[], why:'Not enough data yet to tell you what to watch or ignore.'};
  }
}
// Every number a coaching statement references, in one place — no hunting

  return {

    ma50: s.ma50,
    volRatio: (s.vol && s.avgvol) ? s.vol/s.avgvol : null,

}

// INVESTMENT POTENTIAL — rare, binary, no manufactured 1-5 scale
// ═══════════════════════════════════════════════════════════════════════════════
// Only appears when technicals AND the AI research signal both genuinely
// support a long-term case. No middling rating — this app has no real
// valuation data, only whatever's pasted from research, so a star scale
// would fake precision the app doesn't have. It's binary: exceptional, or
// nothing shown at all. Independent of the stock's selected Position Type —
// a Swing Trade candidate can still be a business worth owning long-term.
function computeInvestmentPotential(s) {
  const ms = computeMarketState(s);
  const conviction = computeConviction(s);
  const aiSignal = computeAIResearchSignal(s);
  const strongTechnical = ['Healthy Uptrend','Normal Pullback'].includes(ms.state) && conviction.level==='High';
  const strongFundamental = aiSignal.signal==='Supports';
  if(!strongTechnical || !strongFundamental) return null;

  const reasons = [ms.state==='Healthy Uptrend' ? 'Healthy long-term trend' : 'Long-term trend intact through a normal pullback',
    'High conviction across trend, momentum, and volume', 'Your AI research supports the long-term case'];
  return {reasons, action:'Use pullbacks to build a long-term position rather than chasing strength.'};
}
function renderInvestmentPotentialCard(s) {
  const ip = computeInvestmentPotential(s);
  if(!ip) return ''; // not exceptional — no placeholder, no wasted space

// Forward math from the user's actual planned investment (the existing,
// already-editable budget field) — Investment / Entry -> Shares -> dollar
// Risk and Reward. This supersedes the earlier "Risk-Based Size (advisory)"
// card, which worked backward from a max-dollar-risk input; that was a
// reasonable first cut, but this is what Kim actually asked for: the real
// dollar consequence of the position she's already planning to take, not a
// second, competing sizing philosophy. The max-risk input is retired.
const REWARD_RISK_MIN = {'Swing Trade':2.0, 'Position Trade':1.5};
function computeTradeEconomics(s, type) {
  const gp = computeGamePlan(s);
  const rr = computeRewardRiskRatio(s);
  if(gp.entryRef==null) return {available:false};
  const investment = s.invested||150;
  const shares = investment / gp.entryRef;
  const riskDollar = rr.riskPerShare!=null ? shares*rr.riskPerShare : null;
  const rewardDollar = rr.rewardPerShare!=null ? shares*rr.rewardPerShare : null;
  const threshold = REWARD_RISK_MIN[type] || 1.5;
  const meets = rr.ratio!=null && rr.ratio>=threshold;
  let verdict, verdictText;
  if(rr.ratio==null) { verdict='Unavailable'; verdictText='Reward-to-risk isn\'t available yet — not enough data to define entry, stop, and target.'; }
  else if(meets) { verdict='Yes'; verdictText=`You're risking about $${riskDollar.toFixed(0)} to potentially make $${rewardDollar.toFixed(0)}. The reward is approximately ${rr.ratio.toFixed(1)} times the risk, which meets your ${type||'strategy'} rules.`; }
  else { verdict='No'; verdictText=`You're risking about $${riskDollar.toFixed(0)} to potentially make only $${rewardDollar.toFixed(0)}. This trade does not justify the risk.`; }
  return {available:true, investment, shares, riskDollar, rewardDollar, ratio:rr.ratio, threshold, verdict, verdictText};
}

// ── WHY THIS STOCK? ──────────────────────────────────────────────────────────
// One sentence, first thing visible, right under the price. Everything else
// on the page supports this sentence — it doesn't compete with it.
function computeWhyThisStock(s) {
  const type = s.type;
  const opp = computeOpportunityStatus(s, type);
  const ms = opp.ms, eq = opp.eq;
  const stateAdj = {
    'Healthy Uptrend': 'a healthy uptrend', 'Normal Pullback': 'a normal pullback inside a healthy uptrend',
    'Consolidation': 'consolidation, without clear direction yet', 'Trend Weakening': 'a weakening trend',
    'Confirmed Breakdown': 'a confirmed breakdown', 'Recovery Attempt': 'an unconfirmed recovery attempt',
    'Insufficient Data': 'not enough history to characterize the trend',
  }[ms.state] || 'an unclear setup';

  if(opp.status==='Pass / Archive') {
    const {main} = computePassReasons(s, type);
    const goodCompany = ['Healthy Uptrend','Normal Pullback'].includes(ms.state);
    return `${goodCompany?'Solid trend, poor entry':'Weak setup'} — ${main?main.label.toLowerCase():'the entry math doesn\'t work'} right now.`;
  }
  if(opp.status==='Active Opportunity') return `In ${stateAdj}, with a ${eq.quality.toLowerCase()} entry — one of the more actionable setups on your list right now.`;
  if(opp.status==='Watch Closely') return `In ${stateAdj} — close, but not confirmed yet.`;
  if(opp.status==='Low Priority') return `In ${stateAdj}, but no compelling trade here right now.`;
  return 'Not enough data yet to size up this opportunity.';
}

// ═══════════════════════════════════════════════════════════════════════════════
// OPPORTUNITY RANKING ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
// Answers "where should my next dollar go" — not "which stock has the
// nicest chart." Two stages: eliminate anything not actionable, then order
// survivors by a fixed decision tree (never a weighted score, so there's
// nothing to silently re-litigate later): Opportunity Status > Entry
// Quality > Conviction > AI Research. Reward:risk and dollar figures are
// deliberately excluded — those belong to the Game Plan, once a stock is
// already selected, not to deciding which stock gets attention first.

// Reads the AI-research "Bottom Line" for exactly the three phrases the
// prompt itself asks the external AI to use ("more/equally/less
// confident"). This is a deterministic phrase match on wording StockIQ
// controls, not a sentiment-analysis guess at freeform text — the
// "never manufacture precision" rule applies here most of all.
function computeAIResearchSignal(s) {
  const parsed = parseResearch(s.research);
  if(!parsed || !parsed.bottomLine) return {signal:'No Research', rank:2};
  const bl = parsed.bottomLine.toLowerCase();
  if(/more confident/.test(bl)) return {signal:'Supports', rank:3};
  if(/less confident/.test(bl)) return {signal:'Contradicts', rank:1};
  if(/equally confident/.test(bl)) return {signal:'Neutral', rank:2};
  return {signal:'Neutral', rank:2}; // didn't follow the expected phrasing — don't guess further
}

const OPP_STATUS_RANK = {'Active Opportunity':3, 'Watch Closely':2, 'Low Priority':1, 'Pass / Archive':0};
const ENTRY_QUALITY_RANK = {'Excellent':3, 'Acceptable':2, 'Poor':1, 'Unavailable':0};
const CONVICTION_RANK_MAP = {'High':3, 'Moderate':2, 'Low':1, 'Insufficient Evidence':0};
const MS_STRENGTH_RANK = {Strong:3, Moderate:2, Weak:1, Unknown:0};

function computeOpportunityRankItem(s) {
  const type = s.type;
  const opp = computeOpportunityStatus(s, type);
  const conviction = computeConviction(s);
  const aiSignal = computeAIResearchSignal(s);
  const ms = opp.ms;
  // Stage 1 — elimination. These don't get ranked, they sink to the bottom.
  const eliminated = opp.status==='Pass / Archive' || opp.eq.quality==='Poor' || conviction.level==='Insufficient Evidence';
  return {
    s, opp, conviction, aiSignal, ms, eliminated,
    oppRank: OPP_STATUS_RANK[opp.status] ?? 0,
    eqRank: ENTRY_QUALITY_RANK[opp.eq.quality] ?? 0,
    convRank: CONVICTION_RANK_MAP[conviction.level] ?? 0,
    aiRank: aiSignal.rank,
    msStrength: mapStateToStrength(ms.state),
  };
}
// Stage 2 — decision tree, not a weighted score. Ties break on Market State
// strength, then liquidity, then ticker — never on reward:risk.
function compareOpportunityRank(a, b) {
  if(a.eliminated!==b.eliminated) return a.eliminated ? 1 : -1;
  if(b.oppRank!==a.oppRank) return b.oppRank-a.oppRank;
  if(b.eqRank!==a.eqRank) return b.eqRank-a.eqRank;
  if(b.convRank!==a.convRank) return b.convRank-a.convRank;
  if(b.aiRank!==a.aiRank) return b.aiRank-a.aiRank;
  const msA = MS_STRENGTH_RANK[a.msStrength]||0, msB = MS_STRENGTH_RANK[b.msStrength]||0;
  if(msB!==msA) return msB-msA;
  const avA = a.s.avgvol||0, avB = b.s.avgvol||0;
  if(avB!==avA) return avB-avA;
  return (a.s.ticker||'').localeCompare(b.s.ticker||'');
}
function computeOpportunityRanking(stockList) {
  const items = (stockList||[]).filter(s=>!s.archived).map(computeOpportunityRankItem);
  items.sort(compareOpportunityRank);
  return items;
}

function joinNatural(parts) {
  const clean = parts.filter(Boolean);
  if(!clean.length) return 'a workable setup';
  if(clean.length===1) return clean[0];
  return clean.slice(0,-1).join(', ') + ', and ' + clean[clean.length-1];
}
// One sentence per ranked stock — never mentions reward:risk, dollar risk,
// profit target, or stop. Those live in the Game Plan, not the ranking.
function computeRankingSentence(item) {
  const {opp, conviction, aiSignal, ms} = item;
  if(item.eliminated) {
    if(opp.status==='Pass / Archive') { const {main} = computePassReasons(item.s, item.s.type); return `${main?main.label:'Weak entry'} — not worth prioritizing right now.`; }
    if(opp.eq.quality==='Poor') return 'Entry quality is poor right now — worth waiting for a better price.';
    return 'Not enough history yet to responsibly rank this one.';
  }
  const parts = [];
  if(opp.eq.quality==='Excellent') parts.push('an excellent entry');
  else if(opp.eq.quality==='Acceptable') parts.push('a workable entry');
  const stateText = {
    'Healthy Uptrend':'a healthy trend', 'Normal Pullback':'a healthy pullback into support',
    'Consolidation':'a tightening range', 'Recovery Attempt':'an early recovery attempt',
    'Trend Weakening':'a weakening trend', 'Confirmed Breakdown':'a broken trend',
  }[ms.state];
  if(stateText) parts.push(stateText);
  if(conviction.level==='High') parts.push('high conviction across the evidence');
  else if(conviction.level==='Moderate') parts.push('moderate conviction');
  if(aiSignal.signal==='Supports') parts.push('fundamentals that support the setup');
  else if(aiSignal.signal==='Contradicts') parts.push('fundamentals that argue against it');

  let sentence = joinNatural(parts) + '.';
  sentence = sentence.charAt(0).toUpperCase()+sentence.slice(1);
  if(opp.status==='Watch Closely') sentence += ' Still needs confirmation before this becomes actionable.';
  else if(opp.status==='Low Priority') sentence += ' Not compelling enough to prioritize right now.';
  return sentence;
}

function renderPriceChart(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.price!=null);
  if(snaps.length<2) {
    return `
    <div style="background:${C.card};border-radius:16px;border:1px solid ${C.border};padding:18px;">
      <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Price Trend</div>
      <div style="color:${C.textSub};font-size:13px;text-align:center;padding:26px 0;">Not enough history yet. Keep logging daily updates, or import a CSV, to see the chart.</div>
    </div>`;
  }

  const W=320, H=220, padL=4, padR=4, padT=10, padB=6;
  const has50 = snaps.some(sn=>sn.ma50!=null);
  const has200 = snaps.some(sn=>sn.ma200!=null);
  const allVals = [
    ...snaps.map(sn=>sn.price),
    ...(has50?snaps.filter(sn=>sn.ma50!=null).map(sn=>sn.ma50):[]),
    ...(has200?snaps.filter(sn=>sn.ma200!=null).map(sn=>sn.ma200):[])
  ];
  const min = Math.min(...allVals), max = Math.max(...allVals);
  const range = (max-min)||1;
  const xStep = (W-padL-padR)/(snaps.length-1);
  const yFor = v => H-padB-((v-min)/range)*(H-padT-padB);
  const xFor = i => padL+i*xStep;

  const pricePts = snaps.map((sn,i)=>`${xFor(i)},${yFor(sn.price)}`).join(' ');
  const ma50Pts  = has50 ? snaps.map((sn,i)=> sn.ma50!=null?`${xFor(i)},${yFor(sn.ma50)}`:null).filter(Boolean).join(' ') : '';
  const ma200Pts = has200 ? snaps.map((sn,i)=> sn.ma200!=null?`${xFor(i)},${yFor(sn.ma200)}`:null).filter(Boolean).join(' ') : '';

  const first = snaps[0], last = snaps[snaps.length-1];

  return `
  <div style="background:${C.card};border-radius:16px;border:1px solid ${C.border};padding:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.08em;">Price Trend</span>
      <div style="display:flex;gap:12px;">
        <span style="color:${C.green};font-size:10px;font-weight:700;">● Price</span>
        ${ma50Pts?`<span style="color:${C.blue};font-size:10px;font-weight:700;">● 50 SMA</span>`:''}
        ${ma200Pts?`<span style="color:${C.purple};font-size:10px;font-weight:700;">● 200 SMA</span>`:''}
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:210px;display:block;">
      <polyline points="${pricePts}" fill="none" stroke="${C.green}" stroke-width="2"/>
      ${ma50Pts?`<polyline points="${ma50Pts}" fill="none" stroke="${C.blue}" stroke-width="1.5" opacity="0.85"/>`:''}
      ${ma200Pts?`<polyline points="${ma200Pts}" fill="none" stroke="${C.purple}" stroke-width="1.5" opacity="0.85"/>`:''}
    </svg>
    <div style="display:flex;justify-content:space-between;margin-top:6px;">
      <span style="color:${C.textMuted};font-size:10px;">${first.date}</span>
      <span style="color:${C.textMuted};font-size:10px;">${last.date}</span>
    </div>
    ${(!has50||!has200)?`<div style="color:${C.text};font-size:11.5px;margin-top:8px;line-height:1.5;">${!has50&&!has200?'50 & 200-day lines need a CSV import — the daily update wizard doesn\'t collect those.':!has50?'50-day line needs a CSV import to appear.':'200-day line needs a CSV import to appear.'}</div>`:''}
  </div>`;
}

        <span style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.08em;">Executive Summary</span>
        <span style="background:${convictionColor}22;color:${convictionColor};border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800;">${conviction.level.toUpperCase()} CONVICTION</span>

      <p style="color:${C.text};font-size:13.5px;line-height:1.75;margin:0;">${computeExecutiveSummary(s, conviction)}</p>

  const evidenceRow = (label, ev) => `
    <div style="border-bottom:1px solid ${C.border};padding:12px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">

  const actionColor = action.action==='Ready for Entry Review'?C.green : /HOLD|CONTINUE/.test(action.action)?C.teal : /WAIT/.test(action.action)?C.yellow : /EXIT|AVOID/.test(action.action)?C.red : /REDUCE|REVIEW/.test(action.action)?C.orange : C.textMuted;

      <button onclick="showTab('plan','${s.id}')" style="width:100%;margin-top:14px;padding:14px;background:${C.cardHigh};color:${C.text};border:1px solid ${C.border};border-radius:14px;font-size:13px;font-weight:800;cursor:pointer;">See My Game Plan →</button>

  const evidenceTableCard = `

  const researchCard = parsedResearch ? `

      ${['sentiment','valuation','fundamentals','risk','blindSpots','stressTest','bottomLine'].filter(k=>parsedResearch[k]).map((k,i,arr)=>{
        const labels = {sentiment:'Analyst Sentiment', valuation:'Valuation', fundamentals:'Fundamentals vs Technicals', risk:'Key Risk', blindSpots:'Blind Spots', stressTest:'Stress Test — Where the AI Disagreed', bottomLine:'Bottom Line'};
        return `<div style="margin-bottom:${i<arr.length-1?'12px':'0'};"><div style="color:${C.textMuted};font-size:9px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;">${labels[k]}</div><p style="color:${C.textSub};font-size:12px;line-height:1.6;margin:0;">${parsedResearch[k]}</p></div>`;
      }).join('')}
    </div>` : '';

  return `
    <div style="display:flex;flex-direction:column;gap:14px;">
      ${execSummaryCard}
      ${concernTriggerCards}
      ${sixtySecondCard}
      ${actionCard}
      <details style="background:${C.card};border-radius:16px;border:1px solid ${C.border};overflow:hidden;">
        <summary style="padding:16px 18px;color:${C.teal};font-size:12.5px;font-weight:800;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;">
          <span>📊 See Full Analysis</span><span style="color:${C.textMuted};font-size:11px;font-weight:600;">Build the Case · Invalidation · Evidence Table · Research</span>
        </summary>
        <div style="padding:0 18px 18px;display:flex;flex-direction:column;gap:14px;">
          ${buildCaseCard}
          ${invalidationCard}
          ${evidenceTableCard}
          ${researchCard}
        </div>

    </div>`;
}
