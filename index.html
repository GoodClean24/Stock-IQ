function stocksRef(uid) { return db.collection('users').doc(uid).collection('stocks'); }

async function fbSaveStock(stock) {

async function fbDeleteStock(id) {

function scheduleSave(stock) {
  showSaveStatus('saving');

      await fbSaveStock(stock);

function showSaveStatus(s) {

let stocks   = [];

let updateStep = 0;
let updateVals = {};

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function parseVol(v) {
  if (!v) return null;
  const s = String(v).trim().toUpperCase();
  if (s.endsWith('B')) return parseFloat(s) * 1e9;
  if (s.endsWith('M')) return parseFloat(s) * 1e6;
  if (s.endsWith('K')) return parseFloat(s) * 1e3;
  return parseFloat(s) || null;
}
function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  return n.toLocaleString();
}
function fmtP(n) { return n != null ? '$'+parseFloat(n).toFixed(2) : '—'; }
function today() {
  return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// RSI classified by what it actually means for a trending stock, not just "overbought/oversold"
function rsiZone(rsi) {
  if(rsi==null) return null;
  if(rsi<30)   return {zone:'panic',  label:'Panic / Oversold',   color:C.green, note:'Sellers look exhausted. This is reversal territory — where beaten-down stocks often turn.'};
  if(rsi<40)   return {zone:'weak',   label:'Weak',               color:C.yellow,note:'Still soft, but drifting toward a bounce zone. Not there yet.'};
  if(rsi<50)   return {zone:'caution',label:'Caution',            color:C.yellow,note:'Neither strong nor weak. No real edge here on its own.'};
  if(rsi<65)   return {zone:'healthy',label:'Healthy Uptrend',    color:C.green, note:'This is where strong, well-behaved uptrends usually sit. Not a warning — a good sign.'};
  if(rsi<75)   return {zone:'strong', label:'Strong Momentum',    color:C.teal,  note:'Real strength. Good stocks can stay here for weeks — this is not automatically "too late."'};
  return           {zone:'hot',    label:'Watch Carefully',    color:C.red,   note:'Stretched further than most healthy trends go. Chasing here is risky — wait for it to cool off.'};
}

// Distance from the 50-day average, turned into a buy/wait zone
function distanceZone(price, ma50) {
  if(!price||!ma50) return null;
  const d = ((price-ma50)/ma50)*100;
  let zone,label,color,note;
  if(d<-5){ zone='broken';  label='Below Support'; color=C.red;   note='Price has broken meaningfully below its 50-day average. The trend may be turning down — proceed with caution.'; }
  else if(d<0){ zone='buy'; label='Buy Zone';       color=C.green;note='Price is testing its 50-day average from below and holding nearby. Classic dip-buy territory if the bigger trend is still up.'; }
  else if(d<5){ zone='buy'; label='Buy Zone';       color=C.green;note='Price just pulled back to its 50-day average and is holding. This is where buyers have historically stepped back in.'; }
  else if(d<10){ zone='healthy'; label='Healthy';   color=C.teal; note='A normal, comfortable distance above support. Not urgent, but nothing wrong here.'; }
  else if(d<20){ zone='extended'; label='Extended'; color=C.yellow;note='Price has run up further than most pullback buyers would chase. Getting in now means paying a premium.'; }
  else{ zone='wait'; label='Overextended — Wait'; color=C.orange; note='Price is stretched far above its average. Either it corrects soon, or you\'re late. Wait for it to come back down.'; }
  return {dist:d, zone, label, color, note};
}

// Turns the raw indicators into an actual game plan — buy zone, target, stop —
// instead of the static placeholder text typed in at add-time.
function computeGamePlan(s) {
  const dz = distanceZone(s.price, s.ma50);
  const atr = s.atr;

  let buyZone = 'Waiting on more data';
  if(s.ma50 && s.price) {
    const lo = s.ma50*0.98, hi = s.ma50*1.03;
    if(dz && (dz.zone==='buy'||dz.zone==='healthy')) buyZone = `${fmtP(lo)} - ${fmtP(hi)}`;
    else if(dz && (dz.zone==='extended'||dz.zone==='wait')) buyZone = `Wait for pullback to ~${fmtP(s.ma50)}`;
    else if(dz && dz.zone==='broken') buyZone = `Below support — wait for trend to repair`;
  }

  let profit = '—';
  if(s.hi52 && s.price && s.price < s.hi52) profit = `${fmtP(s.hi52)} (52-week high)`;
  else if(atr && s.price) profit = `${fmtP(s.price + atr*3)} (3× ATR extension)`;

  let stopRule = 'Set once you have an ATR reading.';
  if(atr && s.price) {
    const stopPrice = (s.price - atr*1.5).toFixed(2);
    stopRule = `Exit if price closes below $${stopPrice} (1.5× ATR below entry). Objective, no-emotion stop, not a gut call.`;
  }

  return {buyZone, profit, stopRule};
}


// Single source of truth for "what's actually going on" — both the ranking
// math (oppScore) and the plain-English narrative read from this, so they
// never disagree with each other.
function analyzeSetup(s) {
  const rz = rsiZone(s.rsi);
  const dz = distanceZone(s.price, s.ma50);
  const volRatio = s.vol&&s.avgvol ? s.vol/s.avgvol : null;
  const volConfirmed = volRatio!=null && volRatio>1.2;
  const trendUp = s.ma50&&s.ma200&&s.price ? (s.price>s.ma50 && s.price>s.ma200) : false;
  const trendBroken = s.ma200&&s.price ? s.price < s.ma200*0.97 : false;
  const nearMA200 = s.ma200&&s.price ? Math.abs((s.price-s.ma200)/s.ma200)<0.05 : false;
  const macdBull = s.macdLine!=null&&s.signalLine!=null&&s.macdLine>s.signalLine;

  const reversalAligned = nearMA200 && rz && (rz.zone==='panic'||rz.zone==='weak') && volConfirmed;
  const pullbackAligned = trendUp && dz && (dz.zone==='buy'||dz.zone==='healthy') && rz && (rz.zone==='caution'||rz.zone==='healthy') && volConfirmed;

  return {rz, dz, volRatio, volConfirmed, trendUp, trendBroken, nearMA200, macdBull, reversalAligned, pullbackAligned};
}

// The overall 0-100 setup score shown on the ring (stock card, quick view, detail header).
// This replaces the old hardcoded "score: 70" that never changed after a stock was added.
// NOTE: this is the one overall score — deliberately NOT four separate category
// sub-scores. Those are too easy to dress up as precise when they're really just
// the same signal relabeled as a number.
function computeSetupScore(s) {
  const setup = analyzeSetup(s);
  const {rz, dz, volConfirmed, trendUp, trendBroken} = setup;

  let trendPts = 0;
  if(trendBroken) trendPts = 0;
  else if(trendUp) trendPts = 30;
  else if(s.ma200&&s.price&&s.price>s.ma200) trendPts = 15;

  let momPts = 8;
  if(rz) {
    if(rz.zone==='healthy') momPts = 25;
    else if(rz.zone==='strong') momPts = 20;
    else if(rz.zone==='panic') momPts = 15;
    else if(rz.zone==='weak') momPts = 10;
    else if(rz.zone==='caution') momPts = 12;
    else if(rz.zone==='hot') momPts = 8;
  }

  const volPts = volConfirmed ? 20 : (setup.volRatio!=null && setup.volRatio>=0.8 ? 10 : 4);

  let riskPts = 10;
  if(dz) {
    if(dz.zone==='buy') riskPts = 25;
    else if(dz.zone==='healthy') riskPts = 18;
    else if(dz.zone==='extended') riskPts = 10;
    else if(dz.zone==='wait') riskPts = 4;
    else if(dz.zone==='broken') riskPts = 0;
  }

  const score = Math.max(0, Math.min(100, Math.round(trendPts+momPts+volPts+riskPts)));
  let label, color;
  if(score>=75){label='STRONG SETUP';color=C.green;}
  else if(score>=55){label='GOOD SETUP';color=C.green;}
  else if(score>=35){label='WEAK SETUP';color=C.yellow;}
  else {label='AVOID SETUP';color=C.red;}

  return {score, label, color};
}

function oppScore(s) {
  const {rz, dz, volConfirmed, trendUp, trendBroken, reversalAligned, pullbackAligned} = analyzeSetup(s);

  let score=0, reason='Monitoring', signals=0;

  if(s.verdict==='Buy Zone') score+=15;
  else if(s.verdict==='Watch') score+=8;
  else if(s.verdict==='Pass') score-=15;

  if(reversalAligned){ score+=50; signals=4; reason='Reversal setup — signals aligned'; }
  else if(pullbackAligned){ score+=50; signals=4; reason='Pullback in uptrend — signals aligned'; }
  else {
    let partial=0;
    if(trendUp){partial+=8;signals++;}
    if(dz&&dz.zone==='buy'){partial+=8;signals++;}
    if(rz&&(rz.zone==='healthy'||rz.zone==='panic')){partial+=6;signals++;}
    if(volConfirmed){partial+=6;signals++;}
    score+=partial;
    reason = signals>=2 ? `${signals} of 4 signals lining up` : signals===1 ? 'Only one signal present' : 'Monitoring';
  }

  if(trendBroken){ score-=20; reason='Below long-term support'; }
  if(dz&&dz.zone==='wait') score-=10;
  if(rz&&rz.zone==='hot') score-=8;

  return {oppScore:Math.max(0,score), reason, signals};
}

function splitBudget(budget, count) {
  const b = parseFloat(budget)||0;
  if(count===1) return [b];
  if(count===2) return [Math.round(b*0.4), Math.round(b*0.6)];
  if(count===3) return [Math.round(b*0.3), Math.round(b*0.3), Math.round(b*0.4)];
  const each = Math.round(b/count);
  return Array(count).fill(each);
}

function getRanked() {
  return [...stocks]
    .map(s => {const o=oppScore(s);return{...s,...o};})
    .sort((a,b) => {
      if(a.starred&&!b.starred) return -1;
      if(!a.starred&&b.starred) return 1;
      return b.oppScore-a.oppScore;
    });
}

function getSignal(s) {
  const {rsi,vol,avgvol,price,ma50,ma200,macdLine,signalLine} = s;
  if(!vol||!avgvol) return null;
  const ratio=vol/avgvol;
  const aboveAvg=ratio>=1.2;
  const macdBull=macdLine!=null&&signalLine!=null&&macdLine>signalLine;
  const macdBear=macdLine!=null&&signalLine!=null&&macdLine<signalLine;
  const nearMA200=ma200&&Math.abs((price-ma200)/ma200)<0.04;
  const belowMA50=ma50&&price<ma50;
  if(rsi<30&&aboveAvg&&macdBull) return{icon:'🎯',color:C.green,signal:'High Conviction Buy',read:`Three things are lining up right now. The stock is oversold (RSI ${rsi}), more people than usual are trading it, and the momentum indicator just flipped upward. When all three agree like this it's one of the strongest buy signals available.`};
  if(rsi<30&&aboveAvg) return{icon:'🚀',color:C.green,signal:'Oversold + Strong Volume',read:`The stock has been beaten down to oversold levels (RSI ${rsi}) and today's trading volume is above average. Sellers may be running out of steam. Watch for the momentum indicator to flip bullish — that's your confirmation.`};
  if(rsi<30&&macdBull) return{icon:'💪',color:C.green,signal:'Oversold + Momentum Turning',read:`The stock is oversold (RSI ${rsi}) and the momentum indicator just crossed bullish. Two of three signals are green. Volume is the missing piece — wait for an above-average volume day to confirm.`};
  if(nearMA200&&aboveAvg&&macdBull) return{icon:'🏆',color:C.green,signal:'Bouncing Off Key Support',read:`The stock is right at its long-term support level and bouncing with above-average volume and bullish momentum. This is exactly the kind of setup where institutions step back in.`};
  if(aboveAvg&&belowMA50&&macdBear) return{icon:'🔴',color:C.red,signal:'Breakdown Warning',read:`The stock is falling below its medium-term support line on above-average volume with momentum pointing down. Not a dip to buy yet. Wait for selling to slow before considering any entry.`};
  if(rsi>70&&aboveAvg) return{icon:'🏔️',color:C.orange,signal:"Overbought — Don't Chase",read:`The stock has run up a lot and RSI is at ${rsi} — well into overbought territory. Buying here means chasing. Wait for a healthy pullback before entering.`};
  return{icon:'📊',color:C.textSub,signal:'No Clear Signal Yet',read:`The indicators aren't giving a strong signal in either direction right now. Volume is ${ratio.toFixed(1)}x average and RSI is ${rsi||'—'}. Keep watching daily.`};
}

function signIn() {
  const btn = document.getElementById('btn-signin');
  if(btn) btn.textContent = 'Signing in...';
  auth.signInWithPopup(googleProvider)
    .then(() => {
      if(btn) btn.textContent = 'Signed in!';
    })
    .catch(e => {
      console.error('Popup sign-in error:', e.code, e.message);
      if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
        if(btn) btn.textContent = 'Popup blocked — trying redirect...';
        auth.signInWithRedirect(googleProvider);
      } else {
        if(btn) btn.textContent = 'Sign in failed: ' + e.message;
        console.error('Sign in error:', e);
      }
    });
}
function signOut() {
  if(unsubStocks) unsubStocks();
  auth.signOut();
}

// Handle redirect result (mobile Safari fallback)
// Show loading state while processing redirect
const redirectLoading = document.getElementById('redirect-loading');
if(redirectLoading) redirectLoading.style.display = 'block';
auth.getRedirectResult().then(result => {
  if(redirectLoading) redirectLoading.style.display = 'none';
  if(result && result.user) {
    console.log('Redirect sign-in successful:', result.user.email);
  }
}).catch(e => {
  if(redirectLoading) redirectLoading.style.display = 'none';
  console.error('Redirect result error:', e);
  const btn = document.getElementById('btn-signin');
  if(btn) btn.textContent = 'Sign in failed: ' + e.message;
});

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('user-name').textContent = user.displayName || user.email;
    showScreen('home');
    showSaveStatus('loading');
    if(unsubStocks) unsubStocks();
    unsubStocks = stocksRef(user.uid).onSnapshot(snap => {
      stocks = [];
      snap.forEach(doc => stocks.push(doc.data()));
      showSaveStatus('ready');
      renderHome();
    }, err => {
      console.error(err);
      showSaveStatus('error');
    });
  } else {
    stocks = [];
    showScreen('login');
  }
});

// SCREEN NAVIGATION

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-'+id);
  if(el) { el.classList.add('active'); el.scrollTop=0; }
}

// MODAL / SHEET
// ═══════════════════════════════════════════════════════════════════════════════
function showModal(html) {
  const ov = document.getElementById('modal-overlay');
  document.getElementById('modal-content').innerHTML = html;
  ov.style.display = 'flex';
}
function closeModal(e) {
  if(!e||e.target===document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').style.display = 'none';
  }
}
function showSheet(html) {
  const ov = document.getElementById('sheet-overlay');
  document.getElementById('sheet-content').innerHTML = html;
  ov.style.display = 'block';
}
function closeSheet(e) {
  if(!e||e.target===document.getElementById('sheet-overlay')) {
    document.getElementById('sheet-overlay').style.display = 'none';
  }
}
function closeAllOverlays() {
  document.getElementById('modal-overlay').style.display='none';
  document.getElementById('sheet-overlay').style.display='none';
}

// HOME RENDER
// ═══════════════════════════════════════════════════════════════════════════════
const TAGS = ['All','★ Favorites','Buy Zone','Watch','Wait','Pass','Swing','Long Term'];
const TAG_COLORS = {'Buy Zone':C.green,'Watch':C.yellow,'Wait':C.orange,'Pass':C.red};

function renderHome() {
  renderMarket();
  renderPortfolioBox();
  renderTags();
  renderStockList();
}

function renderMarket() {
  const items = [
    {l:'S&P 500',v:'−0.45%',ok:false},
    {l:'Nasdaq', v:'−1.16%',ok:false},
    {l:'Mood',   v:'Cautious',ok:false},
  ];
  document.getElementById('market-items').innerHTML = items.map(it => `
    <div style="display:flex;align-items:center;gap:5px;">
      <div style="width:6px;height:6px;border-radius:50%;background:${it.ok?C.green:C.yellow};"></div>
      <span style="color:${C.textSub};font-size:11px;">${it.l}</span>
      <span style="color:${C.text};font-size:11px;font-weight:700;">${it.v}</span>
    </div>
  `).join('');
}

function renderPortfolioBox() {
  const el = document.getElementById('portfolio-box');
  const allFilled = stocks.flatMap(s =>
    (s.tranche||[]).filter(t=>t.status==='filled').map(t=>({...t,stock:s}))
  );
  if(allFilled.length===0){el.innerHTML='';return;}
  const totalVal = allFilled.reduce((a,t)=>a+t.stock.price*(t.shares||0),0);
  const totalCost= allFilled.reduce((a,t)=>a+(t.entryPrice||0)*(t.shares||0),0);
  const gl = totalVal-totalCost;
  const glPct = totalCost>0?(gl/totalCost)*100:0;
  const isUp = gl>=0;

  const byStock = {};
  allFilled.forEach(t=>{
    if(!byStock[t.stock.id]) byStock[t.stock.id]={stock:t.stock,tranches:[]};
    byStock[t.stock.id].tranches.push(t);
  });

  const chips = Object.values(byStock).map(({stock,tranches})=>{
    const v = tranches.reduce((a,t)=>a+stock.price*(t.shares||0),0);
    const c = tranches.reduce((a,t)=>a+(t.entryPrice||0)*(t.shares||0),0);
    const cgl=v-c; const cup=cgl>=0;
    const cfg=vCfg(stock.verdict);
    return `<button onclick="openQuickView('${stock.id}')" style="background:${C.cardHigh};border:1px solid ${cfg.color}44;border-radius:14px;padding:10px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:80px;flex-shrink:0;">
      <span style="color:${C.text};font-size:14px;font-weight:900;">${stock.ticker}</span>
      <span style="color:${cup?C.green:C.red};font-size:12px;font-weight:700;">${cup?'+':''}${cgl.toFixed(2)}</span>
      <span style="color:${C.textMuted};font-size:10px;">${fmtP(v)}</span>
    </button>`;
  }).join('');

  el.innerHTML = `
    <div style="margin:14px 16px;">
      <div style="background:${C.card};border:1.5px solid ${isUp?C.green:C.red};border-radius:20px;padding:20px;box-shadow:0 0 32px ${isUp?C.greenGlow:C.redGlow};text-align:center;">
        <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;">Portfolio Value</div>
        <div style="color:${C.text};font-size:38px;font-weight:900;letter-spacing:-0.03em;margin-bottom:6px;">${fmtP(totalVal)}</div>
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:16px;">
          <span style="color:${isUp?C.green:C.red};font-size:17px;font-weight:800;">${isUp?'▲':'▼'} ${isUp?'+':''}${gl.toFixed(2)}</span>
          <span style="color:${C.textMuted};font-size:13px;">(${glPct.toFixed(2)}%)</span>
        </div>
        <div style="height:1px;background:${C.border};margin-bottom:14px;"></div>
        <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;justify-content:${Object.keys(byStock).length<=3?'center':'flex-start'};">
          ${chips}
        </div>
      </div>
    </div>`;
}

function renderTags() {
  document.getElementById('filter-tags').innerHTML = TAGS.map(t => {
    const active = t===activeTag;
    const tc = TAG_COLORS[t]||null;
    return `<button onclick="setTag('${t}')" style="padding:7px 16px;border-radius:22px;font-size:12px;font-weight:700;border:1px solid ${active?(tc||C.text):C.border};background:${active?(tc?tc+'22':C.cardHigh):'none'};color:${active?(tc||C.text):C.textSub};cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;">${t}</button>`;
  }).join('');
}

function setTag(t) { activeTag=t; renderTags(); renderStockList(); }

function renderStockList() {
  const ranked = getRanked();
  const filtered = ranked.filter(s => {
    if(activeTag==='All') return true;
    if(activeTag==='★ Favorites') return s.starred;
    if(activeTag==='Swing') return s.type==='Swing';
    if(activeTag==='Long Term') return s.type==='Long Term';
    return s.verdict===activeTag;
  });

  const el = document.getElementById('stock-list');
  if(filtered.length===0) {
    el.innerHTML=`<div style="text-align:center;padding:60px 0;">
      <div style="font-size:40px;margin-bottom:14px;">📋</div>
      <div style="color:${C.textSub};font-size:16px;font-weight:700;margin-bottom:6px;">No stocks here yet</div>
      <div style="color:${C.textMuted};font-size:13px;">Tap + Add to start building your playbook</div>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map((s,i)=>renderStockCard(s,i+1)).join('');
}

function renderStockCard(s, rank) {
  const cfg = vCfg(s.verdict);
  const gp = computeGamePlan(s);
  const filled = (s.tranche||[]).filter(t=>t.status==='filled').length;
  const showRank = rank<=3;
  const filledTr = (s.tranche||[]).filter(t=>t.status==='filled');
  const hasPos = filledTr.length>0;

  const rankPill = showRank ? `
    <div style="position:absolute;top:12px;right:14px;display:flex;align-items:center;gap:5px;background:${C.cardPop};border-radius:20px;padding:4px 10px 4px 4px;border:1px solid ${C.borderLight};">
      <div style="width:20px;height:20px;border-radius:50%;background:${rank===1?C.yellowDim:C.cardHigh};border:1.5px solid ${rank===1?C.yellow:C.textMuted};display:flex;align-items:center;justify-content:center;">
        <span style="color:${rank===1?C.yellow:C.textMuted};font-size:10px;font-weight:900;">${rank}</span>
      </div>
      <span style="color:${C.textMuted};font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;">${s.reason||''}</span>
    </div>` : '';

  const setupScore = computeSetupScore(s);
  const scoreColor = setupScore.color;
  const r=19,circ=2*Math.PI*r,dash=(setupScore.score/100)*circ;
  const scoreRing = `<div style="position:relative;width:44px;height:44px;flex-shrink:0;">
    <svg width="44" height="44" style="transform:rotate(-90deg);">
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="${C.border}" stroke-width="5"/>
      <circle cx="22" cy="22" r="${r}" fill="none" stroke="${scoreColor}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><span style="color:${scoreColor};font-size:12px;font-weight:900;">${setupScore.score}</span></div>
  </div>`;

  const posRow = hasPos ? `
    <div style="margin-top:10px;display:flex;align-items:center;gap:6px;">
      <div style="width:7px;height:7px;border-radius:50%;background:${C.green};box-shadow:0 0 6px ${C.green};"></div>
      <span style="color:${C.textSub};font-size:12px;">${filled} of ${s.tranche.length} tranches filled</span>
    </div>` : '';

  return `
    <div class="fade-in" style="background:${C.card};border-radius:20px;border:1px solid ${C.border};padding:18px 18px 16px;cursor:pointer;position:relative;overflow:hidden;" onclick="openQuickView('${s.id}')">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${cfg.color};opacity:0.85;"></div>
      <button onclick="event.stopPropagation();confirmDelete('${s.id}')" style="position:absolute;top:10px;left:12px;background:${C.cardHigh};border:1px solid ${C.borderLight};border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:${C.textMuted};font-size:12px;font-weight:900;z-index:2;">✕</button>
      ${rankPill}
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;margin-top:${showRank?'28':'6'}px;padding-left:28px;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <span style="color:${C.text};font-size:22px;font-weight:900;letter-spacing:-0.01em;">${s.ticker}</span>
            <span style="background:${cfg.dim};color:${cfg.color};border:1px solid ${cfg.color}44;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;letter-spacing:0.04em;">${cfg.label}</span>
          </div>
          <span style="color:${C.textMuted};font-size:12px;">${s.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          ${scoreRing}
          <button onclick="event.stopPropagation();toggleStar('${s.id}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:${s.starred?C.yellow:C.textMuted};padding:0;">${s.starred?'★':'☆'}</button>
        </div>
      </div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="color:${C.text};font-size:28px;font-weight:900;letter-spacing:-0.02em;">${fmtP(s.price)}</span>
          <span style="color:${(s.pct||0)>=0?C.green:C.red};font-size:13px;font-weight:700;">${(s.pct||0)>=0?'▲':'▼'} ${Math.abs(s.pct||0).toFixed(2)}%</span>
        </div>
        <span style="color:${s.type==='Swing'?C.blue:C.purple};background:${s.type==='Swing'?C.blueDim:C.purpleDim};font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">${s.type||'—'}</span>
      </div>
      <div style="background:${C.cardHigh};border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;">Buy Zone</div>
          <div style="color:${C.teal};font-size:14px;font-weight:800;">${gp.buyZone||'—'}</div>
        </div>
        <div style="text-align:right;">
          <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;">Last Updated</div>
          <div style="color:${C.textSub};font-size:12px;font-weight:600;">${s.analyzed||'—'}</div>
        </div>
      </div>
      ${posRow}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// QUICK VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function openQuickView(id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  const cfg = vCfg(s.verdict);
  const gp = computeGamePlan(s);
  const filled = (s.tranche||[]).filter(t=>t.status==='filled');
  const inv = filled.reduce((a,t)=>a+(t.entryPrice||0)*(t.shares||0),0);
  const val = filled.reduce((a,t)=>a+s.price*(t.shares||0),0);
  const gl  = val-inv;
  const hasPos = filled.length>0;

  let statusLine = 'Watching and waiting for the right moment to get in.';
  if(s.verdict==='Buy Zone') statusLine='This stock is in your buy zone right now. Consider acting.';
  else if((s.rsi||99)<30) statusLine='Sellers are running out of steam. Getting very close to a buy.';
  else if((s.rsi||99)<40) statusLine='Getting closer to a good entry. Keep watching daily.';
  else if((s.rsi||0)>70) statusLine='Stock has run up a lot recently. Not the right time to chase.';

  const posBlock = hasPos ? `
    <div style="background:${gl>=0?C.greenDim:C.redDim};border-radius:12px;border:1px solid ${gl>=0?C.green:C.red}44;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;">
      <div><div style="color:${C.textMuted};font-size:10px;margin-bottom:3px;">Position Value</div><div style="color:${C.text};font-size:15px;font-weight:800;">${fmtP(val)}</div></div>
      <div style="text-align:right;"><div style="color:${C.textMuted};font-size:10px;margin-bottom:3px;">Gain / Loss</div><div style="color:${gl>=0?C.green:C.red};font-size:15px;font-weight:900;">${gl>=0?'+':''}${gl.toFixed(2)}</div></div>
    </div>` : '';

  showModal(`
    <div style="background:${C.card};border-radius:22px;padding:22px;border:1px solid ${cfg.color}44;box-shadow:0 0 40px ${cfg.glow};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
            <span style="color:${C.text};font-size:22px;font-weight:900;">${s.ticker}</span>
            <span style="background:${cfg.dim};color:${cfg.color};border:1px solid ${cfg.color}44;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800;">${cfg.label}</span>
          </div>
          <span style="color:${C.textSub};font-size:12px;">${s.name}</span>
        </div>
        <button onclick="closeAllOverlays()" style="background:none;border:none;color:${C.textMuted};font-size:20px;cursor:pointer;">✕</button>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px;">
        <span style="color:${C.text};font-size:30px;font-weight:900;letter-spacing:-0.02em;">${fmtP(s.price)}</span>
        <span style="color:${(s.pct||0)>=0?C.green:C.red};font-size:14px;font-weight:700;">${(s.pct||0)>=0?'▲':'▼'} ${Math.abs(s.pct||0).toFixed(2)}% since last update</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        ${[{label:'Buy Zone',val:gp.buyZone||'—',color:C.teal},{label:'Target',val:gp.profit||'—',color:C.green},{label:'Type',val:s.type||'—',color:C.blue},{label:'RSI',val:s.rsi??'—',color:(s.rsi||50)<35?C.green:(s.rsi||50)>65?C.red:C.yellow}].map(item=>`
        <div style="background:${C.cardHigh};border-radius:10px;padding:10px 12px;">
          <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">${item.label}</div>
          <div style="color:${item.color};font-size:13px;font-weight:800;">${item.val}</div>
        </div>`).join('')}
      </div>
      ${posBlock}
      <div style="background:${C.cardHigh};border-radius:10px;padding:12px 14px;margin-bottom:16px;">
        <span style="color:${C.textSub};font-size:13px;line-height:1.6;">${statusLine}</span>
      </div>
      <button onclick="openDetail('${s.id}')" style="width:100%;padding:14px;background:${C.text};color:${C.bg};border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;">View Full Analysis →</button>
    </div>`);
}

// ═══════════════════════════════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function openDetail(id) {
  closeAllOverlays();
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  renderDetail(s);
  showScreen('detail');
}

function renderDetail(s) {
  const cfg = vCfg(s.verdict);
  const filled = (s.tranche||[]).filter(t=>t.status==='filled');
  const totalInv = filled.reduce((a,t)=>a+(t.entryPrice||0)*(t.shares||0),0);
  const totalVal = filled.reduce((a,t)=>a+s.price*(t.shares||0),0);
  const gl = totalVal-totalInv;
  const setupScore = computeSetupScore(s);
  const scoreColor = setupScore.color;
  const r=23,circ=2*Math.PI*r,dash=(setupScore.score/100)*circ;

  document.getElementById('detail-content').innerHTML = `
    <!-- Header -->
    <div style="background:${C.card};border-bottom:1px solid ${C.border};padding:16px 20px;position:sticky;top:0;z-index:10;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <button onclick="showScreen('home');renderHome();" style="background:none;border:none;color:${C.textSub};font-size:24px;cursor:pointer;padding:0;line-height:1;">←</button>
        <div style="flex:1;">
          <div style="color:${C.text};font-size:26px;font-weight:900;letter-spacing:-0.02em;">${s.ticker}</div>
          <div style="color:${C.textSub};font-size:13px;">${s.name}</div>
        </div>
        <div style="position:relative;width:52px;height:52px;flex-shrink:0;">
          <svg width="52" height="52" style="transform:rotate(-90deg);">
            <circle cx="26" cy="26" r="${r}" fill="none" stroke="${C.border}" stroke-width="5"/>
            <circle cx="26" cy="26" r="${r}" fill="none" stroke="${scoreColor}" stroke-width="5" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><span style="color:${scoreColor};font-size:13px;font-weight:900;">${setupScore.score}</span></div>
        </div>
      </div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px;">
        <span style="color:${C.text};font-size:34px;font-weight:900;letter-spacing:-0.03em;">${fmtP(s.price)}</span>
        <span style="color:${(s.pct||0)>=0?C.green:C.red};font-size:14px;font-weight:700;">${(s.pct||0)>=0?'▲':'▼'} ${Math.abs(s.pct||0).toFixed(2)}%</span>
        ${totalInv>0?`<span style="margin-left:auto;color:${gl>=0?C.green:C.red};font-size:14px;font-weight:800;">${gl>=0?'+':''}${gl.toFixed(2)} P&L</span>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;gap:8px;">
          <span style="background:${cfg.dim};color:${cfg.color};border:1px solid ${cfg.color}44;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:800;letter-spacing:0.05em;">${cfg.label}</span>
          <span style="background:${s.type==='Swing'?C.blueDim:C.purpleDim};color:${s.type==='Swing'?C.blue:C.purple};border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;">${s.type||'—'}</span>
        </div>

function showTab(tab, id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  ['overview','plan','analysis','notes'].forEach(t => {
    const btn = document.getElementById(`tab-btn-${t}`);
    if(btn) { btn.style.color = t===tab?C.text:C.textSub; btn.style.borderBottom = t===tab?`2px solid ${C.text}`:'2px solid transparent'; }
  });
  const map = {overview:renderTabOverview,plan:renderTabPlan,analysis:renderTabAnalysis,notes:renderTabNotes};
  const el = document.getElementById('tab-content');
  if(el&&map[tab]) el.innerHTML = map[tab](s);
}

// The "seasoned broker" summary — ties every indicator into one narrative
// instead of five separate cards you have to piece together yourself.
function brokerRead(s, setup, traj) {
  const {rz, dz, volConfirmed, trendUp, trendBroken, nearMA200, macdBull, reversalAligned, pullbackAligned} = setup;

  if(pullbackAligned) {
    return {
      verdict: 'BUY NOW', verdictSub: 'Setup is here',
      headline: 'Textbook Pullback — Signals Aligned',
      icon: '🎯', color: C.green,
      read: `${s.ticker} is in a confirmed uptrend, sitting in a healthy buy zone off its 50-day average. RSI has cooled to a reasonable level without breaking down, and volume is confirming real buying interest. This is the kind of setup worth acting on.${macdBull?' Momentum agrees too.':' MACD hasn\'t flipped bullish yet — a nice-to-have, not a dealbreaker.'}`,
      waitingOn: []
    };
  }
  if(reversalAligned) {
    return {
      verdict: 'BUY NOW', verdictSub: 'Higher risk — size it small',
      headline: 'Reversal Setup — Signals Aligned',
      icon: '🔄', color: C.green,
      read: `${s.ticker} is sitting near its long-term support, RSI shows real selling exhaustion, and volume is picking up — the combination that usually marks a turn. This is higher risk than a trend pullback since the bigger trend isn't confirmed yet, so size it accordingly.`,
      waitingOn: []
    };
  }
  if(trendBroken) {
    return {
      verdict: 'AVOID', verdictSub: 'Until the trend repairs',
      headline: 'Trend Is Broken — Stand Down',
      icon: '🔴', color: C.red,
      read: `${s.ticker} has dropped meaningfully below its 200-day average — the line separating a healthy long-term trend from a broken one. Don't treat this as a discount. Wait for the trend to repair before considering an entry.`,
      waitingOn: []
    };
  }

  const pullbackMissing = [];
  if(!trendUp) pullbackMissing.push('Price needs to trade above both the 50-day and 200-day averages to confirm the uptrend.');
  if(!(dz&&(dz.zone==='buy'||dz.zone==='healthy'))) pullbackMissing.push(`Price needs to pull back closer to the 50-day average — right now it's ${dz?dz.label.toLowerCase():'unclear'}.`);
  if(!(rz&&(rz.zone==='caution'||rz.zone==='healthy'))) pullbackMissing.push(`RSI needs to settle into the 40-65 range — right now it's ${rz?rz.label.toLowerCase():'unknown'}.`);
  if(!volConfirmed) pullbackMissing.push('Volume needs to rise above 1.2x average to confirm buyers are actually stepping in.');

  const reversalMissing = [];
  if(!nearMA200) reversalMissing.push('Price needs to be within about 5% of the 200-day average.');
  if(!(rz&&(rz.zone==='panic'||rz.zone==='weak'))) reversalMissing.push('RSI needs to drop under 40 to show real selling exhaustion.');
  if(!volConfirmed) reversalMissing.push('Volume needs to rise above 1.2x average to confirm the bounce has support.');

  const useReversal = reversalMissing.length < pullbackMissing.length;
  const missing = useReversal ? reversalMissing : pullbackMissing;
  const setupName = useReversal ? 'a reversal off support' : 'a pullback entry in an uptrend';

  // Use trend history, if you have it, to say whether this is getting closer or further away —
  // this is the "now vs. future vs. never" call, not just a snapshot of today.
  let trajLine = '';
  if(traj && traj.enough) {
    if(traj.rsiTrend!=null) {
      if(useReversal && traj.rsiTrend<0) trajLine = ` RSI has been falling over the last 10 days, which is the right direction for a reversal setup — this could be close.`;
      else if(!useReversal && traj.rsiTrend>0) trajLine = ` RSI has been climbing over the last 10 days, moving the right direction for a pullback setup — worth checking back soon.`;
      else if(useReversal && traj.rsiTrend>0) trajLine = ` RSI has actually been climbing recently, which works against a reversal setup — this may not be close.`;
      else if(!useReversal && traj.rsiTrend<0) trajLine = ` RSI has been falling recently, moving away from a healthy pullback range — this may take longer.`;
    }
  }

  return {
    verdict: 'WAIT', verdictSub: missing.length>2 ? 'Not close yet' : 'Getting closer',
    headline: 'Not Ready Yet',
    icon: '📊', color: C.yellow,
    read: `${s.ticker} isn't lined up for a clean entry right now. The closest fit is ${setupName} — here's what still needs to happen before this is worth acting on.${trajLine}`,
    waitingOn: missing.length?missing:['Keep watching daily — nothing stands out yet in either direction.']
  };
}

// Turns snapshot history into a plain-English trend read — shared so both
// the Analysis tab and the verdict logic can use the same trajectory data.
function computeTrajectory(s) {
  const snaps = s.snapshots||[];
  if(snaps.length<3) {
    return {
      text: `You have ${snaps.length} update${snaps.length===1?'':'s'} saved. Import a CSV from ThinkorSwim or keep entering daily data — after 3 updates the app will start showing you how this stock is trending.`,
      rsiTrend: null, volTrendUp: null, enough: false
    };
  }
  const f=snaps[0],l=snaps[snaps.length-1];
  const rd=l.rsi<f.rsi?'dropped':'climbed';
  const pd=l.price>f.price?'moved up':'moved down';
  const days=snaps.length;
  const weeks=Math.round(days/5);
  const timeLabel=days>=20?`${weeks} weeks`:days>=5?`${Math.round(days/5)} week`:`${days} days`;

  const recent=snaps.slice(-10);
  const rsiVals=recent.map(r=>r.rsi).filter(v=>v!=null);
  const rsiTrend=rsiVals.length>=2?(rsiVals[rsiVals.length-1]-rsiVals[0]).toFixed(1):null;
  const rsiTrendStr=rsiTrend?parseFloat(rsiTrend)>0?`RSI has been rising ${rsiTrend} points over the last 10 days — momentum building.`:`RSI has dropped ${Math.abs(rsiTrend)} points recently — sellers in control short term.`:'';

  const volVals=recent.map(r=>r.vol).filter(v=>v!=null);
  const avgRecent=volVals.length?volVals.reduce((a,b)=>a+b,0)/volVals.length:null;
  const allVols=snaps.map(r=>r.vol).filter(v=>v!=null);
  const avgAll=allVols.length?allVols.reduce((a,b)=>a+b,0)/allVols.length:null;
  const volTrendUp = avgRecent&&avgAll ? avgRecent>avgAll*1.2 : null;
  const volTrendStr=avgRecent&&avgAll?(volTrendUp?'Volume has been above average recently — institutional interest is elevated.'
    :avgRecent<avgAll*0.8?'Volume has been below average recently — quiet period with lower conviction.'
    :'Volume is running near its historical average — normal trading conditions.'):'';

  const maNote=l.ma200&&l.price?(l.price>l.ma200?'Price is holding above the long-term support line — the big picture trend is still healthy.':'Price has dropped below the long-term support line — worth being cautious.'):'';

  return {
    text: `Over the past ${timeLabel} (${days} trading days), ${s.ticker} has ${pd} from ${fmtP(f.price)} to ${fmtP(l.price)} and RSI has ${rd} from ${f.rsi?.toFixed(0)||'—'} to ${l.rsi?.toFixed(0)||'—'}. ${rsiTrendStr} ${volTrendStr} ${maNote}`.trim(),
    rsiTrend: rsiTrend!=null?parseFloat(rsiTrend):null,
    volTrendUp, enough: true
  };
}

// Support/resistance approximated from the data we actually have — moving
// averages, 52-week range, and any highs seen in imported snapshot history.
// This is an approximation, not true swing-structure detection.
function computeKeyLevels(s) {
  const price = s.price;
  const levels = {support:null, nextSupport:null, resistance:null, nextResistance:null};
  if(!price) return levels;

  const supportCandidates = [];
  if(s.ma50 && s.ma50<price) supportCandidates.push({price:s.ma50, label:'Near 50-day average'});
  if(s.ma200 && s.ma200<price) supportCandidates.push({price:s.ma200, label:'Near 200-day average'});
  if(s.lo52 && s.lo52<price) supportCandidates.push({price:s.lo52, label:'52-week low'});
  supportCandidates.sort((a,b)=>b.price-a.price);
  if(supportCandidates.length){ levels.support = supportCandidates[0]; if(supportCandidates.length>1) levels.nextSupport = supportCandidates[1]; }

  const resistanceCandidates = [];
  const highs = (s.snapshots||[]).map(sn=>sn.high).filter(h=>h!=null && h>price);
  if(highs.length) resistanceCandidates.push({price:Math.max(...highs), label:'Recent high'});
  if(s.hi52 && s.hi52>price) resistanceCandidates.push({price:s.hi52, label:'52-week high'});
  resistanceCandidates.sort((a,b)=>a.price-b.price);
  if(resistanceCandidates.length){ levels.resistance = resistanceCandidates[0]; if(resistanceCandidates.length>1) levels.nextResistance = resistanceCandidates[1]; }

  return levels;
}

// Six-cell summary grid — Trend, Momentum, Volume, Risk Level, Position Size, Overall.
function computeAtAGlance(s) {
  const setup = analyzeSetup(s);
  const {rz, dz, volConfirmed, trendUp, trendBroken} = setup;
  const narrative = brokerRead(s, setup, computeTrajectory(s));

  const trend = trendBroken ? {label:'Broken', color:C.red, sub:'Below long-term support'}
              : trendUp ? {label:'Long-term uptrend', color:C.green, sub:'Price above 50 & 200-day'}
              : {label:'Mixed', color:C.yellow, sub:'Not fully confirmed'};

  const momentum = rz ? {label:rz.label, color:rz.color, sub:`RSI ${s.rsi}`} : {label:'Unknown', color:C.textMuted, sub:'No RSI yet'};

  const volume = setup.volRatio!=null
    ? {label: volConfirmed?'Above Average':(setup.volRatio<0.8?'Below Average':'Normal'), color: volConfirmed?C.green:(setup.volRatio<0.8?C.red:C.yellow), sub:`${setup.volRatio.toFixed(1)}x avg`}
    : {label:'Unknown', color:C.textMuted, sub:'No volume data'};

  let riskLevel = {label:'Unknown', color:C.textMuted, sub:''};
  if(s.atr && s.price) {
    const pctMove = (s.atr/s.price)*100;
    if(pctMove<2) riskLevel = {label:'Low', color:C.green, sub:`ATR ${fmtP(s.atr)}`};
    else if(pctMove<4) riskLevel = {label:'Moderate', color:C.yellow, sub:`ATR ${fmtP(s.atr)}`};
    else riskLevel = {label:'High', color:C.orange, sub:`ATR ${fmtP(s.atr)}`};
  }

  let posSize = {label:'Unknown', color:C.textMuted, sub:''};
  if(s.atr && s.price){
    const budget = s.invested || 150;
    const approxShares = budget/s.price;
    const dollarRisk = approxShares*(s.atr*1.5);
    const riskPct = budget>0 ? (dollarRisk/budget)*100 : null;
    if(riskPct!=null) posSize = riskPct<15 ? {label:'Good', color:C.green, sub:'Fits your risk'} : {label:'Tight', color:C.yellow, sub:'Stop is close to noise'};
  }

  const overall = {label:narrative.verdict, color:narrative.color, sub:narrative.verdictSub};

  return {trend, momentum, volume, riskLevel, posSize, overall};
}

// Are buyers actually showing up on up days, or is volume heavier on down days?
function computeVolumeOnUpDays(s) {
  const snaps = s.snapshots||[];
  if(snaps.length<4) return null;
  const recent = snaps.slice(-10);
  let upVol=0, upN=0, downVol=0, downN=0;
  for(let i=1;i<recent.length;i++){
    const prev=recent[i-1], cur=recent[i];
    if(cur.price==null||prev.price==null||cur.vol==null) continue;
    if(cur.price>prev.price){ upVol+=cur.vol; upN++; }
    else if(cur.price<prev.price){ downVol+=cur.vol; downN++; }
  }
  if(upN===0||downN===0) return null;
  const ratio = (upVol/upN)/(downVol/downN);
  return {
    ratio,
    label: ratio>1.15?'Buyers Showing Up':ratio<0.85?'Needs Work':'Neutral',
    color: ratio>1.15?C.green:ratio<0.85?C.red:C.yellow,
    text: ratio>1.15 ? 'Buyers are showing up with real volume on up days — a healthy sign.' : ratio<0.85 ? "Volume is heavier on down days than up days — sellers are more active than buyers right now." : 'Volume is fairly even between up and down days. No clear signal yet.'
  };
}

// Is the 50/200-day average itself trending up, flat, or down — needs CSV-imported
// history with ma50/ma200 per row, since the daily-update wizard only asks for
// today's snapshot, not the moving average's own trend.
function computeMASlope(s) {
  const s50 = (s.snapshots||[]).filter(sn=>sn.ma50!=null);
  const s200 = (s.snapshots||[]).filter(sn=>sn.ma200!=null);
  if(s50.length<5) return null;
  const r50 = s50.slice(-10);
  const rising50 = r50[r50.length-1].ma50 > r50[0].ma50;
  let rising200 = null;
  if(s200.length>=5){ const r200=s200.slice(-10); rising200 = r200[r200.length-1].ma200 > r200[0].ma200; }
  return {rising50, rising200};
}

    </div>`);

async function doBuildPlan(stockId, count) {
  const s = stocks.find(x=>String(x.id)===String(stockId));
  if(!s) return;
  const step = s.atr ? s.atr : s.price*0.03; // fall back to 3% spacing if no ATR yet
  const labels = ['Tranche 1','Tranche 2','Tranche 3'];
  const notes = [
    'First entry — start the position here.',
    'Add if it pulls back further. Confirms the dip is being bought, not just falling.',
    'Final add — only if your thesis still holds and this level gets tested.'
  ];
  const gp = computeGamePlan(s);
  const tranche = Array.from({length:count}).map((_,i) => {
    const zonePrice = s.price - (step*1.5*i); // each tranche a bit lower than the last
    return {
      label: labels[i],
      zone: i===0 ? gp.buyZone : `Around ${fmtP(zonePrice)}`,
      note: notes[i],
      status: i===0 ? 'ready' : 'waiting',
    };
  });
  const updated = {...s, tranche};
  stocks = stocks.map(x=>String(x.id)===String(stockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  showSaveStatus('saved');
  setTimeout(()=>showSaveStatus('ready'),2000);
  renderDetail(updated);
  renderHome();
}

function updateNext() {
  const inp = document.getElementById('update-input');
  const cur = UPDATE_STEPS[updateStep];
  const val = inp?.value?.trim();
  if(!val) return;
  updateVals[cur.key] = val;
  if(updateStep===UPDATE_STEPS.length-1) {
    doSaveUpdate();
  } else {
    updateStep++;
    renderUpdateStep();
  }
}

function updateBack() {
  if(updateStep>0) { updateStep--; renderUpdateStep(); }
}

async function doSaveUpdate() {
  const s = stocks.find(x=>String(x.id)===String(updateStockId));
  if(!s) return;
  const todayStr = today();
  const snap = {
    date:  todayStr,
    price: parseFloat(updateVals.price)||s.price,
    rsi:   parseFloat(updateVals.rsi)||null,
    vol:   parseVol(updateVals.vol),
    avgvol:parseVol(updateVals.avgvol),
    ma20:  parseFloat(updateVals.ma20)||null,
    macdLine:   parseFloat(updateVals.macdLine)||null,
    signalLine: parseFloat(updateVals.signalLine)||null,
    atr:   parseFloat(updateVals.atr)||null,
  };
  const prevPrice = s.price; // price before this update — the "yesterday" for % change
  const updated = {
    ...s,
    price:      snap.price,
    change:     snap.price - prevPrice,
    pct:        prevPrice ? ((snap.price - prevPrice)/prevPrice)*100 : 0,
    rsi:        snap.rsi,
    vol:        snap.vol,
    avgvol:     snap.avgvol ?? s.avgvol,
    ma20:       snap.ma20,
    macdLine:   snap.macdLine,
    signalLine: snap.signalLine,
    atr:        snap.atr,
    analyzed:   todayStr,
    snapshots:  [...(s.snapshots||[]), snap],
  };
  stocks = stocks.map(x=>String(x.id)===String(updateStockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  showSaveStatus('saved');
  setTimeout(()=>showSaveStatus('ready'),2000);
  renderDetail(updated);
  renderHome();
}

      <input id="add-input" type="text" inputmode="${cur.inputmode||'text'}" placeholder="${cur.hint}" value="${addVals[cur.key]||''}" style="width:100%;background:${C.card};border:1px solid ${C.borderLight};border-radius:14px;color:${C.text};font-size:${cur.upper?'26':'20'}px;font-weight:${cur.upper?'900':'600'};padding:${cur.prefix?'16px 16px 16px 34px':'16px'};outline:none;box-sizing:border-box;" autofocus>

      <button onclick="addNext()" style="flex:2;padding:16px;border-radius:14px;border:none;background:${C.text};color:${C.bg};font-size:15px;font-weight:800;cursor:pointer;">${isLast?'Add to Playbook →':'Next →'}</button>
    </div>`);
  setTimeout(()=>{
    const inp=document.getElementById('add-input');
    if(inp){ inp.focus(); if(cur.upper) inp.addEventListener('input',()=>inp.value=inp.value.toUpperCase()); }
  },100);
}

function addChoiceSelect(ch) {
  const cur = ADD_STEPS[addStep];
  addVals[cur.key]=ch;
  renderAddStep();
}

function addNext() {
  const cur = ADD_STEPS[addStep];
  if(cur.type==='choice') {
    if(!addVals[cur.key]) return;
  } else {
    const inp=document.getElementById('add-input');
    const val=inp?.value?.trim();
    if(!val) return;
    addVals[cur.key]=cur.upper?val.toUpperCase():val;
  }
  if(addStep===ADD_STEPS.length-1) {
    doAddStock();
  } else {
    addStep++;
    renderAddStep();
  }
}

function addBack() {
  if(addStep>0){ addStep--; renderAddStep(); }
}

function parseCSVDate(str) {
  if(!str) return null;
  str = str.trim();
  // Handle M/D/YY and M/D/YYYY
  const parts = str.split('/');
  if(parts.length === 3) {
    let [m, d, y] = parts;
    if(y.length === 2) y = '20' + y;
    const date = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
    return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  // Handle YYYY-MM-DD
  const iso = str.split('-');
  if(iso.length === 3) {
    const date = new Date(parseInt(iso[0]), parseInt(iso[1])-1, parseInt(iso[2]));
    return date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  return str;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];

  // Detect delimiter - tab or comma
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(delim).map(h => h.trim());

  // Map column indices
  const idx = {};
  const colMap = {
    date:      ['date','Date','DATE'],
    close:     ['close','Close','CLOSE'],
    open:      ['open','Open','OPEN'],
    high:      ['high','High','HIGH'],
    low:       ['low','Low','LOW'],
    vol:       ['volume','Volume','VOLUME','vol','VOL'],
    rsi:       ['RSI_14','rsi_14','RSI','rsi'],
    macdLine:  ['MACD_12_26_9','macd_12_26_9','MACD','macd'],
    signalLine:['MACDs_12_26_9','macds_12_26_9','MACDs','macds','SIGNAL'],
    atr:       ['ATRr_14','atr_14','ATR','atr','ATRr'],
    ma50:      ['SMA_50','sma_50','SMA50','MA50'],
    ma200:     ['SMA_200','sma_200','SMA200','MA200'],
    ma20:      ['EMA_20','ema_20','EMA20','MA20'],
  };

  Object.keys(colMap).forEach(key => {
    const match = colMap[key].find(name => headers.includes(name));
    if(match !== undefined) idx[key] = headers.indexOf(match);
  });

  const rows = [];
  for(let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if(!line) continue;
    const cols = line.split(delim).map(c => c.trim());

    const pf = (k) => {
      if(idx[k] === undefined || idx[k] < 0) return null;
      const v = parseFloat(cols[idx[k]]);
      return isNaN(v) ? null : v;
    };

    const dateStr = idx.date !== undefined ? cols[idx.date]?.trim() : null;
    if(!dateStr) continue;

    rows.push({
      date:       parseCSVDate(dateStr),
      price:      pf('close'),
      open:       pf('open'),
      high:       pf('high'),
      low:        pf('low'),
      vol:        pf('vol'),
      rsi:        pf('rsi'),
      macdLine:   pf('macdLine'),
      signalLine: pf('signalLine'),
      atr:        pf('atr'),
      ma50:       pf('ma50'),
      ma200:      pf('ma200'),
      ma20:       pf('ma20'),
    });
  }

  // Sort oldest to newest
  return rows.reverse();
}

let pendingImportRows = null;
let pendingImportStockId = null;

function previewCSV(stockId, input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);

          <button onclick="closeAllOverlays()" style="width:100%;padding:13px;border-radius:12px;border:none;background:${C.text};color:${C.bg};font-size:14px;font-weight:800;cursor:pointer;">OK</button>

    }

    pendingImportRows = rows;

    const last  = rows[rows.length-1];

          <div style="background:${C.cardHigh};border-radius:10px;padding:10px 12px;">

            <div style="color:${item.color};font-size:13px;font-weight:800;">${item.val}</div>
          </div>`).join('')}
        </div>
        <div style="background:${C.cardHigh};border-radius:10px;padding:12px;margin-bottom:16px;">
          <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">Most Recent Data</div>
          ${preview}
        </div>
        <div style="background:${C.yellowDim};border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid ${C.yellow}33;">
          <span style="color:${C.textSub};font-size:12px;line-height:1.5;">This will replace any existing snapshot history for this stock with the imported data.</span>
        </div>
        <div style="display:flex;gap:10px;">
          <button onclick="closeAllOverlays()" style="flex:1;padding:13px;border-radius:12px;border:1px solid ${C.border};background:none;color:${C.textSub};font-size:14px;font-weight:700;cursor:pointer;">Cancel</button>
          <button onclick="doImportCSV(pendingImportStockId)" style="flex:2;padding:13px;border-radius:12px;border:none;background:${C.teal};color:#000;font-size:14px;font-weight:900;cursor:pointer;">Import ${rows.length} Days ✓</button>
        </div>
      </div>`);
  };
  reader.readAsText(file);
}

function r2(v) { return v != null ? Math.round(v * 100) / 100 : null; }

async function doImportCSV(stockId) {
  const rows = pendingImportRows;
  if(!rows || !rows.length) {
    alert('No data to import. Please try selecting the file again.');
    return;
  }

  // Find stock — compare as strings to handle numeric/string id mismatch
  const s = stocks.find(x => String(x.id) === String(stockId));
  if(!s) {
    console.error('Stock not found for id:', stockId, 'Available:', stocks.map(x=>x.id));
    alert('Could not find the stock. Please go back and try again.');
    return;
  }

  // Round all numeric values to 2 decimal places
  const cleanRows = rows.map(row => ({
    date:       row.date,
    price:      r2(row.price),
    open:       r2(row.open),
    high:       r2(row.high),
    low:        r2(row.low),
    vol:        row.vol ? Math.round(row.vol) : null,
    rsi:        r2(row.rsi),
    macdLine:   r2(row.macdLine),
    signalLine: r2(row.signalLine),
    atr:        r2(row.atr),
    ma50:       r2(row.ma50),
    ma200:      r2(row.ma200),
    ma20:       r2(row.ma20),
  }));

  // Use the most recent row to update current stock values
  const latest = cleanRows[cleanRows.length - 1];
  const prevRow = cleanRows.length>1 ? cleanRows[cleanRows.length - 2] : null;
  const prevPrice = prevRow?.price ?? null;

  const updated = {
    ...s,
    price:      latest.price      ?? s.price,
    change:     prevPrice ? (latest.price - prevPrice) : s.change,
    pct:        prevPrice ? ((latest.price - prevPrice)/prevPrice)*100 : s.pct,
    rsi:        latest.rsi        ?? s.rsi,
    vol:        latest.vol        ?? s.vol,
    ma20:       latest.ma20       ?? s.ma20,
    ma50:       latest.ma50       ?? s.ma50,
    ma200:      latest.ma200      ?? s.ma200,
    macdLine:   latest.macdLine   ?? s.macdLine,
    signalLine: latest.signalLine ?? s.signalLine,
    atr:        latest.atr        ?? s.atr,
    analyzed:   latest.date       || s.analyzed,
    snapshots:  cleanRows,
  };

  // Update in-memory array first
  stocks = stocks.map(x => String(x.id) === String(stockId) ? updated : x);

  // Close overlay and re-render immediately so user sees result
  closeAllOverlays();
  renderDetail(updated);
  renderHome();

  // Then save to Firebase in background
  showSaveStatus('saving');
  try {
    await fbSaveStock(updated);
    showSaveStatus('saved');
    setTimeout(() => showSaveStatus('ready'), 2000);
  } catch(e) {
    showSaveStatus('error');
    console.error('Firebase save error:', e);
  }
}

function checkAccuracy(stockId, date) {
  showModal(`
    <div style="background:${C.card};border-radius:20px;padding:24px;border:1px solid ${C.border};">
      <div style="color:${C.text};font-size:18px;font-weight:900;margin-bottom:6px;">Check Accuracy</div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
        ${[{label:'Spot on — nailed it',pct:90},{label:'Pretty close — mostly right',pct:65},{label:'Mixed — some right some wrong',pct:40},{label:'Missed — was not accurate',pct:10}].map(opt=>`
        <button onclick="saveAccuracy('${stockId}','${date}',${opt.pct})" style="padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid ${C.border};background:${C.cardHigh};color:${C.text};cursor:pointer;text-align:left;">${opt.label}</button>`).join('')}
      </div>
      <button onclick="closeAllOverlays()" style="width:100%;padding:12px;border-radius:12px;border:1px solid ${C.border};background:none;color:${C.textSub};font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
    </div>`);
}

async function saveAccuracy(stockId, date, pct) {
  const s = stocks.find(x=>String(x.id)===String(stockId));
  if(!s) return;
  const updated = {...s, aiLog:(s.aiLog||[]).map(e=>e.date===date?{...e,accuracy:pct}:e)};
  stocks = stocks.map(x=>String(x.id)===String(stockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  renderDetail(updated);
}
