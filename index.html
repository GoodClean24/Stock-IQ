async function doBuildPlan(stockId, count) {
  const s = stocks.find(x=>String(x.id)===String(stockId));
  if(!s) return;
  if(needsReclassify(s)) { closeAllOverlays(); showReclassifyFlow(stockId); return; }
  if((s.tranche||[]).some(t=>t.status==='filled')) {
    closeAllOverlays();
    showModal(`
      <div style="background:${C.card};border-radius:20px;padding:22px;border:1px solid ${C.red}44;">
        <div style="color:${C.text};font-size:15px;font-weight:800;margin-bottom:10px;">Can't rebuild — you already bought a tranche</div>
        <div style="color:${C.textSub};font-size:12px;line-height:1.6;margin-bottom:14px;">Rebuilding the plan would erase the record of what you already paid. That's protected on purpose.</div>
        <button onclick="closeAllOverlays()" style="width:100%;padding:12px;border-radius:12px;border:none;background:${C.text};color:${C.bg};font-size:14px;font-weight:800;cursor:pointer;">Got it</button>
      </div>`);
    return;
  }
  const step = s.atr ? s.atr : s.price*0.03; // fall back to 3% spacing if no ATR yet
  const labels = ['Tranche 1','Tranche 2','Tranche 3'];
  const notes = [
    'First entry — start the position here.',
    'Add if it pulls back further. Confirms the dip is being bought, not just falling.',
    'Final add — only if your thesis still holds and this level gets tested.'
  ];
  const gp = computeGamePlan(s);
  const tranche = Array.from({length:count}).map((_,i) => {
    const zonePrice = s.price - (step*1.5*i); // each tranche a bit lower than the last
    return {
      label: labels[i],
      zone: i===0 ? gp.buyZone : `Around ${fmtP(zonePrice)}`,
      note: notes[i],
      status: i===0 ? 'ready' : 'waiting',
    };
  });
  const updated = {...s, tranche};
  stocks = stocks.map(x=>String(x.id)===String(stockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  showSaveStatus('saved');
  setTimeout(()=>showSaveStatus('ready'),2000);
  renderDetail(updated);
  renderHome();
}

async function doSaveUpdate() {
  const s = stocks.find(x=>String(x.id)===String(updateStockId));
  if(!s) return;
  const todayStr = today();
  const snap = {
    date:  todayStr,
    price: parseFloat(updateVals.price)||s.price,
    rsi:   parseFloat(updateVals.rsi)||null,
    vol:   parseVol(updateVals.vol),
    avgvol:parseVol(updateVals.avgvol),
    ma20:  parseFloat(updateVals.ma20)||null,
    ma50:  parseFloat(updateVals.ma50)||null,
    ma200: parseFloat(updateVals.ma200)||null,
    macdLine:   parseFloat(updateVals.macdLine)||null,
    signalLine: parseFloat(updateVals.signalLine)||null,
    atr:   parseFloat(updateVals.atr)||null,
  };
  const prevPrice = s.price; // price before this update — the "yesterday" for % change
  const updated = {
    ...s,
    price:      snap.price,
    change:     snap.price - prevPrice,
    pct:        prevPrice ? ((snap.price - prevPrice)/prevPrice)*100 : 0,
    rsi:        snap.rsi,
    vol:        snap.vol,
    avgvol:     snap.avgvol ?? s.avgvol,
    ma20:       snap.ma20,
    ma50:       snap.ma50 ?? s.ma50,
    ma200:      snap.ma200 ?? s.ma200,
    macdLine:   snap.macdLine,
    signalLine: snap.signalLine,
    atr:        snap.atr,
    analyzed:   todayStr,
    snapshots:  [...(s.snapshots||[]), snap],
  };
  stocks = stocks.map(x=>String(x.id)===String(updateStockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  showSaveStatus('saved');
  setTimeout(()=>showSaveStatus('ready'),2000);

}

// Suggests Swing Trade / Position Trade / Long-Term Hold from what's already
// typed into the wizard. Deliberately cautious — never confidently suggests
// Long-Term Hold from technicals alone (needs business/valuation research),
// and requires a real workable setup before suggesting Swing Trade. Mirrors
// suggestHoldTypeLive's logic, adapted for raw wizard strings instead of a
// full stock object with snapshot history.
function suggestHoldType(vals) {
  const price = parseFloat(vals.price), ma50 = parseFloat(vals.ma50), ma200 = parseFloat(vals.ma200), atr = parseFloat(vals.atr), hi52 = parseFloat(vals.hi52);
  if(!price || !ma50 || !ma200 || !atr) return null;
  const trendUp = price>ma50 && price>ma200;
  const atrPct = (atr/price)*100;
  const distFrom50 = ((price-ma50)/ma50)*100;
  const notSeverelyExtended = distFrom50 < 20;
  const hasWorkableSetup = !isNaN(hi52) && hi52>price;
  const looksLongTermTechnically = trendUp && atrPct<2 && notSeverelyExtended;

  if(looksLongTermTechnically) {
    return {label:null, confident:false,
      reason:`Technicals support a long-term uptrend, but business quality and valuation research are still required before classifying this as a Long-Term Hold.`};
  }
  if(trendUp && notSeverelyExtended) {
    return {label:'Position Trade', confident:true,
      reason:`Price is above its 200-day average, and the intermediate trend looks healthy without being severely extended.`};
  }
  if(hasWorkableSetup && atrPct>=2) {
    return {label:'Swing Trade', confident:true,
      reason:`There's a workable setup here — real room to a target with enough daily movement (ATR ${atrPct.toFixed(1)}%) — for a shorter-term trade.`};
  }
  return {label:null, confident:false,
    reason:`Nothing here clearly supports one strategy over another right now — no defined setup, and the trend isn't confirmed either way.`};
}

function parseCSVDateRaw(str) {
  if(!str) return null;
  str = str.trim();
  // Handle M/D/YY and M/D/YYYY
  const parts = str.split('/');
  if(parts.length === 3) {
    let [m, d, y] = parts;
    if(y.length === 2) y = '20' + y;
    return new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  }
  // Handle YYYY-MM-DD
  const iso = str.split('-');
  if(iso.length === 3) {
    return new Date(parseInt(iso[0]), parseInt(iso[1])-1, parseInt(iso[2]));
  }
  return null;
}
function parseCSVDate(str) {
  const date = parseCSVDateRaw(str);
  return date ? date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : str;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];

  // Detect delimiter - tab or comma
  const delim = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(delim).map(h => h.trim());

  // Map column indices
  const idx = {};
  const colMap = {
    date:      ['date','Date','DATE'],
    close:     ['close','Close','CLOSE'],
    open:      ['open','Open','OPEN'],
    high:      ['high','High','HIGH'],
    low:       ['low','Low','LOW'],
    vol:       ['volume','Volume','VOLUME','vol','VOL'],
    rsi:       ['RSI_14','rsi_14','RSI','rsi'],
    macdLine:  ['MACD_12_26_9','macd_12_26_9','MACD','macd'],
    signalLine:['MACDs_12_26_9','macds_12_26_9','MACDs','macds','SIGNAL'],
    atr:       ['ATRr_14','atr_14','ATR','atr','ATRr'],
    ma50:      ['SMA_50','sma_50','SMA50','MA50'],
    ma200:     ['SMA_200','sma_200','SMA200','MA200'],
    ma20:      ['EMA_20','ema_20','EMA20','MA20'],
  };

  Object.keys(colMap).forEach(key => {
    const match = colMap[key].find(name => headers.includes(name));
    if(match !== undefined) idx[key] = headers.indexOf(match);
  });

  const rows = [];
  for(let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if(!line) continue;
    const cols = line.split(delim).map(c => c.trim());

    const pf = (k) => {
      if(idx[k] === undefined || idx[k] < 0) return null;
      const v = parseFloat(cols[idx[k]]);
      return isNaN(v) ? null : v;
    };

    const dateStr = idx.date !== undefined ? cols[idx.date]?.trim() : null;
    if(!dateStr) continue;
    const rawDate = parseCSVDateRaw(dateStr);

    rows.push({
      date:       parseCSVDate(dateStr),
      _ts:        rawDate ? rawDate.getTime() : 0,
      price:      pf('close'),
      open:       pf('open'),
      high:       pf('high'),
      low:        pf('low'),
      vol:        pf('vol'),
      rsi:        pf('rsi'),
      macdLine:   pf('macdLine'),
      signalLine: pf('signalLine'),
      atr:        pf('atr'),
      ma50:       pf('ma50'),
      ma200:      pf('ma200'),
      ma20:       pf('ma20'),
    });
  }

  // Sort oldest to newest using the actual parsed date — never assume the
  // file's row order. A CSV that's already oldest-first would get silently
  // flipped backwards by a blind reverse(), corrupting "most recent row"
  // into "oldest row" everywhere downstream.
  rows.sort((a,b) => a._ts - b._ts);
  rows.forEach(r => delete r._ts);
  return rows;
}

  const file = input.files[0];

  const reader = new FileReader();

    const rows = parseCSV(e.target.result);

        </div>`);
      return;
    }

    pendingImportRows = rows;
    pendingImportStockId = stockId;
    const first = rows[0];
    const last  = rows[rows.length-1];
    const withData = rows.filter(r => r.price && r.rsi).length;

    // Preview the most recent 3 rows
    const preview = rows.slice(-3).reverse().map(r => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid ${C.border};">
        <span style="color:${C.textSub};font-size:12px;">${r.date}</span>
        <div style="display:flex;gap:12px;">
          <span style="color:${C.text};font-size:12px;font-weight:700;">${r.price?'$'+parseFloat(r.price).toFixed(2):'—'}</span>
          <span style="color:${r.rsi<30?C.green:r.rsi>70?C.red:C.yellow};font-size:12px;">RSI ${r.rsi!=null?parseFloat(r.rsi).toFixed(1):'—'}</span>
          <span style="color:${C.textSub};font-size:12px;">ATR ${r.atr?'$'+parseFloat(r.atr).toFixed(2):'—'}</span>
        </div>
      </div>`).join('');

    showModal(`
      <div style="background:${C.card};border-radius:20px;padding:24px;border:1px solid ${C.teal}44;">
        <div style="color:${C.text};font-size:20px;font-weight:900;margin-bottom:16px;">Ready to Import</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
          ${[
            {label:'Total Rows', val:rows.length+' days', color:C.teal},
            {label:'With Full Data', val:withData+' days', color:C.green},
            {label:'From', val:first.date||'—', color:C.textSub},
            {label:'To', val:last.date||'—', color:C.textSub},
          ].map(item=>`
          <div style="background:${C.cardHigh};border-radius:10px;padding:10px 12px;">
            <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">${item.label}</div>
            <div style="color:${item.color};font-size:13px;font-weight:800;">${item.val}</div>
          </div>`).join('')}
        </div>
        <div style="background:${C.cardHigh};border-radius:10px;padding:12px;margin-bottom:16px;">
          <div style="color:${C.textMuted};font-size:10px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px;">Most Recent Data</div>
          ${preview}
        </div>
        <div style="background:${C.yellowDim};border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid ${C.yellow}33;">
          <span style="color:${C.textSub};font-size:12px;line-height:1.5;">This will replace any existing snapshot history for this stock with the imported data.</span>
        </div>
        <div style="display:flex;gap:10px;">
          <button onclick="closeAllOverlays()" style="flex:1;padding:13px;border-radius:12px;border:1px solid ${C.border};background:none;color:${C.textSub};font-size:14px;font-weight:700;cursor:pointer;">Cancel</button>
          <button onclick="doImportCSV(pendingImportStockId)" style="flex:2;padding:13px;border-radius:12px;border:none;background:${C.teal};color:#000;font-size:14px;font-weight:900;cursor:pointer;">Import ${rows.length} Days ✓</button>
        </div>
      </div>`);
  };
  reader.readAsText(file);
}

function r2(v) { return v != null ? Math.round(v * 100) / 100 : null; }

async function doImportCSV(stockId) {
  const rows = pendingImportRows;
  if(!rows || !rows.length) {
    alert('No data to import. Please try selecting the file again.');
    return;
  }

  // Find stock — compare as strings to handle numeric/string id mismatch
  const s = stocks.find(x => String(x.id) === String(stockId));
  if(!s) {
    console.error('Stock not found for id:', stockId, 'Available:', stocks.map(x=>x.id));
    alert('Could not find the stock. Please go back and try again.');
    return;
  }

  // Round all numeric values to 2 decimal places
  const cleanRows = rows.map(row => ({
    date:       row.date,
    price:      r2(row.price),
    open:       r2(row.open),
    high:       r2(row.high),
    low:        r2(row.low),
    vol:        row.vol ? Math.round(row.vol) : null,
    rsi:        r2(row.rsi),
    macdLine:   r2(row.macdLine),
    signalLine: r2(row.signalLine),
    atr:        r2(row.atr),
    ma50:       r2(row.ma50),
    ma200:      r2(row.ma200),
    ma20:       r2(row.ma20),
  }));

  // ThinkorSwim's export gives raw daily volume, not a pre-computed average —
  // derive a trailing 20-day average from the volume history itself, so
  // volume-confirmation checks (oppScore, Volume Check, At-a-Glance) actually
  // have something to compare against instead of silently going blank.
  for(let i=0;i<cleanRows.length;i++){
    const windowVals = cleanRows.slice(Math.max(0,i-19), i+1).map(r=>r.vol).filter(v=>v!=null);
    cleanRows[i].avgvol = windowVals.length ? Math.round(windowVals.reduce((a,b)=>a+b,0)/windowVals.length) : null;
  }

  // Use the most recent row to update current stock values
  const latest = cleanRows[cleanRows.length - 1];
  const prevRow = cleanRows.length>1 ? cleanRows[cleanRows.length - 2] : null;
  const prevPrice = prevRow?.price ?? null;

  const updated = {
    ...s,
    price:      latest.price      ?? s.price,
    change:     prevPrice ? (latest.price - prevPrice) : s.change,
    pct:        prevPrice ? ((latest.price - prevPrice)/prevPrice)*100 : s.pct,
    rsi:        latest.rsi        ?? s.rsi,
    vol:        latest.vol        ?? s.vol,
    avgvol:     latest.avgvol     ?? s.avgvol,
    ma20:       latest.ma20       ?? s.ma20,
    ma50:       latest.ma50       ?? s.ma50,
    ma200:      latest.ma200      ?? s.ma200,
    macdLine:   latest.macdLine   ?? s.macdLine,
    signalLine: latest.signalLine ?? s.signalLine,
    atr:        latest.atr        ?? s.atr,
    analyzed:   latest.date       || s.analyzed,
    snapshots:  cleanRows,
  };

  // Update in-memory array first
  stocks = stocks.map(x => String(x.id) === String(stockId) ? updated : x);

  // Close overlay and re-render immediately so user sees result
  closeAllOverlays();
  renderDetail(updated);
  renderHome();

  // Then save to Firebase in background
  showSaveStatus('saving');
  try {
    await fbSaveStock(updated);
    showSaveStatus('saved');
    setTimeout(() => showSaveStatus('ready'), 2000);
  } catch(e) {
    showSaveStatus('error');
    console.error('Firebase save error:', e);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// AI ACCURACY CHECK-IN
// ═══════════════════════════════════════════════════════════════════════════════
function checkAccuracy(stockId, date) {
  showModal(`
    <div style="background:${C.card};border-radius:20px;padding:24px;border:1px solid ${C.border};">
      <div style="color:${C.text};font-size:18px;font-weight:900;margin-bottom:6px;">Check Accuracy</div>
      <div style="color:${C.textSub};font-size:13px;margin-bottom:20px;">How accurate was the analysis from ${date}?</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
        ${[{label:'Spot on — nailed it',pct:90},{label:'Pretty close — mostly right',pct:65},{label:'Mixed — some right some wrong',pct:40},{label:'Missed — was not accurate',pct:10}].map(opt=>`
        <button onclick="saveAccuracy('${stockId}','${date}',${opt.pct})" style="padding:13px 16px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid ${C.border};background:${C.cardHigh};color:${C.text};cursor:pointer;text-align:left;">${opt.label}</button>`).join('')}
      </div>
      <button onclick="closeAllOverlays()" style="width:100%;padding:12px;border-radius:12px;border:1px solid ${C.border};background:none;color:${C.textSub};font-size:14px;font-weight:600;cursor:pointer;">Cancel</button>
    </div>`);
}

async function saveAccuracy(stockId, date, pct) {
  const s = stocks.find(x=>String(x.id)===String(stockId));
  if(!s) return;
  const updated = {...s, aiLog:(s.aiLog||[]).map(e=>e.date===date?{...e,accuracy:pct}:e)};
  stocks = stocks.map(x=>String(x.id)===String(stockId)?updated:x);
  closeAllOverlays();
  await fbSaveStock(updated);
  renderDetail(updated);
}
</script>
