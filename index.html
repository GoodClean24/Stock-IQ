const C = {
  bg:'#0A0C10',card:'#11141C',cardHigh:'#181D27',cardPop:'#1E2330',
  border:'#1E2230',borderLight:'#252A3A',
  text:'#FFFFFF',textSub:'#7A8099',textMuted:'#3E4355',

  blue:'#4DA8FF',blueDim:'#091B30',

};

function vCfg(v) {

    'Buy Zone':{color:C.green,dim:C.greenDim,label:'BUY ZONE',glow:C.greenGlow},

}

// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCQ8WSyudw8YlL_0lbEBD84z0YP3NB9wgI",
  authDomain: "stockiq-app.firebaseapp.com",
  projectId: "stockiq-app",
  storageBucket: "stockiq-app.firebasestorage.app",
  messagingSenderId: "952009053458",
  appId: "1:952009053458:web:943d70b22bb9db9af60fcb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let unsubStocks = null;
let saveTimer   = null;

function stocksRef(uid) { return db.collection('users').doc(uid).collection('stocks'); }
function stockRef(uid, id) { return stocksRef(uid).doc(String(id)); }

async function fbSaveStock(stock) {
  if (!currentUser) return;
  await stockRef(currentUser.uid, stock.id).set(stock);
}
async function fbDeleteStock(id) {
  if (!currentUser) return;
  await stockRef(currentUser.uid, id).delete();
}

function scheduleSave(stock) {
  showSaveStatus('saving');
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await fbSaveStock(stock);
      showSaveStatus('saved');
      setTimeout(() => showSaveStatus('ready'), 2000);
    } catch(e) {
      showSaveStatus('error');
      console.error(e);
    }
  }, 1200);
}

function showSaveStatus(s) {
  const el = document.getElementById('save-status');
  if (!el) return;
  const map = {
    saving: {text:'Saving...', color:C.yellow},
    saved:  {text:'Saved ✓',  color:C.green},
    error:  {text:'Save failed — check connection', color:C.red},
    loading:{text:'Loading your stocks...', color:C.yellow},
  };
  if (s === 'ready') { el.style.display='none'; return; }
  const m = map[s];
  if (!m) return;
  el.style.display = 'block';
  el.textContent = m.text;
  el.style.color = m.color;
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════════════════
let stocks   = [];
let activeTag = 'All';
let addStep  = 0;
let addVals  = {};
let updateStep = 0;
let updateVals = {};
let updateStockId = null;
let mentorMode = null;      // 'setup' | 'analysis'
let mentorStockId = null;
let mentorStep = 0;
let mentorTabOrder = [];    // computed per-stock plan for 'analysis' mode
let mentorHistoryTier = 'full';   // 'full' | 'limited' — how much saved history the stock has
let mentorShowLimitedIntro = false; // whether step 0 is the Limited History intro screen
let searchQuery = '';
let sortMode = 'opportunity'; // 'opportunity' | 'price' | 'pct' | 'name'
let portfolioHidden = false;
let reclassifyDismissed = new Set(); // session-only — "Review Later" on the Both-strategy banner

// Old type values migrate automatically; 'Both' is deliberately left alone —
// it's not converted, it's flagged for the user to actually choose.
function migrateStockType(s) {
  if(s.type==='Swing') return 'Swing Trade';
  if(s.type==='Long Term') return 'Long-Term Hold';
  return s.type;
}
function needsReclassify(s) { return s.type==='Both'; }

function typeBadgeColors(type) {
  if(type==='Swing Trade') return {bg:C.blueDim, fg:C.blue};
  if(type==='Position Trade') return {bg:C.tealDim, fg:C.teal};
  if(type==='Long-Term Hold') return {bg:C.purpleDim, fg:C.purple};
  if(type==='Both') return {bg:C.orangeDim, fg:C.orange};
  return {bg:C.card, fg:C.textMuted};
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function parseVol(v) {
  if (!v) return null;
  const s = String(v).trim().toUpperCase();
  if (s.endsWith('B')) return parseFloat(s) * 1e9;
  if (s.endsWith('M')) return parseFloat(s) * 1e6;
  if (s.endsWith('K')) return parseFloat(s) * 1e3;
  return parseFloat(s) || null;
}
function fmtVol(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  return n.toLocaleString();
}
function fmtP(n) { return n != null ? '$'+parseFloat(n).toFixed(2) : '—'; }
function today() {
  return new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

// RSI classified by what it actually means for a trending stock, not just "overbought/oversold"
function rsiZone(rsi) {
  if(rsi==null) return null;
  if(rsi<30)   return {zone:'panic',  label:'Panic / Oversold',   color:C.green, note:'Sellers look exhausted. This is reversal territory — where beaten-down stocks often turn.'};
  if(rsi<40)   return {zone:'weak',   label:'Weak',               color:C.yellow,note:'Still soft, but drifting toward a bounce zone. Not there yet.'};
  if(rsi<50)   return {zone:'caution',label:'Caution',            color:C.yellow,note:'Neither strong nor weak. No real edge here on its own.'};
  if(rsi<65)   return {zone:'healthy',label:'Healthy Uptrend',    color:C.green, note:'This is where strong, well-behaved uptrends usually sit. Not a warning — a good sign.'};
  if(rsi<75)   return {zone:'strong', label:'Strong Momentum',    color:C.teal,  note:'Real strength. Good stocks can stay here for weeks — this is not automatically "too late."'};
  return           {zone:'hot',    label:'Watch Carefully',    color:C.red,   note:'Stretched further than most healthy trends go. Chasing here is risky — wait for it to cool off.'};
}

// Distance from the 50-day average, turned into a buy/wait zone
function distanceZone(price, ma50) {
  if(!price||!ma50) return null;
  const d = ((price-ma50)/ma50)*100;
  let zone,label,color,note;
  if(d<-5){ zone='broken';  label='Below Support'; color=C.red;   note='Price has broken meaningfully below its 50-day average. The trend may be turning down — proceed with caution.'; }
  else if(d<0){ zone='buy'; label='Buy Zone';       color=C.green;note='Price is testing its 50-day average from below and holding nearby. Classic dip-buy territory if the bigger trend is still up.'; }
  else if(d<5){ zone='buy'; label='Buy Zone';       color=C.green;note='Price just pulled back to its 50-day average and is holding. This is where buyers have historically stepped back in.'; }
  else if(d<10){ zone='healthy'; label='Healthy';   color=C.teal; note='A normal, comfortable distance above support. Not urgent, but nothing wrong here.'; }
  else if(d<20){ zone='extended'; label='Extended'; color=C.yellow;note='Price has run up further than most pullback buyers would chase. Getting in now means paying a premium.'; }
  else{ zone='wait'; label='Overextended — Wait'; color=C.orange; note='Price is stretched far above its average. Either it corrects soon, or you\'re late. Wait for it to come back down.'; }
  return {dist:d, zone, label, color, note};
}

// Turns the raw indicators into an actual game plan — buy zone, target, stop —
// instead of the static placeholder text typed in at add-time.
function computeGamePlan(s) {
  const dz = distanceZone(s.price, s.ma50);
  const atr = s.atr;

  let buyZone = 'Waiting on more data';
  let entryRef = s.price;   // the price the target/stop must be anchored to
  let entryPending = false; // true when the plan says "wait for a pullback", not "buy now"

  if(s.ma50 && s.price) {
    const lo = s.ma50*0.98, hi = s.ma50*1.03;
    if(dz && (dz.zone==='buy'||dz.zone==='healthy')) {
      buyZone = `${fmtP(lo)} - ${fmtP(hi)}`;
      entryRef = s.price; // buying near today's price
    } else if(dz && (dz.zone==='extended'||dz.zone==='wait')) {
      buyZone = `Wait for pullback to ~${fmtP(s.ma50)}`;
      entryRef = s.ma50;  // stop/target must anchor HERE, not today's extended price
      entryPending = true;
    } else if(dz && dz.zone==='broken') {
      buyZone = `Below support — wait for trend to repair`;
      entryRef = null;    // no valid entry yet — nothing to anchor a stop to
      entryPending = true;
    }
  }

  let profit = '—';
  if(entryRef!=null) {
    if(s.hi52 && entryRef<s.hi52) profit = `${fmtP(s.hi52)} (52-week high)`;
    else if(atr) profit = `${fmtP(entryRef + atr*3)} (3× ATR extension)`;
  }

  let stopRule = 'Set once you have an ATR reading.';
  let stopPrice = null;
  if(atr && entryRef!=null) {
    stopPrice = entryRef - atr*1.5;
    stopRule = entryPending
      ? `If it pulls back to ${fmtP(entryRef)} and you buy there, exit if price then closes below ${fmtP(stopPrice)} (1.5× ATR below that entry — not below today's price).`
      : `Exit if price closes below ${fmtP(stopPrice)} (1.5× ATR below entry). Objective, no-emotion stop, not a gut call.`;
  } else if(entryPending) {
    stopRule = 'No valid entry yet — the trend needs to repair before a stop makes sense.';
  }

  return {buyZone, profit, stopRule, stopPrice, entryPending, entryRef};
}


// Single source of truth for "what's actually going on" — both the ranking
// math (oppScore) and the plain-English narrative read from this, so they
// never disagree with each other.
function analyzeSetup(s) {
  const rz = rsiZone(s.rsi);
  const dz = distanceZone(s.price, s.ma50);
  const volRatio = s.vol&&s.avgvol ? s.vol/s.avgvol : null;
  const volConfirmed = volRatio!=null && volRatio>1.2;
  const trendUp = s.ma50&&s.ma200&&s.price ? (s.price>s.ma50 && s.price>s.ma200) : false;
  const trendBroken = s.ma200&&s.price ? s.price < s.ma200*0.97 : false;
  const nearMA200 = s.ma200&&s.price ? Math.abs((s.price-s.ma200)/s.ma200)<0.05 : false;
  const macdBull = s.macdLine!=null&&s.signalLine!=null&&s.macdLine>s.signalLine;

  const reversalAligned = nearMA200 && rz && (rz.zone==='panic'||rz.zone==='weak') && volConfirmed;
  const pullbackAligned = trendUp && dz && (dz.zone==='buy'||dz.zone==='healthy') && rz && (rz.zone==='caution'||rz.zone==='healthy') && volConfirmed;

  return {rz, dz, volRatio, volConfirmed, trendUp, trendBroken, nearMA200, macdBull, reversalAligned, pullbackAligned};
}

// The overall 0-100 setup score shown on the ring (stock card, quick view, detail header).
// This replaces the old hardcoded "score: 70" that never changed after a stock was added.
// NOTE: this is the one overall score — deliberately NOT four separate category
// sub-scores. Those are too easy to dress up as precise when they're really just
// the same signal relabeled as a number.
function computeSetupScore(s) {
  const setup = analyzeSetup(s);
  const {rz, dz, volConfirmed, trendUp, trendBroken} = setup;

  let trendPts = 0;
  if(trendBroken) trendPts = 0;
  else if(trendUp) trendPts = 30;
  else if(s.ma200&&s.price&&s.price>s.ma200) trendPts = 15;

  let momPts = 8;
  if(rz) {
    if(rz.zone==='healthy') momPts = 25;
    else if(rz.zone==='strong') momPts = 20;
    else if(rz.zone==='panic') momPts = 15;
    else if(rz.zone==='weak') momPts = 10;
    else if(rz.zone==='caution') momPts = 12;
    else if(rz.zone==='hot') momPts = 8;
  }

  const volPts = volConfirmed ? 20 : (setup.volRatio!=null && setup.volRatio>=0.8 ? 10 : 4);

  let riskPts = 10;
  if(dz) {
    if(dz.zone==='buy') riskPts = 25;
    else if(dz.zone==='healthy') riskPts = 18;
    else if(dz.zone==='extended') riskPts = 10;
    else if(dz.zone==='wait') riskPts = 4;
    else if(dz.zone==='broken') riskPts = 0;
  }

  const score = Math.max(0, Math.min(100, Math.round(trendPts+momPts+volPts+riskPts)));
  let label, color;
  if(score>=75){label='STRONG SETUP';color=C.green;}
  else if(score>=55){label='GOOD SETUP';color=C.green;}
  else if(score>=35){label='WEAK SETUP';color=C.yellow;}
  else {label='AVOID SETUP';color=C.red;}

  return {score, label, color};
}

function oppScore(s) {
  const {rz, dz, volConfirmed, trendUp, trendBroken, reversalAligned, pullbackAligned} = analyzeSetup(s);

  let score=0, reason='Monitoring', signals=0;

  if(s.verdict==='Buy Zone') score+=15;
  else if(s.verdict==='Watch') score+=8;
  else if(s.verdict==='Pass') score-=15;

  if(reversalAligned){ score+=50; signals=4; reason='Reversal setup — signals aligned'; }
  else if(pullbackAligned){ score+=50; signals=4; reason='Pullback in uptrend — signals aligned'; }
  else {
    let partial=0;
    if(trendUp){partial+=8;signals++;}
    if(dz&&dz.zone==='buy'){partial+=8;signals++;}
    if(rz&&(rz.zone==='healthy'||rz.zone==='panic')){partial+=6;signals++;}
    if(volConfirmed){partial+=6;signals++;}
    score+=partial;
    reason = signals>=2 ? `${signals} of 4 signals lining up` : signals===1 ? 'Only one signal present' : 'Monitoring';
  }

  if(trendBroken){ score-=20; reason='Below long-term support'; }
  if(dz&&dz.zone==='wait') score-=10;
  if(rz&&rz.zone==='hot') score-=8;

  return {oppScore:Math.max(0,score), reason, signals};
}

function splitBudget(budget, count) {
  const b = parseFloat(budget)||0;
  if(count===1) return [b];
  if(count===2) return [Math.round(b*0.4), Math.round(b*0.6)];
  if(count===3) return [Math.round(b*0.3), Math.round(b*0.3), Math.round(b*0.4)];
  const each = Math.round(b/count);
  return Array(count).fill(each);
}

// Default list order now comes from the Opportunity Ranking Engine's
// decision tree (Opportunity Status > Entry Quality > Conviction > AI
// Research), not the old oppScore heuristic — Score is retired, per the
// review; starred stocks still float to the top regardless, since that's
// an explicit user signal the ranking engine doesn't try to second-guess.
function getRanked() {
  const rankMap = new Map(computeOpportunityRanking(stocks).map(item => [String(item.s.id), item]));
  return [...stocks].sort((a,b) => {
    if(a.starred&&!b.starred) return -1;
    if(!a.starred&&b.starred) return 1;
    const itemA = rankMap.get(String(a.id)), itemB = rankMap.get(String(b.id));
    if(itemA && itemB) return compareOpportunityRank(itemA, itemB);
    if(itemA) return -1;
    if(itemB) return 1;
    return 0;
  });
}

function getSignal(s) {
  const {rsi,vol,avgvol,price,ma50,ma200,macdLine,signalLine} = s;
  if(!vol||!avgvol) return null;
  const ratio=vol/avgvol;
  const aboveAvg=ratio>=1.2;
  const macdBull=macdLine!=null&&signalLine!=null&&macdLine>signalLine;
  const macdBear=macdLine!=null&&signalLine!=null&&macdLine<signalLine;
  const nearMA200=ma200&&Math.abs((price-ma200)/ma200)<0.04;
  const belowMA50=ma50&&price<ma50;
  if(rsi<30&&aboveAvg&&macdBull) return{icon:'🎯',color:C.green,signal:'High Conviction Buy',read:`Three things are lining up right now. The stock is oversold (RSI ${rsi}), more people than usual are trading it, and the momentum indicator just flipped upward. When all three agree like this it's one of the strongest buy signals available.`};
  if(rsi<30&&aboveAvg) return{icon:'🚀',color:C.green,signal:'Oversold + Strong Volume',read:`The stock has been beaten down to oversold levels (RSI ${rsi}) and today's trading volume is above average. Sellers may be running out of steam. Watch for the momentum indicator to flip bullish — that's your confirmation.`};
  if(rsi<30&&macdBull) return{icon:'💪',color:C.green,signal:'Oversold + Momentum Turning',read:`The stock is oversold (RSI ${rsi}) and the momentum indicator just crossed bullish. Two of three signals are green. Volume is the missing piece — wait for an above-average volume day to confirm.`};
  if(nearMA200&&aboveAvg&&macdBull) return{icon:'🏆',color:C.green,signal:'Bouncing Off Key Support',read:`The stock is right at its long-term support level and bouncing with above-average volume and bullish momentum. This is exactly the kind of setup where institutions step back in.`};
  if(aboveAvg&&belowMA50&&macdBear) return{icon:'🔴',color:C.red,signal:'Breakdown Warning',read:`The stock is falling below its medium-term support line on above-average volume with momentum pointing down. Not a dip to buy yet. Wait for selling to slow before considering any entry.`};
  if(rsi>70&&aboveAvg) return{icon:'🏔️',color:C.orange,signal:"Overbought — Don't Chase",read:`The stock has run up a lot and RSI is at ${rsi} — well into overbought territory. Buying here means chasing. Wait for a healthy pullback before entering.`};
  return{icon:'📊',color:C.textSub,signal:'No Clear Signal Yet',read:`The indicators aren't giving a strong signal in either direction right now. Volume is ${ratio.toFixed(1)}x average and RSI is ${rsi||'—'}. Keep watching daily.`};
}

// Compact 2-line trend label ("Uptrend / Strong", "Bottoming / Building", etc.)
function computeTrendLabel(s) {
  const setup = analyzeSetup(s);
  const {rz, dz, trendUp, trendBroken} = setup;
  if(trendBroken) return {line1:'Downtrend', line2:'Weak', color:C.red};
  if(trendUp) {
    if(dz && dz.zone==='extended') return {line1:'Uptrend', line2:'Extended', color:C.yellow};
    if(rz && (rz.zone==='healthy'||rz.zone==='strong')) return {line1:'Uptrend', line2:'Strong', color:C.green};
    return {line1:'Uptrend', line2:'Moderate', color:C.green};
  }
  if(rz && (rz.zone==='panic'||rz.zone==='weak')) return {line1:'Bottoming', line2:'Building', color:C.yellow};
  return {line1:'Mixed', line2:'Watching', color:C.textSub};
}

// Small inline sparkline — price only, no axis/labels, sized for a list row.
function miniSparkline(s, color) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.price!=null).slice(-30);
  if(snaps.length<2) return `<div style="width:100%;height:36px;display:flex;align-items:center;justify-content:center;"><span style="color:${C.textMuted};font-size:9px;">No history yet</span></div>`;
  const W=110,H=36,pad=3;
  const vals = snaps.map(sn=>sn.price);
  const min=Math.min(...vals), max=Math.max(...vals), range=(max-min)||1;
  const xStep=(W-pad*2)/(snaps.length-1);
  const pts = snaps.map((sn,i)=>`${pad+i*xStep},${H-pad-((sn.price-min)/range)*(H-pad*2)}`).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:36px;display:block;"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// Game-plan status chip for the list row — icon + short label + color.
// Rewired onto the Section 4 Action engine (computeAction/computeMarketState)
// instead of the older brokerRead-based four-signal system. Keeping the old
// logic here would let the watchlist badge contradict the Game Plan tab on
// the same stock — one source of truth for "what's happening," same as
// everywhere else in the app.
function computeGamePlanStatus(s) {
  const stage = computeGamePlanStage(s);
  const STAGE_BADGE = {
    'Archived':  {icon:'📦', label:'Archived', color:C.textMuted},
    'Completed': {icon:'✅', label:'Completed', color:C.textSub},
    'Exiting':   {icon:'🔴', label:'Exiting', color:C.red},
    'Managing':  {icon:'🛡', label:'Managing', color:C.teal},
    'Ready':     {icon:'🎯', label:'Ready', color:C.green},
    'Preparing': {icon:'📶', label:'Preparing', color:C.yellow},
    'Watching':  {icon:'👁', label:'Watching', color:C.textSub},
  };
  return STAGE_BADGE[stage] || STAGE_BADGE['Watching'];
}

function renderStockList() {
  let ranked = getRanked();

  if(searchQuery) {
    ranked = ranked.filter(s => s.ticker.toLowerCase().includes(searchQuery) || (s.name||'').toLowerCase().includes(searchQuery));
  }

  const filtered = ranked.filter(s => {
    if(activeTag==='Archived') return !!s.archived;
    if(s.archived) return false; // archived stocks never appear outside the Archived tag
    if(activeTag==='All') return true;
    if(activeTag==='★ Favorites') return s.starred;
    if(activeTag==='Swing Trade') return s.type==='Swing Trade';
    if(activeTag==='Position Trade') return s.type==='Position Trade';
    if(activeTag==='Long-Term Hold') return s.type==='Long-Term Hold';
    return s.verdict===activeTag;
  });

  // Secondary sort on top of the starred-first ranking, per the Sort by control
  if(sortMode!=='opportunity') {
    filtered.sort((a,b) => {
      if(a.starred&&!b.starred) return -1;
      if(!a.starred&&b.starred) return 1;
      if(sortMode==='price') return (b.price||0)-(a.price||0);
      if(sortMode==='pct') return (b.pct||0)-(a.pct||0);
      if(sortMode==='name') return (a.ticker||'').localeCompare(b.ticker||'');
      return 0;
    });
  }

  const el = document.getElementById('stock-list');
  if(filtered.length===0) {
    el.innerHTML=`<div style="text-align:center;padding:60px 0;">
      <div style="font-size:40px;margin-bottom:14px;">📋</div>
      <div style="color:${C.textSub};font-size:16px;font-weight:700;margin-bottom:6px;">${searchQuery?'No matches':'No stocks here yet'}</div>
      <div style="color:${C.textMuted};font-size:13px;">${searchQuery?'Try a different ticker or name':'Tap + Add Stock to start building your playbook'}</div>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map((s,i)=>renderStockCard(s,i+1)).join('');
}

// Checks a filled position's stop against real confirmation (trend/volume),
// not just "did price touch the number" — so a normal pullback within an
// intact uptrend doesn't read the same as a real breakdown.
function checkExitSignal(s) {
  const filled = (s.tranche||[]).filter(t=>t.status==='filled');
  if(!filled.length || !s.atr) return null;
  // Anchor on the actual average entry price of shares you hold — NOT
  // computeGamePlan's forward-looking new-entry stop, which goes blank when
  // the trend is broken (exactly when a held position needs this most).
  const totalShares = filled.reduce((a,t)=>a+(t.shares||0),0);
  if(totalShares<=0) return null;
  const avgEntry = filled.reduce((a,t)=>a+(t.entryPrice||0)*(t.shares||0),0)/totalShares;
  const stopPrice = avgEntry - s.atr*1.5;
  const belowStop = s.price <= stopPrice;
  if(!belowStop) return {triggered:false, confirmed:false, color:C.green,
    message:`Price (${fmtP(s.price)}) is still above your stop (${fmtP(stopPrice)}), based on your average entry of ${fmtP(avgEntry)}. No action needed.`};
  const setup = analyzeSetup(s);
  const confirmed = setup.trendBroken || setup.volConfirmed;
  if(confirmed) return {triggered:true, confirmed:true, color:C.red,
    message:`Price closed below your stop (${fmtP(stopPrice)}) AND ${setup.trendBroken?'the long-term trend has broken':'volume confirms real selling'} — this looks like a real breakdown, not noise. Worth exiting.`};
  return {triggered:true, confirmed:false, color:C.yellow,
    message:`Price dipped below your stop (${fmtP(stopPrice)}), but volume is quiet and the trend hasn't broken. This could be normal noise inside the uptrend rather than a real reversal — a confirmed breakdown usually shows heavier volume or a broken trend. Use judgment before exiting.`};
}

// Live version of the wizard's suggestHoldType — reads the stock's current
// numbers instead of the one-time answers typed in at add-time. Deliberately
// cautious: never confidently suggests Long-Term Hold from technicals alone
// (that needs business/valuation research this app can't do), and requires
// a real defined setup — not just "ATR is big" — before suggesting Swing.
function suggestHoldTypeLive(s) {
  if(!s.price || !s.ma50 || !s.ma200 || !s.atr) return null;
  const setup = analyzeSetup(s);
  const { trendUp, dz, trendBroken } = setup;
  const atrPct = (s.atr/s.price)*100;
  const slope = computeMASlope(s);
  const ma50Rising = slope ? slope.rising50 : null;
  const gp = computeGamePlan(s);
  const hasDefinedSetup = gp.stopPrice!=null && gp.profit && gp.profit!=='—';
  const notSeverelyExtended = dz && dz.zone!=='wait' && dz.zone!=='broken';
  const liquidityOk = !s.avgvol || s.avgvol>=300000;

  const positionCandidate = trendUp && notSeverelyExtended && ma50Rising!==false;
  const swingCandidate = hasDefinedSetup && atrPct>=2 && !trendBroken && liquidityOk;
  const looksLongTermTechnically = trendUp && atrPct<2 && notSeverelyExtended;

  if(looksLongTermTechnically) {
    return {label:null, confident:false, longTermCandidate:true,
      reason:`Technicals support a long-term uptrend, but business quality and valuation research are still required before classifying this as a Long-Term Hold.`};
  }
  if(positionCandidate) {
    return {label:'Position Trade', confident:true,
      reason:`Price is above its 200-day average${ma50Rising?' and the 50-day is rising':''}, and the intermediate trend looks healthy without being severely extended.`};
  }
  if(swingCandidate) {
    return {label:'Swing Trade', confident:true,
      reason:`There's a defined technical setup here — a real stop and target — with enough daily movement (ATR ${atrPct.toFixed(1)}%) for a shorter-term trade.`};
  }
  return {label:null, confident:false,
    reason:`Nothing here clearly supports one strategy over another right now — no defined setup, and the trend isn't confirmed either way.`};
}

// Real, live risk flags instead of a frozen placeholder — pulls from
// whatever the current data actually shows could go wrong right now.
function computeWatchOuts(s) {
  const setup = analyzeSetup(s);
  const dz = distanceZone(s.price, s.ma50);
  const rz = rsiZone(s.rsi);
  const out = [];
  if(dz && (dz.zone==='extended'||dz.zone==='wait')) out.push('Price is extended above the 50-day — chasing here means paying a premium.');
  if(rz && rz.zone==='hot') out.push('RSI is stretched — a pullback could come at any time.');
  if(setup.volRatio!=null && !setup.volConfirmed) out.push('Volume is quiet right now — the current move doesn\'t have strong conviction behind it yet.');
  if(setup.trendBroken) out.push('Price has broken below the 200-day — the long-term trend is no longer confirmed.');
  if(s.atr && s.price) {
    const budget = s.invested||150;
    const riskPct = budget>0 ? ((budget/s.price)*(s.atr*1.5)/budget)*100 : null;
    if(riskPct!=null && riskPct>=15) out.push('Your position size is tight relative to this stock\'s normal daily movement — a normal down day could stop you out early.');
  }
  const parsed = parseResearch(s.research);
  if(parsed && parsed.risk) out.push(`From your research: ${parsed.risk}`);
  return out;
}

// Unfilled tranche price zones are now computed live at render time instead
// of frozen the moment "Build Buy Plan" was tapped — so they track price
// instead of going stale after a week of updates.
function computeTrancheZone(s, tranche, index) {
  if(index===0) {
    const gp = computeGamePlan(s);
    return gp.buyZone;
  }
  const step = s.atr ? s.atr : s.price*0.03;
  const zonePrice = s.price - (step*1.5*index);
  return `Around ${fmtP(zonePrice)}`;
}

// Days remaining (or overdue) on a plan, computed from the stock's actual
// creation timestamp instead of a frozen "90 days" string set once and
// never touched again.
function computePlanExpiry(s) {
  const created = s.id; // id is Date.now() at creation
  if(!created || typeof created !== 'number') return {text:'90 days', overdue:false};
  const daysElapsed = Math.floor((Date.now()-created)/(1000*60*60*24));
  const daysLeft = 90-daysElapsed;
  if(daysLeft<0) return {text:`Overdue by ${Math.abs(daysLeft)} day${Math.abs(daysLeft)===1?'':'s'} — reassess this thesis`, overdue:true};
  if(daysLeft===0) return {text:'Expires today — reassess this thesis', overdue:true};
  return {text:`${daysLeft} day${daysLeft===1?'':'s'}`, overdue:false};
}

    </div>`;
}

// The "seasoned broker" summary — ties every indicator into one narrative
// instead of five separate cards you have to piece together yourself.
function brokerRead(s, setup, traj) {
  const {rz, dz, volConfirmed, trendUp, trendBroken, nearMA200, macdBull, reversalAligned, pullbackAligned} = setup;

  if(pullbackAligned) {
    return {
      verdict: 'BUY NOW', verdictSub: 'Setup is here',
      headline: 'Textbook Pullback — Signals Aligned',
      icon: '🎯', color: C.green,
      read: `${s.ticker} is in a confirmed uptrend, sitting in a healthy buy zone off its 50-day average. RSI has cooled to a reasonable level without breaking down, and volume is confirming real buying interest. This is the kind of setup worth acting on.${macdBull?' Momentum agrees too.':' MACD hasn\'t flipped bullish yet — a nice-to-have, not a dealbreaker.'}`,
      waitingOn: []
    };
  }
  if(reversalAligned) {
    return {
      verdict: 'BUY NOW', verdictSub: 'Higher risk — size it small',
      headline: 'Reversal Setup — Signals Aligned',
      icon: '🔄', color: C.green,
      read: `${s.ticker} is sitting near its long-term support, RSI shows real selling exhaustion, and volume is picking up — the combination that usually marks a turn. This is higher risk than a trend pullback since the bigger trend isn't confirmed yet, so size it accordingly.`,
      waitingOn: []
    };
  }
  if(trendBroken) {
    return {
      verdict: 'AVOID', verdictSub: 'Until the trend repairs',
      headline: 'Trend Is Broken — Stand Down',
      icon: '🔴', color: C.red,
      read: `${s.ticker} has dropped meaningfully below its 200-day average — the line separating a healthy long-term trend from a broken one. Don't treat this as a discount. Wait for the trend to repair before considering an entry.`,
      waitingOn: []
    };
  }

  const pullbackMissing = [];
  if(!trendUp) pullbackMissing.push('Price needs to trade above both the 50-day and 200-day averages to confirm the uptrend.');
  if(!s.ma50) {
    pullbackMissing.push(`No 50-day average yet — this stock doesn't have 50 days of trading history. Pullback entries aren't checkable until it does.`);
  } else if(!(dz&&(dz.zone==='buy'||dz.zone==='healthy'))) {
    pullbackMissing.push(`Price needs to pull back to within 5% of the 50-day average (under ~${fmtP(s.ma50*1.05)}) — it's currently ${dz.dist.toFixed(1)}% above it.`);
  }
  if(!(rz&&(rz.zone==='caution'||rz.zone==='healthy'))) {
    if(rz && rz.zone==='hot') pullbackMissing.push(`RSI needs to drop under 65 — it's currently ${s.rsi}.`);
    else pullbackMissing.push(`RSI needs to be in the 40-65 range — it's currently ${s.rsi??'unknown'}.`);
  }
  if(!volConfirmed) pullbackMissing.push(`Volume needs to rise above 1.2× the 20-day average — it's currently running at ${setup.volRatio!=null?setup.volRatio.toFixed(1)+'×':'an unknown level'}.`);
  if(!macdBull) pullbackMissing.push(`MACD hasn't crossed bullish yet (line below signal) — not required, but adds confirmation if it does.`);

  const reversalMissing = [];
  if(!nearMA200) reversalMissing.push(s.ma200 ? `Price needs to be within 5% of the 200-day average (${fmtP(s.ma200)}) — it's currently further away.` : `No 200-day average yet — this stock doesn't have 200 days of trading history. Reversal-off-support isn't checkable until it does.`);
  if(!(rz&&(rz.zone==='panic'||rz.zone==='weak'))) reversalMissing.push(`RSI needs to drop under 40 to show real selling exhaustion — it's currently ${s.rsi??'unknown'}.`);
  if(!volConfirmed) reversalMissing.push(`Volume needs to rise above 1.2× the 20-day average to confirm the bounce has support — it's currently running at ${setup.volRatio!=null?setup.volRatio.toFixed(1)+'×':'an unknown level'}.`);

  const useReversal = reversalMissing.length < pullbackMissing.length;
  const missing = useReversal ? reversalMissing : pullbackMissing;
  const setupName = useReversal ? 'a reversal off support' : 'a pullback entry in an uptrend';

  // Use trend history, if you have it, to say whether this is getting closer or further away —
  // this is the "now vs. future vs. never" call, not just a snapshot of today.
  let trajLine = '';
  if(traj && traj.enough) {
    if(traj.rsiTrend!=null) {
      if(useReversal && traj.rsiTrend<0) trajLine = ` RSI has been falling over the last 10 days, which is the right direction for a reversal setup — this could be close.`;
      else if(!useReversal && traj.rsiTrend>0) trajLine = ` RSI has been climbing over the last 10 days, moving the right direction for a pullback setup — worth checking back soon.`;
      else if(useReversal && traj.rsiTrend>0) trajLine = ` RSI has actually been climbing recently, which works against a reversal setup — this may not be close.`;
      else if(!useReversal && traj.rsiTrend<0) trajLine = ` RSI has been falling recently, moving away from a healthy pullback range — this may take longer.`;
    }
  }

  return {
    verdict: 'WAIT', verdictSub: missing.length>2 ? 'Not close yet' : 'Getting closer',
    headline: 'Not Ready Yet',
    icon: '📊', color: C.yellow,
    read: `${s.ticker} isn't lined up for a clean entry right now. The closest fit is ${setupName} — here's what still needs to happen before this is worth acting on.${trajLine}`,
    waitingOn: missing.length?missing:['Keep watching daily — nothing stands out yet in either direction.']
  };
}

// Turns snapshot history into a plain-English trend read — shared so both
// the Analysis tab and the verdict logic can use the same trajectory data.
function computeTrajectory(s) {
  const snaps = s.snapshots||[];
  if(snaps.length<3) {
    return {
      text: `You have ${snaps.length} update${snaps.length===1?'':'s'} saved. Import a CSV from ThinkorSwim or keep entering daily data — after 3 updates the app will start showing you how this stock is trending.`,
      rsiTrend: null, volTrendUp: null, enough: false
    };
  }
  const f=snaps[0],l=snaps[snaps.length-1];
  const rd=l.rsi<f.rsi?'dropped':'climbed';
  const pd=l.price>f.price?'moved up':'moved down';
  const days=snaps.length;
  const weeks=Math.round(days/5);
  const timeLabel=days>=20?`${weeks} weeks`:days>=5?`${Math.round(days/5)} week`:`${days} days`;

  const recent=snaps.slice(-10);
  const rsiVals=recent.map(r=>r.rsi).filter(v=>v!=null);
  const rsiTrend=rsiVals.length>=2?(rsiVals[rsiVals.length-1]-rsiVals[0]).toFixed(1):null;
  const rsiTrendStr=rsiTrend?parseFloat(rsiTrend)>0?`RSI has been rising ${rsiTrend} points over the last 10 days — momentum building.`:`RSI has dropped ${Math.abs(rsiTrend)} points recently — sellers in control short term.`:'';

  const volVals=recent.map(r=>r.vol).filter(v=>v!=null);
  const avgRecent=volVals.length?volVals.reduce((a,b)=>a+b,0)/volVals.length:null;
  const allVols=snaps.map(r=>r.vol).filter(v=>v!=null);
  const avgAll=allVols.length?allVols.reduce((a,b)=>a+b,0)/allVols.length:null;
  const volTrendUp = avgRecent&&avgAll ? avgRecent>avgAll*1.2 : null;
  const volTrendStr=avgRecent&&avgAll?(volTrendUp?'Volume has been above average recently — institutional interest is elevated.'
    :avgRecent<avgAll*0.8?'Volume has been below average recently — quiet period with lower conviction.'
    :'Volume is running near its historical average — normal trading conditions.'):'';

  const maNote=l.ma200&&l.price?(l.price>l.ma200?'Price is holding above the long-term support line — the big picture trend is still healthy.':'Price has dropped below the long-term support line — worth being cautious.'):'';

  return {
    text: `Over the past ${timeLabel} (${days} trading days), ${s.ticker} has ${pd} from ${fmtP(f.price)} to ${fmtP(l.price)} and RSI has ${rd} from ${f.rsi?.toFixed(0)||'—'} to ${l.rsi?.toFixed(0)||'—'}. ${rsiTrendStr} ${volTrendStr} ${maNote}`.trim(),
    rsiTrend: rsiTrend!=null?parseFloat(rsiTrend):null,
    volTrendUp, enough: true
  };
}

// Support/resistance approximated from the data we actually have — moving
// averages, 52-week range, and any highs seen in imported snapshot history.
// This is an approximation, not true swing-structure detection.
function computeKeyLevels(s) {
  const price = s.price;
  const levels = {support:null, nextSupport:null, resistance:null, nextResistance:null};
  if(!price) return levels;

  const supportCandidates = [];
  if(s.ma50 && s.ma50<price) supportCandidates.push({price:s.ma50, label:'Near 50-day average'});
  if(s.ma200 && s.ma200<price) supportCandidates.push({price:s.ma200, label:'Near 200-day average'});
  if(s.lo52 && s.lo52<price) supportCandidates.push({price:s.lo52, label:'52-week low'});
  supportCandidates.sort((a,b)=>b.price-a.price);
  if(supportCandidates.length){ levels.support = supportCandidates[0]; if(supportCandidates.length>1) levels.nextSupport = supportCandidates[1]; }

  const resistanceCandidates = [];
  const highs = (s.snapshots||[]).map(sn=>sn.high).filter(h=>h!=null && h>price);
  if(highs.length) resistanceCandidates.push({price:Math.max(...highs), label:'Recent high'});
  if(s.hi52 && s.hi52>price) resistanceCandidates.push({price:s.hi52, label:'52-week high'});
  resistanceCandidates.sort((a,b)=>a.price-b.price);
  if(resistanceCandidates.length){ levels.resistance = resistanceCandidates[0]; if(resistanceCandidates.length>1) levels.nextResistance = resistanceCandidates[1]; }

  return levels;
}

// Six-cell summary grid — Trend, Momentum, Volume, Risk Level, Position Size, Overall.
// Builds a copy-ready prompt with StockIQ's real live numbers, so an external
// Claude/ChatGPT session analyzes actual data instead of guessing. Deliberately
// tells the AI NOT to redo the technical math — that's StockIQ's job and it's
// already computed here. The AI's job is the part StockIQ structurally can't
// do: news, catalysts, analyst sentiment, fundamentals.
function buildAIPrompt(s) {
  const conviction = computeConviction(s);
  const ms = computeMarketState(s);
  const action = computeAction(s);
  const stage = computeGamePlanStage(s);
  const invalidation = computeInvalidation(s, s.type);
  const levels = computeKeyLevels(s);
  const gp = computeGamePlan(s);
  const trendEv = computeTrendEvidence(s);
  const momentumEv = computeMomentumEvidence(s);
  const volumeEv = computeVolumeEvidence(s);
  const volatilityEv = computeVolatilityEvidence(s);

  const lines = [];
  lines.push(`Analyze ${s.ticker} (${s.name}) using the StockIQ summary below, plus your own knowledge of recent news, earnings, analyst sentiment, valuation, and competitive position.`);
  lines.push('');
  lines.push(`Your primary job is to challenge this conclusion, not reinforce it. If the technical setup looks good but the fundamentals or current news materially increase the risk of this trade, say so clearly — don't just agree with StockIQ.`);
  lines.push('');
  lines.push(`Assume the technical data below is correct — don't recompute or re-explain RSI, moving averages, support, resistance, or ATR unless they materially conflict with the fundamental picture. Focus on what a price chart can't tell me: catalysts, valuation, competitive position, fundamentals, and risks.`);
  lines.push('');
  lines.push(`STOCKIQ SUMMARY:`);
  lines.push(`- Price: ${fmtP(s.price)} (${(s.pct||0)>=0?'+':''}${(s.pct||0).toFixed(2)}% since last update)`);
  if(s.notes) lines.push(`- My Notes (why I added this stock): ${s.notes}`);
  if(s.scannerSource) lines.push(`- Scanner Source: ${s.scannerSource}`);
  lines.push(`- Market State: ${ms.state}${ms.evidence?` (${ms.evidence} evidence)`:''}`);
  lines.push(`- Conviction: ${conviction.level} — ${conviction.reason}${conviction.level==='Insufficient Evidence'?' (this reflects thin logged history in the app, not necessarily a weak stock — the technical readings below are still real, current-day numbers.)':''}`);
  lines.push(`- Current Stage / Action: ${stage} — ${action.action}`);
  lines.push(`- Trend: ${trendEv.verdict} — ${trendEv.teach}`);
  lines.push(`- Momentum: ${momentumEv.verdict} — ${momentumEv.teach}`);
  lines.push(`- Volume: ${volumeEv.verdict} — ${volumeEv.teach}`);
  lines.push(`- Volatility: ${volatilityEv.verdict} — ${volatilityEv.teach}`);
  if(levels.support) lines.push(`- Support: ${fmtP(levels.support.price)} (${levels.support.label})`);
  if(levels.resistance) lines.push(`- Resistance: ${fmtP(levels.resistance.price)} (${levels.resistance.label})`);
  lines.push(`- My Game Plan: Entry ${gp.buyZone}, Target ${gp.profit}, Stop ${gp.stopPrice!=null?fmtP(gp.stopPrice):'—'}`);
  lines.push(`- Invalidation: ${invalidation.text}`);
  if(s.earningsDate) lines.push(`- Next Earnings Date: ${s.earningsDate}`);
  lines.push(`- Position type: ${s.type||'—'}, typical position size ~${fmtP(s.invested||150)}`);
  lines.push('');
  lines.push(`Respond using EXACTLY these headers, in this order, so I can drop each section into the right place in my app. Keep each section to 2-3 sentences, concise and specific to ${s.ticker}:`);
  lines.push('');
  lines.push(`CATALYSTS:`);
  lines.push(`(Recent events in the next 1-3 months that could materially move the stock)`);
  lines.push('');
  lines.push(`ANALYST SENTIMENT:`);
  lines.push(`(Don't just summarize consensus. Where might Wall Street be wrong about this stock right now? Recent upgrades/downgrades and price targets only matter here if they reveal disagreement or a shift in thinking.)`);
  lines.push('');
  lines.push(`VALUATION:`);
  lines.push(`(Is the stock reasonably valued, expensive, or cheap relative to its history and peers? Would that make you more or less patient entering here?)`);
  lines.push('');
  lines.push(`FUNDAMENTALS VS TECHNICALS:`);
  lines.push(`(Does the underlying business support or contradict StockIQ's technical conclusion?)`);
  lines.push('');
  lines.push(`KEY RISK:`);
  lines.push(`(The biggest non-technical risk here that StockIQ cannot see)`);
  lines.push('');
  lines.push(`BLIND SPOTS:`);
  lines.push(`(One important thing a chart-only investor would likely miss — regulation, insider selling, customer concentration, litigation, etc.)`);
  lines.push('');
  lines.push(`STRESS TEST:`);
  lines.push(`(If you disagree with any part of StockIQ's analysis, Market State, or Game Plan, explain why. If nothing fundamentally contradicts the technical setup, say so explicitly instead of leaving this blank.)`);
  lines.push('');
  lines.push(`BOTTOM LINE:`);
  lines.push(`(Would you be more confident, equally confident, or less confident taking this trade after considering the fundamentals? Explain briefly.)`);
  lines.push('');
  lines.push(`Keep the headers exactly as written above (all caps, with the colon) so I can paste your answer straight into my app.`);

  return lines.join('\n');
}

async function copyAIPrompt(id) {
  const s = stocks.find(x=>String(x.id)===String(id));
  if(!s) return;
  const text = buildAIPrompt(s);
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-prompt-btn');
    if(btn) { const orig = btn.textContent; btn.textContent = '✓ Copied — paste into Claude'; setTimeout(()=>{ if(btn) btn.textContent = orig; }, 2500); }
  } catch(e) {
    showModal(`
      <div style="background:${C.card};border-radius:20px;padding:22px;border:1px solid ${C.border};">
        <div style="color:${C.text};font-size:15px;font-weight:800;margin-bottom:10px;">Couldn't copy automatically</div>
        <div style="color:${C.textSub};font-size:12px;margin-bottom:12px;">Select and copy the text below manually:</div>
        <textarea readonly style="width:100%;background:${C.cardHigh};border:1px solid ${C.borderLight};border-radius:10px;color:${C.text};font-size:12px;padding:12px;min-height:200px;box-sizing:border-box;">${text}</textarea>
        <button onclick="closeAllOverlays()" style="width:100%;margin-top:12px;padding:12px;border-radius:12px;border:none;background:${C.text};color:${C.bg};font-size:14px;font-weight:800;cursor:pointer;">Close</button>
      </div>`);

}

// Splits pasted research into labeled sections IF it follows the headers we
// asked for in buildAIPrompt. This is plain string matching on fixed literal
// headers we control — not language understanding, not guessing. If the
// headers aren't there (different format, freeform paste), returns null and
// the app just shows the raw text like before. Nothing forced, nothing fake.
function parseResearch(text) {
  if(!text) return null;
  const headerDefs = [
    {key:'catalysts',    re:/CATALYSTS:?/i},
    {key:'sentiment',    re:/ANALYST SENTIMENT:?/i},
    {key:'valuation',    re:/VALUATION:?/i},
    {key:'fundamentals', re:/FUNDAMENTALS?\s*(VS|VERSUS)\s*TECHNICALS?:?/i},
    {key:'risk',         re:/KEY RISKS?:?/i},
    {key:'blindSpots',   re:/BLIND SPOTS?:?/i},
    {key:'stressTest',   re:/STRESS TEST:?/i},
    {key:'bottomLine',   re:/BOTTOM LINE:?/i},
  ];
  const found = [];
  headerDefs.forEach(h => {
    const m = text.match(h.re);
    if(m) found.push({key:h.key, index:m.index, len:m[0].length});
  });
  if(found.length===0) return null;
  found.sort((a,b)=>a.index-b.index);
  const sections = {};
  found.forEach((m,i) => {
    const start = m.index+m.len;
    const end = i+1<found.length ? found[i+1].index : text.length;
    const val = text.slice(start,end).trim();
    if(val) sections[m.key] = val;
  });
  return Object.keys(sections).length ? sections : null;
}

function computeAtAGlance(s) {
  const setup = analyzeSetup(s);
  const {rz, dz, volConfirmed, trendUp, trendBroken} = setup;
  const narrative = brokerRead(s, setup, computeTrajectory(s));

  const trend = trendBroken ? {label:'Broken', color:C.red, sub:'Below long-term support'}
              : trendUp ? {label:'Long-term uptrend', color:C.green, sub:'Price above 50 & 200-day'}
              : {label:'Mixed', color:C.yellow, sub:'Not fully confirmed'};

  const momentum = rz ? {label:rz.label, color:rz.color, sub:`RSI ${s.rsi}`} : {label:'Unknown', color:C.textMuted, sub:'No RSI yet'};

  const volume = setup.volRatio!=null
    ? {label: volConfirmed?'Above Average':(setup.volRatio<0.8?'Below Average':'Normal'), color: volConfirmed?C.green:(setup.volRatio<0.8?C.red:C.yellow), sub:`${setup.volRatio.toFixed(1)}x avg`}
    : {label:'Unknown', color:C.textMuted, sub:'No volume data'};

  let riskLevel = {label:'Unknown', color:C.textMuted, sub:''};
  if(s.atr && s.price) {
    const pctMove = (s.atr/s.price)*100;
    if(pctMove<2) riskLevel = {label:'Low', color:C.green, sub:`ATR ${fmtP(s.atr)}`};
    else if(pctMove<4) riskLevel = {label:'Moderate', color:C.yellow, sub:`ATR ${fmtP(s.atr)}`};
    else riskLevel = {label:'High', color:C.orange, sub:`ATR ${fmtP(s.atr)}`};
  }

  let posSize = {label:'Unknown', color:C.textMuted, sub:''};
  if(s.atr && s.price){
    const budget = s.invested || 150;
    const approxShares = budget/s.price;
    const dollarRisk = approxShares*(s.atr*1.5);
    const riskPct = budget>0 ? (dollarRisk/budget)*100 : null;
    if(riskPct!=null) posSize = riskPct<15 ? {label:'Good', color:C.green, sub:'Fits your risk'} : {label:'Tight', color:C.yellow, sub:'Stop is close to noise'};
  }

  const overall = {label:narrative.verdict, color:narrative.color, sub:narrative.verdictSub};

  return {trend, momentum, volume, riskLevel, posSize, overall};
}

// Are buyers actually showing up on up days, or is volume heavier on down days?
function computeVolumeOnUpDays(s) {
  const snaps = s.snapshots||[];
  if(snaps.length<4) return null;
  const recent = snaps.slice(-10);
  let upVol=0, upN=0, downVol=0, downN=0;
  for(let i=1;i<recent.length;i++){
    const prev=recent[i-1], cur=recent[i];
    if(cur.price==null||prev.price==null||cur.vol==null) continue;
    if(cur.price>prev.price){ upVol+=cur.vol; upN++; }
    else if(cur.price<prev.price){ downVol+=cur.vol; downN++; }
  }
  if(upN===0||downN===0) return null;
  const ratio = (upVol/upN)/(downVol/downN);
  return {
    ratio,
    label: ratio>1.15?'Buyers Showing Up':ratio<0.85?'Needs Work':'Neutral',
    color: ratio>1.15?C.green:ratio<0.85?C.red:C.yellow,
    text: ratio>1.15 ? 'Buyers are showing up with real volume on up days — a healthy sign.' : ratio<0.85 ? "Volume is heavier on down days than up days — sellers are more active than buyers right now." : 'Volume does not confirm buyers yet — up and down days are pulling roughly even.'
  };
}

// Is the 50/200-day average itself trending up, flat, or down — needs CSV-imported
// history with ma50/ma200 per row, since the daily-update wizard only asks for
// today's snapshot, not the moving average's own trend.
function computeMASlope(s) {
  const s50 = (s.snapshots||[]).filter(sn=>sn.ma50!=null);
  const s200 = (s.snapshots||[]).filter(sn=>sn.ma200!=null);
  if(s50.length<5) return null;
  const r50 = s50.slice(-10);
  const rising50 = r50[r50.length-1].ma50 > r50[0].ma50;
  let rising200 = null;
  if(s200.length>=5){ const r200=s200.slice(-10); rising200 = r200[r200.length-1].ma200 > r200[0].ma200; }
  return {rising50, rising200};
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION 2 — MARKET STATE ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
// Six states, evaluated as a fixed-order decision tree so a stock always
// lands in exactly one: data sufficiency -> confirmed breakdown -> recovery
// attempt -> long-term trend intact -> advancing/pullback/sideways/weakening.
// "Evidence Strength" (Strong/Moderate/Weak/Insufficient Data) is an
// auditable ratio of conditions met vs. conditions we could actually check —
// deliberately not a statistical "Confidence %".
//
// Data reality this respects: ma50/ma200 SLOPE needs snapshot history with
// ma50/ma200 populated day over day. That only existed from the one-time Add
// Stock wizard or a CSV import until ma50/ma200 were added to the daily
// update wizard alongside this engine. Until that history builds up (roughly
// 5+ daily updates for a usable slope), the "50/200 SMA rising/flat" checks
// are SKIPPED — not assumed true or false — so the engine never invents a
// trend direction it can't actually see.

// Trading-day distance between two today()-format date strings
// (e.g. "Jul 15, 2026"). Weekends only — does not account for market
// holidays, an accepted approximation for a staleness flag, not a P&L calc.
function tradingDaysBetween(dateStrEarlier, dateStrLater) {
  const a = new Date(dateStrEarlier), b = new Date(dateStrLater);
  if(isNaN(a)||isNaN(b)) return null;
  let count = 0;
  const cur = new Date(a); cur.setHours(0,0,0,0);
  const end = new Date(b); end.setHours(0,0,0,0);
  while(cur < end) {
    cur.setDate(cur.getDate()+1);
    const day = cur.getDay();
    if(day!==0 && day!==6) count++;
  }
  return count;
}

// How stale is the ma50/ma200 data actually behind this stock's current
// numbers? Finds the most recent snapshot carrying BOTH, measures trading
// days back to the latest snapshot on file.
function getIndicatorFreshness(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.date);
  if(!snaps.length) return {staleDays:null, isStale:false, hasData:false};
  const sorted = [...snaps].sort((x,y)=>new Date(x.date)-new Date(y.date));
  const latest = sorted[sorted.length-1];
  const withTrend = sorted.filter(sn=>sn.ma50!=null && sn.ma200!=null);
  if(!withTrend.length) return {staleDays:null, isStale:false, hasData:false};
  const lastTrendSnap = withTrend[withTrend.length-1];
  const staleDays = tradingDaysBetween(lastTrendSnap.date, latest.date);
  return {staleDays, isStale: staleDays!=null && staleDays>=3, hasData:true};
}

// Is a given moving-average field (e.g. 'ma20') flat over its last ~10
// readings? Threshold is a hard number, not a vibe: first-vs-last reading
// within the given % counts as flat.
function computeMAFlatness(s, field, thresholdPct) {
  const snaps = (s.snapshots||[]).filter(sn=>sn[field]!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const recent = snaps.slice(-10);
  if(recent.length<5) return null;
  const first = recent[0][field], last = recent[recent.length-1][field];
  if(!first) return null;
  return Math.abs((last-first)/first) <= thresholdPct;
}

// Has ATR meaningfully cooled off vs. its own 20-day average? Needs real
// ATR history from snapshots, not just today's single reading.
function computeATRDecline(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.atr!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(snaps.length<10) return null;
  const last20 = snaps.slice(-20);
  const avg = last20.reduce((a,sn)=>a+sn.atr,0)/last20.length;
  const current = s.atr!=null ? s.atr : last20[last20.length-1].atr;
  if(!avg) return null;
  return current <= avg*0.9;
}

// "Structure proxy" — explicitly NOT true swing-point (higher-high/
// higher-low) detection, which stays deferred until a real pivot algorithm
// exists. This is a cheap 10-session stand-in: today's close vs. the prior
// 10 sessions' range for lower-low/higher-high, and a 5-day recent window
// vs. the 10 sessions before it for higher-low/lower-high. Returns nulls
// when there isn't enough history — never guesses.
function computeStructureProxy(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.price!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(snaps.length<11) return {lowerLow:null, higherHigh:null, higherLow:null, lowerHigh:null, sample:snaps.length};
  const closes = snaps.map(sn=>sn.price);
  const current = closes[closes.length-1];
  const prior10 = closes.slice(-11,-1);
  const lowerLow = current < Math.min(...prior10);
  const higherHigh = current > Math.max(...prior10);

  let higherLow = null, lowerHigh = null;
  if(closes.length>=16) {
    const recent5 = closes.slice(-5);
    const before10 = closes.slice(-16,-6);
    higherLow = Math.min(...recent5) > Math.min(...before10);
    lowerHigh = Math.max(...recent5) < Math.max(...before10);
  }
  return {lowerLow, higherHigh, higherLow, lowerHigh, sample:snaps.length};
}

// Shared Consolidation checklist — reachable from either the "trend intact"
// or "trend not intact" branch of the tree, since balance between buyers
// and sellers doesn't care which side of the 200 SMA price sits on.
function computeConsolidationConditions(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.price!=null).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const last10 = snaps.slice(-10);
  const rangeTight = last10.length>=10 ? (()=>{ const p=last10.map(sn=>sn.price); return ((Math.max(...p)-Math.min(...p))/Math.min(...p))<=0.06; })() : null;
  const ma20Flat = computeMAFlatness(s,'ma20',0.02);
  const ma50Flat = computeMAFlatness(s,'ma50',0.02);
  const atrDeclined = computeATRDecline(s);
  const volRatio = s.vol&&s.avgvol ? s.vol/s.avgvol : null;
  return [
    {label:'Price within a 6% range over the last 10 sessions', met: rangeTight===true, evaluable: rangeTight!=null},
    {label:'20 EMA is flat', met: ma20Flat===true, evaluable: ma20Flat!=null},
    {label:'50 SMA is flat', met: ma50Flat===true, evaluable: ma50Flat!=null},
    {label:'ATR down at least 10% vs. its 20-day average', met: atrDeclined===true, evaluable: atrDeclined!=null},
    {label:'Volume below average', met: volRatio!=null ? volRatio<1 : null, evaluable: volRatio!=null},
  ];
}

// Wraps a winning state's condition list into the auditable Evidence
// Strength result. Never a probability — "X of Y available conditions".
// Staleness (see getIndicatorFreshness) knocks Evidence Strength down one
// level, visibly, instead of silently trusting old trend data.
function finalizeState(name, conditions, freshness) {
  const evaluable = conditions.filter(c=>c.evaluable);
  const metCount = evaluable.filter(c=>c.met).length;
  const total = evaluable.length;
  let evidence;
  if(total<2) evidence='Insufficient Data';
  else {
    const ratio = metCount/total;
    evidence = ratio>=0.85 ? 'Strong' : ratio>=0.6 ? 'Moderate' : 'Weak';
  }
  let staleNote = null;
  if(freshness && freshness.isStale) {
    staleNote = `Trend data is ${freshness.staleDays} trading days old. Evidence strength has been reduced.`;
    if(evidence==='Strong') evidence='Moderate';
    else if(evidence==='Moderate') evidence='Weak';
  }
  return {state:name, evidence, evidenceCount:`${metCount} of ${total} available conditions`, conditions, staleNote, closestMatch:false};
}

// Gate 5 helper — checks candidate states in priority order, requires ALL
// evaluable conditions true (strict AND, no partial credit) and at least 2
// evaluable conditions before calling it a match. If nothing in the branch
// cleanly qualifies, falls back to the closest match by conditions-met
// ratio — clearly flagged, never silently assumed.
function classifyWithinBranch(candidates, freshness) {
  for(const c of candidates) {
    const evaluable = c.conditions.filter(x=>x.evaluable);
    if(evaluable.length>=2 && evaluable.every(x=>x.met)) {
      return finalizeState(c.name, c.conditions, freshness);
    }
  }
  let best=null, bestRatio=-1;
  for(const c of candidates) {
    const evaluable = c.conditions.filter(x=>x.evaluable);
    const metCount = evaluable.filter(x=>x.met).length;
    const ratio = evaluable.length ? metCount/evaluable.length : 0;
    if(ratio>bestRatio) { bestRatio=ratio; best=c; }
  }
  const result = finalizeState(best.name, best.conditions, freshness);
  result.closestMatch = true;
  result.evidence = 'Weak';
  return result;
}

// The classifier itself. Gate order is fixed and matches the spec exactly:
// data sufficiency -> confirmed breakdown -> recovery attempt -> long-term
// trend intact -> advancing/pullback/sideways/weakening.
function computeMarketState(s) {
  // Gate 1 — enough core data to say anything at all?
  const core = {price:s.price, '20 EMA':s.ma20, '50 SMA':s.ma50, '200 SMA':s.ma200, RSI:s.rsi, volume:s.vol, '20-day avg volume':s.avgvol};
  const missing = Object.keys(core).filter(k=>core[k]==null);
  if(missing.length) {
    return {state:'Insufficient Data', evidence:'Insufficient Data', evidenceCount:'0 of 0 available conditions', missing, conditions:[], staleNote:null, closestMatch:false};
  }

  const volRatio = s.vol/s.avgvol;
  const slope = computeMASlope(s); // {rising50, rising200} or null — needs real snapshot history
  const proxy = computeStructureProxy(s);
  const freshness = getIndicatorFreshness(s);

  // ── Gate 2: Confirmed Breakdown candidate ──
  const priceBelow200By3 = s.price < s.ma200*0.97;
  const ma50Declining = slope ? slope.rising50===false : null;
  const breakdownTriggers = [
    {label:'Volume 1.3× average or higher', met: volRatio>=1.3, evaluable:true},
    {label:'50 SMA declining', met: ma50Declining===true, evaluable: slope!=null},
    {label:'Closed below the 10-session low (structure proxy)', met: proxy.lowerLow===true, evaluable: proxy.lowerLow!=null},
  ];
  const breakdownCandidate = priceBelow200By3 && breakdownTriggers.some(t=>t.evaluable && t.met);

  // ── Gate 3: Recovery Attempt — only worth asking if the stock is below
  // its key long-term level (200 SMA) or just tripped the breakdown gate.
  const belowKeyLevel = s.price < s.ma200;
  const macdImproving = (s.macdLine!=null && s.signalLine!=null) ? (s.macdLine > s.signalLine) : null;
  const longTermRestored = s.price>s.ma200 && s.ma50>s.ma200;
  const recoveryConditions = [
    {label:'Price closed above the 20 EMA', met: s.price > s.ma20, evaluable:true},
    {label:'RSI above 40', met: s.rsi > 40, evaluable:true},
    {label:'MACD improving or bullish', met: macdImproving===true, evaluable: macdImproving!=null},
    {label:'Volume 1.0× average or higher', met: volRatio>=1.0, evaluable:true},
    {label:'Still below 50 SMA, or long-term structure not yet restored', met: (s.price < s.ma50) || !longTermRestored, evaluable:true},
  ];
  const recoveryEligible = belowKeyLevel || breakdownCandidate;
  const recoveryEvaluable = recoveryConditions.filter(c=>c.evaluable);
  const recoveryAttempt = recoveryEligible && recoveryEvaluable.length>=4 && recoveryEvaluable.every(c=>c.met);

  if(recoveryAttempt) return finalizeState('Recovery Attempt', recoveryConditions, freshness);

  if(breakdownCandidate) {
    const conds = [{label:'Price more than 3% below the 200 SMA', met:true, evaluable:true}, ...breakdownTriggers];
    return finalizeState('Confirmed Breakdown', conds, freshness);
  }

  // ── Gate 4: is the long-term trend intact? ──
  // "200 SMA flat or rising" only checked when slope data actually exists.
  const trendIntact = (s.price>s.ma200) && (s.ma50>s.ma200) && (slope && slope.rising200!=null ? slope.rising200!==false : true);

  // ── Gate 5: within-branch classification ──
  const consolidationConditions = computeConsolidationConditions(s);
  if(trendIntact) {
    const healthy = [
      {label:'Price above 20 EMA', met: s.price>s.ma20, evaluable:true},
      {label:'Price above 50 SMA', met: s.price>s.ma50, evaluable:true},
      {label:'50 SMA rising', met: slope? slope.rising50===true : null, evaluable: slope!=null},
      {label:'RSI between 50 and 70', met: s.rsi>=50 && s.rsi<=70, evaluable:true},
    ];
    const pullback = [
      {label:'Price below 20 EMA', met: s.price<s.ma20, evaluable:true},
      {label:'Price within 3% of the 50 SMA', met: Math.abs((s.price-s.ma50)/s.ma50)<=0.03, evaluable:true},
      {label:'Price still above the 200 SMA', met: s.price>s.ma200, evaluable:true},
      {label:'50 SMA still rising', met: slope? slope.rising50===true : null, evaluable: slope!=null},
      {label:'RSI between 40 and 55', met: s.rsi>=40 && s.rsi<=55, evaluable:true},
      {label:'Volume 1.1× average or less', met: volRatio<=1.1, evaluable:true},
    ];
    return classifyWithinBranch([
      {name:'Healthy Uptrend', conditions:healthy},
      {name:'Normal Pullback', conditions:pullback},
      {name:'Consolidation', conditions:consolidationConditions},
    ], freshness);
  } else {
    const upDayVol = computeVolumeOnUpDays(s);
    const weakening = [
      {label:'Price below the 50 SMA', met: s.price<s.ma50, evaluable:true},
      {label:'RSI below 45', met: s.rsi<45, evaluable:true},
      {label:'50 SMA flat or declining', met: slope? slope.rising50===false : null, evaluable: slope!=null},
      {label:'Down-day volume stronger than up-day volume', met: upDayVol? upDayVol.ratio<1 : null, evaluable: upDayVol!=null},
      {label:'Failed rebound or lower-low structure proxy', met: (proxy.lowerHigh===true || proxy.lowerLow===true), evaluable: (proxy.lowerHigh!=null || proxy.lowerLow!=null)},
    ];
    return classifyWithinBranch([
      {name:'Trend Weakening', conditions:weakening},
      {name:'Consolidation', conditions:consolidationConditions},
    ], freshness);
  }
}

// Retroactively recomputes market state across the stock's own snapshot
// history — rather than persisting a "previousState" field that can drift
// from the real math. Same "pure computed, nothing frozen" rule the rest of
// the app already follows for score/verdict. Each day only sees data
// available up to and including that day — no lookahead.
function computeMarketStateHistory(s) {
  const snaps = (s.snapshots||[]).filter(sn=>sn.date).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!snaps.length) return {timeline:[], currentStreakDays:0, changedOn:null};
  const timeline = snaps.map((sn,i)=>{
    const asOf = {...s, price:sn.price, rsi:sn.rsi, vol:sn.vol, avgvol:sn.avgvol, ma20:sn.ma20, ma50:sn.ma50, ma200:sn.ma200, macdLine:sn.macdLine, signalLine:sn.signalLine, atr:sn.atr, snapshots:snaps.slice(0,i+1)};
    return {date:sn.date, state:computeMarketState(asOf).state};
  });
  const currentState = timeline[timeline.length-1].state;
  let streak=0, changedOn=null;
  for(let i=timeline.length-1;i>=0;i--) {
    if(timeline[i].state===currentState) { streak++; }
    else { changedOn = timeline[i+1] ? timeline[i+1].date : null; break; }
  }
  if(changedOn===null && streak===timeline.length) changedOn = timeline[0].date;
  return {timeline, currentStreakDays:streak, changedOn};
}

// Maps a computed condition's label text to the right manual-check
// instruction, for conditions coming out of computeMarketState (Tab 2)

function mentorManualCheckFor(label) {
  const l = label.toLowerCase();
  if(l.includes('50 sma') && (l.includes('rising')||l.includes('declining')||l.includes('flat'))) return MENTOR_MANUAL_CHECKS.ma50Slope;
  if(l.includes('200 sma') && (l.includes('rising')||l.includes('flat'))) return MENTOR_MANUAL_CHECKS.ma200Slope;
  if(l.includes('volume') && (l.includes('down-day')||l.includes('up day')||l.includes('up-day'))) return MENTOR_MANUAL_CHECKS.accumDistribution;
  if(l.includes('structure proxy')||l.includes('lower-low')||l.includes('higher-low')) return MENTOR_MANUAL_CHECKS.structureProxy;
  if(l.includes('atr')) return MENTOR_MANUAL_CHECKS.atrTrend;
  return MENTOR_MANUAL_CHECKS.generic;
}

function startMentorAnalysis(stockId) {
  const s = stocks.find(x=>String(x.id)===String(stockId));
  if(!s) return;
  if(needsReclassify(s)) {
    closeAllOverlays();
    showReclassifyFlow(s.id);
    return;
  }
  const plan = MENTOR_TAB_PLAN[s.type] || MENTOR_TAB_PLAN['Swing Trade'];
  mentorMode = 'analysis';
  mentorStockId = stockId;
  mentorTabOrder = plan.order.slice();
  mentorHistoryTier = computeMentorHistoryTier(s);
  mentorShowLimitedIntro = mentorHistoryTier==='limited';
  mentorStep = 0;
  renderMentorStep();
}

// Pulls together what StockIQ already computed, per tab, using the SAME
// functions the rest of the app trusts (analyzeSetup, computeMASlope,
// distanceZone, rsiZone, computeGamePlan, computeMarketState,
// computeVolumeOnUpDays) — never a second opinion, never re-asking for a
// number the app already has.
function mentorAnalysisContent(tabId, s) {
  const setup = analyzeSetup(s);
  if(tabId==='bigPicture') {
    const slope = computeMASlope(s);
    const dz = distanceZone(s.price, s.ma50);
    return [
      {label:'Price vs. 200 SMA', value: s.price>s.ma200?'Above':'Below', good: s.price>s.ma200,
        teach:'Price above the 200-day average is the single most basic sign a long-term uptrend is still alive. Below it, treat this as a trend under repair, not a trend to build a new position around.'},
      {label:'50 SMA vs. 200 SMA', value: s.ma50>s.ma200?'50 above 200':'50 below 200', good: s.ma50>s.ma200,
        teach:'When the 50-day sits above the 200-day, medium-term buyers have been in control for a while — that\'s a healthy stack. When it flips below, it\'s often an early warning the trend is turning before price itself makes it obvious.'},
      mentorPoint('50 SMA direction', slope?(slope.rising50?'Rising':'Not rising'):null, slope?slope.rising50:null, slope!=null, 'ma50Slope',
        'A rising 50-day means the medium-term trend is actively being pushed higher, not just coasting. Look at the slope on your chart, not just where the line sits.'),
      mentorPoint('200 SMA direction', (slope&&slope.rising200!=null)?(slope.rising200?'Rising':'Not rising'):null, (slope&&slope.rising200!=null)?slope.rising200:null, (slope&&slope.rising200!=null), 'ma200Slope',
        'The 200-day is slow by design. A flat or falling 200-day, even with price above it, means the long-term trend hasn\'t fully confirmed yet.'),
      {label:'Distance from 50 SMA', value: dz?dz.label:'—', good: dz? (dz.zone==='buy'||dz.zone==='healthy') : null,
        teach: dz?dz.note:'Not enough data yet.'},
    ];
  }
  if(tabId==='setup') {
    const ms = computeMarketState(s);
    const meta = MARKET_STATE_META[ms.state] || MARKET_STATE_META['Insufficient Data'];
    return {isMarketState:true, ms, meta};
  }
  if(tabId==='entryQuality') {
    const rz = rsiZone(s.rsi);
    const dz20 = (s.price&&s.ma20) ? ((s.price-s.ma20)/s.ma20)*100 : null;
    const dz50 = distanceZone(s.price, s.ma50);
    const upDayVol = computeVolumeOnUpDays(s);
    const gp = computeGamePlan(s);
    return [
      {label:'RSI condition', value: rz?rz.label:'—', good: rz? (rz.zone==='healthy'||rz.zone==='panic') : null,
        teach: rz?rz.note:'Not enough data yet.'},
      {label:'Distance from 20 EMA', value: dz20!=null?`${dz20>=0?'+':''}${dz20.toFixed(1)}%`:'—', good:null,
        teach:'The 20 EMA is your short-term pulse. Price hugging or just above it, with the bigger trend intact, is often the tightest, lowest-risk entry you\'ll get.'},
      {label:'Distance from 50 SMA', value: dz50?dz50.label:'—', good: dz50?(dz50.zone==='buy'||dz50.zone==='healthy'):null,
        teach: dz50?dz50.note:'Not enough data yet.'},
      mentorPoint('Volume near support (accumulation vs. distribution)', upDayVol?upDayVol.label:null, upDayVol?upDayVol.ratio>1.15:null, upDayVol!=null, 'accumDistribution',
        upDayVol?upDayVol.text:''),
      {label:'ATR (typical daily move)', value: s.atr?`${fmtP(s.atr)}/day`:'—', good:null,
        teach:'ATR never tells you which way the stock is headed — only how far it normally moves in a day. Use it to size your position and set a stop that\'s wider than normal noise, not to time an entry.'},
      {label:'Plan if you entered near here', value: gp.stopPrice!=null?`Stop ${fmtP(gp.stopPrice)} · Target ${gp.profit}`:'Set once ATR is known', good:null,
        teach:'Reward should meaningfully outweigh risk before you act. If the distance to your stop is bigger than the distance to your target, the trade isn\'t asking to be taken yet.'},
    ];
  }
  if(tabId==='entryTiming') {
    const ms = computeMarketState(s);
    const dailyDamaged = ms.state==='Confirmed Breakdown' || ms.state==='Trend Weakening';
    return {isHourlyGap:true, dailyDamaged, dailyState: ms.state};
  }
  return [];
}
